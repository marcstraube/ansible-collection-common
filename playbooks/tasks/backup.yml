---
# =============================================================================
# Backup Tasks
# =============================================================================
# Task file for backup configuration — single source of truth.
# Imported by playbooks/backup.yml (standalone) and infra playbooks.
#
# All roles default to enabled — disable per host/group via inventory.
# See each role's defaults/main.yml for available variables.
# =============================================================================

- name: Backup | Include restic role
  ansible.builtin.include_role:
    name: marcstraube.common.restic
    apply:
      tags:
        - backup
        - restic
  tags:
    - backup
    - restic
  when: restic_enabled | default(true) | bool
