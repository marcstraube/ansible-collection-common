---
# =============================================================================
# Base System Tasks
# =============================================================================
# Task file for base system configuration — single source of truth.
# Imported by playbooks/base.yml (standalone) and infra playbooks.
#
# All roles default to enabled — disable per host/group via inventory.
# See each role's defaults/main.yml for available variables.
#
# Tag scheme:
#   base-system   All roles in this file
#   security      Security roles only (sysctl through hardware_tokens)
#   <role-name>   Individual role (e.g., firewalld, docker)
# =============================================================================

#
# Core System
#

- name: Base System | Include package_management role
  ansible.builtin.include_role:
    name: marcstraube.common.package_management
    apply:
      tags:
        - base-system
        - package-management
  tags:
    - base-system
    - package-management
  when: package_management_enabled | default(true) | bool

- name: Base System | Include base role
  ansible.builtin.include_role:
    name: marcstraube.common.base
    apply:
      tags:
        - base-system
        - base
  tags:
    - base-system
    - base
  when: base_enabled | default(true) | bool

- name: Base System | Include users role
  ansible.builtin.include_role:
