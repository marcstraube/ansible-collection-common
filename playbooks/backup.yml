---
# =============================================================================
# Backup Playbook
# =============================================================================
# Automated backup configuration using restic.
#
# Usage:
#   ansible-playbook marcstraube.common.backup -i inventory/
#
# Configure roles via inventory variables (group_vars/host_vars).
# See roles/restic/defaults/main.yml for available variables.
# =============================================================================

- name: Configure Backup
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Backup | Include restic role
      ansible.builtin.include_role:
        name: marcstraube.common.restic
      tags:
        - backup
        - restic
      when: restic_enabled | default(true) | bool
