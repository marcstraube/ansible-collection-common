---
# =============================================================================
# Backup Playbook
# =============================================================================
# Automated backup configuration using restic.
# All roles default to enabled — disable per host/group via inventory.
#
# Usage:
#   ansible-playbook marcstraube.common.backup -i inventory/
#
# Configure roles via inventory variables (group_vars/host_vars).
# See each role's defaults/main.yml for available variables.
# =============================================================================

- name: Configure Backup
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Backup | Import backup tasks
      ansible.builtin.import_tasks:
        file: tasks/backup.yml
