---
# GitLab CI for marcstraube.common collection
# Runs on GitLab mirror - minimal pipeline (Lint + Build only)
# Full testing happens on GitHub Actions

stages:
  - lint
  - build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

# =============================================================================
# LINT
# =============================================================================
ansible-lint:
  stage: lint
  image: python:3.13-slim
  before_script:
    - pip install ansible-core ansible-lint
    - ansible-galaxy collection install -r galaxy.yml || true
  script:
    - ansible-lint
  tags:
    - docker

markdown-lint:
  stage: lint
  image: node:22-slim
  script:
    - npm install -g markdownlint-cli
    - markdownlint --config .markdownlint.yml '**/*.md'
  tags:
    - docker

yaml-lint:
  stage: lint
  image: python:3.13-slim
  before_script:
    - pip install yamllint
  script:
    - yamllint -c .yamllint .
  tags:
    - docker

# =============================================================================
# BUILD
# =============================================================================
build-collection:
  stage: build
  image: python:3.13-slim
  needs: [ansible-lint, markdown-lint, yaml-lint]
  before_script:
    - pip install ansible-core
  script:
    - ansible-galaxy collection build
    - ls -lh *.tar.gz
  artifacts:
    paths:
      - '*.tar.gz'
    expire_in: 30 days
  tags:
    - docker
