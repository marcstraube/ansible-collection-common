---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # =============================================================================
  # LINT (always runs)
  # =============================================================================
  lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install ansible-core ansible-lint

      - name: Install collection dependencies
        run: |
          ansible-galaxy collection install -r galaxy.yml || true

      - name: Run ansible-lint
        run: ansible-lint

  # =============================================================================
  # MARKDOWN LINT (always runs)
  # =============================================================================
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          config: .markdownlint.yml
          globs: '**/*.md'

  # =============================================================================
  # YAML LINT (always runs)
  # =============================================================================
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: yamllint -c .yamllint .

  # =============================================================================
  # MOLECULE TESTS
  # =============================================================================
  molecule-smoke:
    name: Molecule Smoke Test (ansible-${{ matrix.ansible }})
    runs-on: ubuntu-latest
    needs: [lint, markdown-lint, yaml-lint]
    strategy:
      fail-fast: false
      matrix:
        ansible:
          - '2.17'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install "ansible-core~=${{ matrix.ansible }}.0" \
                      molecule \
                      molecule-plugins[podman] \

      - name: Run Molecule smoke test
        run: molecule test
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'

  # =============================================================================
  # MOLECULE ROLE-BY-ROLE (representative subset per platform)
  # =============================================================================
  molecule-roles:
    name: Molecule ${{ matrix.role }} (${{ matrix.platform }})
    runs-on: ubuntu-latest
    needs: [lint, markdown-lint, yaml-lint]
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          # Arch Linux (Rocky has PAM/sudo issues in GH Actions containers)
          - { role: sudo, platform: sudo-archlinux }
          - { role: editors, platform: editors-archlinux }
          - { role: logrotate, platform: logrotate-archlinux }
          - { role: fonts, platform: fonts-archlinux }
          - { role: utils, platform: utils-archlinux }
          - { role: snmp, platform: snmp-archlinux }
          - { role: chrony, platform: chrony-archlinux }
          - { role: openssh, platform: openssh-archlinux }
          - { role: fail2ban, platform: fail2ban-archlinux }
          - { role: python, platform: python-archlinux }
          - { role: package_management, platform: package-management-archlinux }

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install "ansible-core~=2.17.0" \
                      molecule \
                      molecule-plugins[podman]

      - name: Install collection dependencies
        run: |
          ansible-galaxy collection install containers.podman
          ansible-galaxy collection install -r galaxy.yml || true

      - name: Run Molecule test
        working-directory: roles/${{ matrix.role }}
        run: molecule test
        env:
          MOLECULE_PLATFORM_NAME: ${{ matrix.platform }}
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'

  # =============================================================================
  # BUILD (always runs)
  # =============================================================================
  build:
    name: Build Collection
    runs-on: ubuntu-latest
    needs: [lint, markdown-lint, yaml-lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Ansible
        run: pip install ansible-core

      - name: Build collection
        run: ansible-galaxy collection build

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: collection-tarball
          path: '*.tar.gz'
          retention-days: 30
