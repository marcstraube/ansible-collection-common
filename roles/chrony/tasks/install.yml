---
- name: Install | Chrony packages
  ansible.builtin.package:
    name: '{{ __chrony_packages }}'
    state: present
  retries: 3
  delay: 5

- name: Install | Disable conflicting services
  ansible.builtin.systemd_service:
    name: '{{ item }}'
    enabled: false
    state: stopped
  loop: '{{ __chrony_conflicting_services }}'
  failed_when: false
