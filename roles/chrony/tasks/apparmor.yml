---
# =============================================================================
# Chrony - AppArmor Tasks
# =============================================================================

- name: AppArmor | Check if AppArmor is active
  ansible.builtin.stat:
    path: /sys/kernel/security/apparmor
  register: __chrony_apparmor_active

- name: AppArmor | Get current profile status
  ansible.builtin.command:
    cmd: aa-status --json
  register: __chrony_aa_status
  changed_when: false
  failed_when: false
  when: __chrony_apparmor_active.stat.exists

- name: AppArmor | Build enforce set
  ansible.builtin.set_fact:
    __chrony_apparmor_enforce_set: >-
      {{ (__chrony_aa_status.stdout | default('{}') | from_json).get('profiles', {})
         | dict2items | selectattr('value', 'eq', 'enforce')
         | map(attribute='key') | list }}
  when:
    - __chrony_apparmor_active.stat.exists
    - __chrony_aa_status.rc == 0

- name: AppArmor | Enforce chronyd profile
  ansible.builtin.command:
    cmd: 'aa-enforce {{ __chrony_apparmor_profile }}'
  when:
    - __chrony_apparmor_active.stat.exists
    - >-
      __chrony_apparmor_profile not in __chrony_apparmor_enforce_set | default([])
      and (__chrony_apparmor_profile | basename) not in __chrony_apparmor_enforce_set | default([])
  changed_when: true
