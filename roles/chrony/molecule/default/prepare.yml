---
- name: Prepare
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Prepare | Full system update (Arch)
      community.general.pacman:
        update_cache: true
        upgrade: true
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Prepare | Install systemd (Arch)
      community.general.pacman:
        name:
          - systemd
        state: present
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Prepare | Install systemd and chrony (Debian)
      ansible.builtin.apt:
        name:
          - systemd
          - procps
          - chrony
        state: present
        update_cache: true
      when: ansible_facts['os_family'] == 'Debian'

    - name: Prepare | Install systemd and chrony (RedHat)
      ansible.builtin.dnf:
        name:
          - systemd
          - procps-ng
          - chrony
        state: present
        update_cache: true
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Prepare | Install chrony (Arch)
      community.general.pacman:
        name:
          - chrony
        state: present
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Prepare | Stop chrony before applying override
      ansible.builtin.systemd:
        name: '{{ __chrony_service_unit }}'
        state: stopped
      failed_when: false
      vars:
        __chrony_service_unit: >-
          {{ (ansible_facts['os_family'] == 'Debian') | ternary('chrony.service', 'chronyd.service') }}

    - name: Prepare | Set OS-specific service vars
      ansible.builtin.set_fact:
        __chrony_service_unit: >-
          {{ (ansible_facts['os_family'] == 'Debian') | ternary('chrony.service', 'chronyd.service') }}
        __chrony_binary: >-
          {{ (ansible_facts['os_family'] == 'Archlinux') | ternary('/usr/bin/chronyd', '/usr/sbin/chronyd') }}

    - name: Prepare | Create chronyd service override directory
      ansible.builtin.file:
        path: '/etc/systemd/system/{{ __chrony_service_unit }}.d'
        state: directory
        mode: '0755'

    - name: Prepare | Override chronyd service for container compatibility
      ansible.builtin.copy:
        dest: '/etc/systemd/system/{{ __chrony_service_unit }}.d/override.conf'
        mode: '0644'
        content: |
          [Unit]
          ConditionCapability=

          [Service]
          Type=simple
          User=root
          LogsDirectory=
          StateDirectory=
          RuntimeDirectory=
          ExecStart=
          ExecStart={{ __chrony_binary }} -d -x

    - name: Prepare | Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true
