---
- name: Prepare
  hosts: all
  become: true
  gather_facts: true

  vars:
    __prepare_packages:
      Archlinux:
        - systemd
        - chrony
      Debian:
        - systemd
        - procps
        - chrony
      RedHat:
        - systemd
        - procps-ng
        - chrony

  tasks:
    - name: Prepare | Update package cache (Arch)
      community.general.pacman:
        update_cache: true
        upgrade: true
      retries: 3
      delay: 5
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Prepare | Update package cache (Debian)
      ansible.builtin.apt:
        update_cache: true
      retries: 3
      delay: 5
      when: ansible_facts['os_family'] == 'Debian'

    - name: Prepare | Update package cache (RedHat)
      ansible.builtin.dnf:
        update_cache: true
      retries: 3
      delay: 5
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Prepare | Install container dependencies
      ansible.builtin.package:
        name: '{{ __prepare_packages[ansible_facts["os_family"]] }}'
        state: present
      retries: 3
      delay: 5

    - name: Prepare | Stop chrony before applying override
      ansible.builtin.systemd_service:
        name: '{{ __chrony_service_unit }}'
        state: stopped
      failed_when: false
      vars:
        __chrony_service_unit: >-
          {{ (ansible_facts['os_family'] == 'Debian') | ternary('chrony.service', 'chronyd.service') }}

    - name: Prepare | Set OS-specific service vars
      ansible.builtin.set_fact:
        __chrony_service_unit: >-
          {{ (ansible_facts['os_family'] == 'Debian') | ternary('chrony.service', 'chronyd.service') }}
        __chrony_binary: >-
          {{ (ansible_facts['os_family'] == 'Archlinux') | ternary('/usr/bin/chronyd', '/usr/sbin/chronyd') }}

    - name: Prepare | Create chronyd service override directory
      ansible.builtin.file:
        path: '/etc/systemd/system/{{ __chrony_service_unit }}.d'
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Prepare | Override chronyd service for container compatibility
      ansible.builtin.copy:
        dest: '/etc/systemd/system/{{ __chrony_service_unit }}.d/override.conf'
        owner: root
        group: root
        mode: '0644'
        content: |
          [Unit]
          ConditionCapability=

          [Service]
          Type=simple
          User=root
          LogsDirectory=
          StateDirectory=
          RuntimeDirectory=
          ExecStart=
          ExecStart={{ __chrony_binary }} -d -x

    - name: Prepare | Reload systemd
      ansible.builtin.systemd_service:
        daemon_reload: true
