---
# marcstraube.common.hardening/molecule/default/destroy.yml

- name: Destroy Vagrant instances
  hosts: localhost
  gather_facts: false
  vars:
    molecule_ephemeral_directory: "{{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}"
  tasks:
    - name: Check if ephemeral directory exists
      ansible.builtin.stat:
        path: "{{ molecule_ephemeral_directory }}"
      register: ephemeral_dir

    - name: Check if Vagrant VMs exist
      ansible.builtin.command:
        cmd: vagrant status --machine-readable
        chdir: "{{ molecule_ephemeral_directory }}"
      register: vagrant_status
      changed_when: false
      failed_when: false
      when: ephemeral_dir.stat.exists

    - name: Destroy Vagrant VMs
      ansible.builtin.command:
        cmd: vagrant destroy -f
        chdir: "{{ molecule_ephemeral_directory }}"
      when:
        - ephemeral_dir.stat.exists
        - vagrant_status.rc == 0
        - >-
          'running' in vagrant_status.stdout or
          'poweroff' in vagrant_status.stdout or
          'saved' in vagrant_status.stdout
      register: vagrant_destroy
      changed_when: vagrant_destroy.rc == 0
      notify: Display destroy success

  handlers:
    - name: Display destroy success
      ansible.builtin.debug:
        msg: Vagrant instances destroyed successfully
      when: vagrant_destroy is changed
