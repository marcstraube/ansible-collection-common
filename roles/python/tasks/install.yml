---
- name: Install | Python packages
  ansible.builtin.package:
    name: '{{ __python_packages + __python_pip_packages }}'
    state: present
  retries: 3
  delay: 5

- name: Install | pipx
  ansible.builtin.package:
    name: '{{ __python_pipx_packages }}'
    state: present
  retries: 3
  delay: 5
  when:
    - python_pipx_enabled | bool
    - __python_pipx_packages | length > 0

#
# Bootstrap pipx (Rocky 9 — system pipx too old)
#

- name: Install | Create pipx bootstrap venv
  ansible.builtin.command:
    cmd: '{{ __python_venv_command }} /opt/pipx-bootstrap'
    creates: /opt/pipx-bootstrap/bin/python
  when:
    - python_pipx_enabled | bool
    - __python_bootstrap_pipx | default(false) | bool

- name: Install | pipx in bootstrap venv
  ansible.builtin.pip:
    name: pipx
    state: present
    virtualenv: /opt/pipx-bootstrap
  retries: 3
  delay: 5
  when:
    - python_pipx_enabled | bool
    - __python_bootstrap_pipx | default(false) | bool

#
# Extra Packages
#

- name: Install | Extra Python packages (AUR)
  become: true
  become_user: aur_builder
  kewlfft.aur.aur:
    name: '{{ __python_aur_packages.extra }}'
    state: present
  retries: 3
  delay: 5
  when:
    - ansible_facts['os_family'] == 'Archlinux'
    - __python_aur_packages.extra | default([]) | length > 0

- name: Install | Extra Python packages
  ansible.builtin.package:
    name: '{{ python_extra_packages }}'
    state: present
  retries: 3
  delay: 5
  when:
    - ansible_facts['os_family'] != 'Archlinux'
    - python_extra_packages | length > 0
