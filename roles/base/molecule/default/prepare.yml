---
- name: Prepare
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Update package cache (Arch)
      community.general.pacman:
        update_cache: true
        upgrade: true
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Update package cache (Debian)
      ansible.builtin.apt:
        update_cache: true
      when: ansible_facts['os_family'] == 'Debian'

    - name: Update package cache (RedHat)
      ansible.builtin.dnf:
        update_cache: true
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Install systemd on Debian (minimal image)
      ansible.builtin.apt:
        name:
          - systemd
          - systemd-timesyncd
          - locales
          - dbus
        state: present
        update_cache: true
      when: ansible_facts['os_family'] == 'Debian'

    - name: Replace curl-minimal with curl on RedHat (Docker image conflict)
      ansible.builtin.dnf:
        name:
          - curl
        state: present
        allowerasing: true
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Install glibc-langpack-en on RedHat (minimal image)
      ansible.builtin.dnf:
        name:
          - glibc-langpack-en
          - glibc-locale-source
        state: present
      when: ansible_facts['os_family'] == 'RedHat'
