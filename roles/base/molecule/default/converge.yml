---
- name: Converge
  hosts: all
  become: true
  gather_facts: true

  vars:
    base_enabled: true
    base_hostname: 'testhost'
    base_pretty_hostname: 'Test Desktop'
    base_chassis: 'desktop'
    base_locale: 'en_US.UTF-8'
    base_locales:
      - 'en_US.UTF-8 UTF-8'
      - 'de_DE.UTF-8 UTF-8'
    base_timezone: 'Europe/Berlin'
    base_ntp_enabled: false

    base_keymap: 'us'
    base_xkb_layout: 'us'

    # Bootloader not testable in containers (no /boot, no grub)
    base_bootloader: 'none'

    # base_packages: uses OS-specific defaults from vars/

    base_extra_packages:
      - 'vim'

    # Sysctl not testable in Docker (procfs read-only) — tested by sysctl role
    base_sysctl: {}

  pre_tasks:
    - name: Update package cache (Arch)
      community.general.pacman:
        update_cache: true
        upgrade: true
      changed_when: false
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Install systemd on Debian (minimal image)
      ansible.builtin.apt:
        name:
          - systemd
          - systemd-timesyncd
          - locales
          - dbus
        state: present
        update_cache: true
      when: ansible_facts['os_family'] == 'Debian'

    - name: Replace curl-minimal with curl on RedHat (Docker image conflict)
      ansible.builtin.dnf:
        name:
          - curl
        state: present
        allowerasing: true
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Install glibc-langpack-en on RedHat (minimal image)
      ansible.builtin.dnf:
        name:
          - glibc-langpack-en
          - glibc-locale-source
        state: present
      when: ansible_facts['os_family'] == 'RedHat'

  tasks:
    - name: Include base role  # noqa: role-name[path]
      ansible.builtin.include_role:
        name: '{{ playbook_dir }}/../..'
