---
# =============================================================================
# Package Installation Tasks
# =============================================================================

- name: Packages | Remove unwanted packages
  ansible.builtin.package:
    name: '{{ base_remove_packages }}'
    state: absent
  when: base_remove_packages | length > 0

- name: Packages | Install base packages
  ansible.builtin.package:
    name: '{{ base_packages }}'
    state: present

- name: Packages | Install dialog
  ansible.builtin.package:
    name: '{{ __base_dialog_package }}'
    state: present
  when: base_dialog | bool

- name: Packages | Install extra packages
  ansible.builtin.package:
    name: '{{ base_extra_packages }}'
    state: present
  when: base_extra_packages | length > 0
