---
- name: Timezone | Set timezone
  community.general.timezone:
    name: '{{ base_timezone }}'

- name: Timezone | Configure systemd-timesyncd
  ansible.builtin.template:
    src: 'timesyncd.conf.j2'
    dest: '/etc/systemd/timesyncd.conf'
    owner: root
    group: root
    mode: '0644'
  notify: 'restart timesyncd'
  when:
    - base_ntp_enabled | bool
    - ansible_facts['os_family'] != 'RedHat'

- name: Timezone | Manage NTP synchronization
  ansible.builtin.systemd_service:
    name: 'systemd-timesyncd.service'
    enabled: "{{ base_ntp_enabled | bool }}"
    state: "{{ base_ntp_enabled | bool | ternary('started', 'stopped') }}"
  when: ansible_facts['os_family'] != 'RedHat'
