---
# =============================================================================
# Timezone Configuration Tasks
# =============================================================================

- name: Timezone | Set timezone
  community.general.timezone:
    name: '{{ base_timezone }}'

- name: Timezone | Configure systemd-timesyncd
  ansible.builtin.template:
    src: 'timesyncd.conf.j2'
    dest: '/etc/systemd/timesyncd.conf'
    owner: root
    group: root
    mode: '0644'
  notify: 'restart timesyncd'
  when:
    - base_ntp_enabled | bool
    - ansible_facts['os_family'] != 'RedHat'

- name: Timezone | Enable NTP synchronization
  ansible.builtin.systemd:
    name: 'systemd-timesyncd.service'
    state: started
    enabled: true
  when:
    - base_ntp_enabled | bool
    - ansible_facts['os_family'] != 'RedHat'

- name: Timezone | Disable NTP synchronization
  ansible.builtin.systemd:
    name: 'systemd-timesyncd.service'
    state: stopped
    enabled: false
  when:
    - not (base_ntp_enabled | bool)
    - ansible_facts['os_family'] != 'RedHat'
