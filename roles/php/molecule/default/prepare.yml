---
- name: Prepare
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Prepare | Update package cache (Arch)
      community.general.pacman:
        update_cache: true
        upgrade: true
      retries: 3
      delay: 5
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Prepare | Update package cache (Debian)
      ansible.builtin.apt:
        update_cache: true
      retries: 3
      delay: 5
      when: ansible_facts['os_family'] == 'Debian'

    - name: Prepare | Install Debian prerequisites
      ansible.builtin.apt:
        name:
          - gnupg
          - ca-certificates
        state: present
      retries: 3
      delay: 5
      when: ansible_facts['os_family'] == 'Debian'

    - name: Prepare | Update package cache (RedHat)
      ansible.builtin.dnf:
        update_cache: true
      retries: 3
      delay: 5
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Prepare | Install EPEL (RedHat)
      ansible.builtin.dnf:
        name: epel-release
        state: present
      retries: 3
      delay: 5
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Prepare | Install Remi repository (RedHat)
      ansible.builtin.dnf:
        name: "https://rpms.remirepo.net/enterprise/remi-release-{{ ansible_facts['distribution_major_version'] }}.rpm"
        state: present
        disable_gpg_check: true
      retries: 3
      delay: 5
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Prepare | Update cache after repos (RedHat)
      ansible.builtin.dnf:
        update_cache: true
      retries: 3
      delay: 5
      when: ansible_facts['os_family'] == 'RedHat'
