---
# Official repo package patterns (for current Arch PHP version)
# AUR patterns are set dynamically in tasks for non-current versions
__php_cli_package: 'php'
__php_fpm_package: 'php-fpm'
__php_extension_prefix: 'php-'
__php_fpm_service: 'php-fpm'

# Arch does not use update-alternatives for PHP
__php_has_alternatives: false

# Configuration paths (official PHP)
# AUR paths are set dynamically in tasks
__php_conf_dirs:
  - '/etc/php/conf.d'
__php_fpm_pool_dir: '/etc/php/php-fpm.d'
__php_fpm_listen_default: '/run/php-fpm/php-fpm.sock'

# FPM pool defaults
__php_fpm_default_user: 'http'
__php_fpm_default_group: 'http'

# Extension name mapping: generic name → Arch package name
# Empty string = built into core php package (no separate package needed)
# Missing keys use default: php-<name>
__php_extension_map:
  curl: ''
  mbstring: ''
  xml: ''
  zip: ''
  intl: ''
  mysql: ''
  pdo_mysql: ''
  mysqlnd: ''
  json: ''
  openssl: ''
  tokenizer: ''
  ctype: ''
  session: ''
  fileinfo: ''
  filter: ''
  dom: ''
  simplexml: ''
  xmlreader: ''
  xmlwriter: ''
  phar: ''
  iconv: ''
  pcre: ''
  pdo: ''
  pdo_sqlite: ''
  bcmath: ''
  exif: ''
  ftp: ''
  gettext: ''
  sockets: ''
  opcache: ''
  gd: 'php-gd'
  imagick: 'php-imagick'
  pgsql: 'php-pgsql'
  sqlite: 'php-sqlite'
  sodium: 'php-sodium'
  tidy: 'php-tidy'
  xsl: 'php-xsl'
  snmp: 'php-snmp'
  odbc: 'php-odbc'
  enchant: 'php-enchant'
  dblib: 'php-dblib'
  apcu: 'php-apcu'
  redis: 'php-redis'
  memcached: 'php-memcached'
  mongodb: 'php-mongodb'
  igbinary: 'php-igbinary'
  grpc: 'php-grpc'
  xdebug: 'xdebug'
