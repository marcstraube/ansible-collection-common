---
# =============================================================================
# Restic - Backup Management
# =============================================================================

# -----------------------------------------------------------------------------
# SERVICE CONTROL
# -----------------------------------------------------------------------------
restic_enabled: true

# -----------------------------------------------------------------------------
# INSTALLATION
# -----------------------------------------------------------------------------
# Install from package manager (true) or download binary (false)
restic_install_from_package: true

# Binary version (only when restic_install_from_package: false)
restic_binary_version: '0.18.1'
restic_binary_url: >-
  https://github.com/restic/restic/releases/download/v{{
  restic_binary_version }}/restic_{{
  restic_binary_version }}_linux_amd64.bz2
restic_binary_path: '/usr/local/bin/restic'

# -----------------------------------------------------------------------------
# BACKUP JOBS
# List of backup job configurations
# -----------------------------------------------------------------------------
restic_jobs: []
# Example:
#   - name: 'system'
#     # Repository configuration
#     repository: '/backup/restic'  # Local path
#     # repository: 'sftp:user@host:/backup'  # SFTP
#     # repository: 's3:s3.amazonaws.com/bucket'  # S3
#     # repository: 'b2:bucket:path'  # Backblaze B2
#     # repository: 'rest:http://host:8000/'  # REST server
#
#     password: 'your-secret-password'
#     # Or use password file
#     # password_file: '/etc/restic/password'
#
#     # Paths to backup
#     paths:
#       - '/etc'
#       - '/home'
#       - '/var/lib'
#
#     # Paths to exclude
#     excludes:
#       - '*.tmp'
#       - '/var/lib/docker'
#       - '.cache'
#
#     # Exclude file (one pattern per line)
#     # exclude_file: '/etc/restic/excludes'
#
#     # Schedule (systemd timer OnCalendar format)
#     schedule: 'daily'  # Or '*-*-* 02:00:00'
#
#     # Retention policy (overrides restic_default_retention)
#     retention:
#       keep_last: 7
#       keep_daily: 7
#       keep_weekly: 4
#       keep_monthly: 6
#       keep_yearly: 2
#       keep_within: '30d'
#
#     # Environment variables (for cloud backends)
#     environment:
#       AWS_ACCESS_KEY_ID: 'your-key'
#       AWS_SECRET_ACCESS_KEY: 'your-secret'
#       # B2_ACCOUNT_ID: 'your-id'
#       # B2_ACCOUNT_KEY: 'your-key'
#
#     # Pre/post scripts
#     pre_backup: |
#       # Commands to run before backup
#       systemctl stop myapp
#     post_backup: |
#       # Commands to run after backup
#       systemctl start myapp
#
#     # Additional restic options
#     backup_options: '--exclude-caches --one-file-system'

# -----------------------------------------------------------------------------
# GLOBAL SETTINGS
# -----------------------------------------------------------------------------
# User to run backups as
restic_user: 'root'
restic_group: 'root'

# Base directory for restic configuration
restic_config_dir: '/etc/restic'

# Directory for backup scripts
restic_script_dir: '/usr/local/bin'

# Log to file instead of journald (default: false, use systemd journal)
restic_log_to_file: false

# Log directory (only used when restic_log_to_file is true)
restic_log_dir: '/var/log/restic'

# Default retention policy (used if job doesn't specify)
restic_default_retention:
  keep_last: 7
  keep_daily: 7
  keep_weekly: 4
  keep_monthly: 6
  keep_yearly: 1
  # keep_within: ''

# Default schedule (systemd timer OnCalendar format)
restic_default_schedule: '*-*-* 02:00:00'

# Initialize repositories automatically
restic_auto_init: true

# Run backup immediately after configuration
restic_run_after_configure: false

# Nice level for backup process (0-19, higher = lower priority)
restic_nice_level: 10

# IO scheduling class (0=none, 1=realtime, 2=best-effort, 3=idle)
restic_ionice_class: 3

# -----------------------------------------------------------------------------
# MONITORING
# -----------------------------------------------------------------------------
# Enable healthcheck pings (for services like healthchecks.io)
restic_healthcheck_enabled: false
restic_healthcheck_url: ''

# Send email on failure
restic_email_on_failure: false
restic_email_recipient: ''
restic_email_sender: "restic@{{ ansible_facts['fqdn'] }}"
