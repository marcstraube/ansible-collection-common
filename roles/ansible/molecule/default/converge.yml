---
- name: Converge
  hosts: all
  become: true
  gather_facts: true

  vars:
    ansible_tools_enabled: true
    ansible_tools_install_ansible: true
    ansible_tools_install_molecule: true
    ansible_tools_install_lint: true

  pre_tasks:
    - name: Update package cache (Arch)
      community.general.pacman:
        update_cache: true
        upgrade: true
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Enable EPEL repository (Rocky)
      ansible.builtin.dnf:
        name: epel-release
        state: present
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Create aur_builder user for AUR packages (Arch)
      ansible.builtin.user:
        name: aur_builder
        group: wheel
        create_home: true
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Allow aur_builder passwordless sudo (Arch)
      ansible.builtin.lineinfile:
        path: /etc/sudoers.d/99-aur_builder
        line: 'aur_builder ALL=(ALL) NOPASSWD: /usr/bin/pacman'
        create: true
        mode: '0440'
      when: ansible_facts['os_family'] == 'Archlinux'

  roles:
    - role: "{{ playbook_dir }}/../../../python"  # noqa: role-name[path]

  tasks:
    - name: Include ansible role  # noqa: role-name[path]
      ansible.builtin.include_role:
        name: '{{ playbook_dir }}/../..'
