---
- name: Converge
  hosts: all
  gather_facts: true

  vars:
    ansible_tools_enabled: true
    ansible_tools_ansible_enabled: true
    ansible_tools_molecule_enabled: true
    ansible_tools_lint_enabled: true

  roles:
    - role: "{{ playbook_dir }}/../../../python"  # noqa: role-name[path]

  tasks:
    - name: Converge | Include ansible role  # noqa: role-name[path]
      ansible.builtin.include_role:
        name: '{{ playbook_dir }}/../..'
