---
#
# Role Control
#

# Enable the ansible role
ansible_tools_enabled: true

#
# Components
#

# Enable Ansible install (ansible on Arch/Debian, ansible-core on RedHat)
ansible_tools_ansible_enabled: true

# Enable Molecule testing framework install
ansible_tools_molecule_enabled: true

# Container driver to install: 'podman' (default) or 'docker'
# Set to '' to skip driver installation
ansible_tools_container_driver: 'podman'

# Enable linting tools install (ansible-lint, yamllint)
ansible_tools_lint_enabled: true

# Extra pipx-injected plugins (Debian/RedHat only, ignored on Archlinux)
# Example:
#   - 'molecule-plugins[vagrant]'
ansible_tools_extra_plugins: []
