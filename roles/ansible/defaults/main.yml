---
# =============================================================================
# Ansible Tools Configuration
# =============================================================================
# Role: marcstraube.common.ansible
# Description: Install Ansible, Molecule, linting tools and container drivers
# Supported: Archlinux, RedHat, Debian
# =============================================================================

# =============================================================================
# ROLE CONTROL
# =============================================================================

ansible_tools_enabled: true

# =============================================================================
# COMPONENTS
# =============================================================================

# Install Ansible (ansible on Arch/Debian, ansible-core on RedHat)
ansible_tools_install_ansible: true

# Install Molecule testing framework
ansible_tools_install_molecule: true

# Container driver to install: 'podman' (default) or 'docker'
# Set to '' to skip driver installation
ansible_tools_container_driver: 'podman'

# Install linting tools (ansible-lint, yamllint)
ansible_tools_install_lint: true

# Extra pipx-injected plugins (Debian/RedHat only, ignored on Archlinux)
# Example:
#   - 'molecule-plugins[vagrant]'
ansible_tools_extra_plugins: []
