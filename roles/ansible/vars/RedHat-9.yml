---
__ansible_tools_ansible_packages:
  - 'ansible-core'

__ansible_tools_molecule_pipx_package: 'molecule'

__ansible_tools_podman_pipx_inject: 'molecule-plugins[podman]'

__ansible_tools_docker_pipx_inject: 'molecule-plugins[docker]'

# Python role installs bootstrap pipx at /opt/pipx-bootstrap/bin/pipx
# because EPEL pipx 1.2.1 on Rocky 9 is too old for community.general.pipx
__ansible_tools_pipx_cmd: '/opt/pipx-bootstrap/bin/pipx'
