---
# =============================================================================
# Logrotate - Log Rotation Management
# =============================================================================

# -----------------------------------------------------------------------------
# SERVICE CONTROL
# -----------------------------------------------------------------------------

# Enable/disable the logrotate role
logrotate_enabled: true

# -----------------------------------------------------------------------------
# GLOBAL CONFIGURATION (/etc/logrotate.conf)
# -----------------------------------------------------------------------------

# Rotation frequency: daily, weekly, monthly, yearly
logrotate_frequency: 'weekly'

# Number of rotated files to keep
logrotate_rotate: 4

# Create new (empty) log files after rotating old ones
logrotate_create: true

# Use date extension for rotated files (instead of numeric suffix)
logrotate_dateext: true

# Date format for rotated files (see man logrotate: %Y %m %d %H %s)
logrotate_dateformat: '-%Y%m%d'

# Compress rotated files
logrotate_compress: true

# Delay compression to next rotation cycle (keeps one uncompressed for services
# that may still write to the old file briefly after rotation)
logrotate_delaycompress: true

# Skip rotation of empty log files
logrotate_notifempty: true

# Do not mail rotated logs
logrotate_nomail: true

# Treat missing log files as non-error
logrotate_missingok: true

# Run pre/postrotate scripts once (not per matching file)
logrotate_sharedscripts: true

# Run logrotate as specific user/group (su directive)
# Required when log directories are not owned by root
# Example: logrotate_su: 'root adm'
logrotate_su: ''

# Move rotated files to this directory (empty = same directory)
logrotate_olddir: ''

# Additional taboo extensions to skip (appended to built-in defaults)
# Arch Linux default includes .pacorig .pacnew .pacsave via OS vars
logrotate_tabooext: '{{ __logrotate_tabooext | default("") }}'

# Maximum age in days for rotated files (empty = no limit)
logrotate_maxage: ''

# Minimum size before rotation (empty = no minimum)
logrotate_minsize: ''

# Maximum size triggering rotation regardless of interval (empty = no limit)
logrotate_maxsize: ''

# Size-based rotation instead of time-based (empty = use frequency)
logrotate_size: ''

# -----------------------------------------------------------------------------
# CUSTOM LOG CONFIGURATIONS
# List of custom log rotation rules deployed to /etc/logrotate.d/
# -----------------------------------------------------------------------------
logrotate_configs: []
# Example:
#   - name: 'myapp'
#     path: '/var/log/myapp/*.log'
#     options:
#       frequency: 'daily'
#       rotate: 7
#       compress: true
#       delaycompress: true
#       missingok: true
#       notifempty: true
#       create: '0640 myapp myapp'
#       sharedscripts: true
#       su: 'root adm'
#       olddir: '/var/log/myapp/old'
#       copytruncate: false
#       dateext: true
#       dateformat: '-%Y%m%d'
#       maxage: 90
#       minsize: '1M'
#       maxsize: '100M'
#       size: ''
#     postrotate: |
#       systemctl reload myapp > /dev/null 2>&1 || true
#     prerotate: ''

# -----------------------------------------------------------------------------
# TIMER CONFIGURATION (systemd)
# -----------------------------------------------------------------------------

# Override systemd timer schedule (empty = distro default, usually daily)
# Example: '*-*-* 02:00:00' for 2 AM daily
logrotate_timer_oncalendar: ''
