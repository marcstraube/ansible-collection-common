---
- name: Verify
  hosts: all
  become: true
  gather_facts: true

  tasks:
    # ==========================================================================
    # PACKAGE VERIFICATION
    # ==========================================================================
    - name: Check logrotate package is installed
      ansible.builtin.package:
        name: logrotate
        state: present
      check_mode: true
      register: pkg_check
      failed_when: pkg_check.changed

    # ==========================================================================
    # CONFIGURATION FILES - MAIN
    # ==========================================================================
    - name: Check main logrotate.conf exists
      ansible.builtin.stat:
        path: /etc/logrotate.conf
      register: main_config

    - name: Verify main config exists with correct permissions
      ansible.builtin.assert:
        that:
          - main_config.stat.exists
          - main_config.stat.mode == '0644'
          - main_config.stat.pw_name == 'root'
          - main_config.stat.gr_name == 'root'
        fail_msg: 'Main logrotate.conf does not exist or has incorrect permissions'

    - name: Check logrotate.d directory exists
      ansible.builtin.stat:
        path: /etc/logrotate.d
      register: config_dir

    - name: Verify logrotate.d directory exists with correct permissions
      ansible.builtin.assert:
        that:
          - config_dir.stat.exists
          - config_dir.stat.isdir
          - config_dir.stat.mode == '0755'
        fail_msg: '/etc/logrotate.d does not exist or has incorrect permissions'

    # ==========================================================================
    # CONFIGURATION CONTENT - MAIN
    # ==========================================================================
    - name: Read main logrotate.conf
      ansible.builtin.slurp:
        src: /etc/logrotate.conf
      register: main_content

    - name: Set main config content fact
      ansible.builtin.set_fact:
        main_conf: "{{ main_content.content | b64decode }}"

    - name: Verify main config contains ansible_managed header
      ansible.builtin.assert:
        that:
          - "'Ansible managed' in main_conf"
        fail_msg: 'Main logrotate.conf missing ansible_managed header'

    - name: Verify main config contains global settings
      ansible.builtin.assert:
        that:
          - "'daily' in main_conf"
          - "'rotate 7' in main_conf"
          - "'compress' in main_conf"
          - "'delaycompress' in main_conf"
          - "'notifempty' in main_conf"
          - "'missingok' in main_conf"
          - "'nomail' in main_conf"
          - "'sharedscripts' in main_conf"
          - "'su root adm' in main_conf"
          - "'include /etc/logrotate.d' in main_conf"
        fail_msg: 'Main logrotate.conf does not contain expected global settings'

    - name: Verify Arch tabooext in main config
      ansible.builtin.assert:
        that:
          - "'tabooext + .pacorig .pacnew .pacsave' in main_conf"
        fail_msg: 'Main logrotate.conf missing Arch tabooext'
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Verify no tabooext on non-Arch
      ansible.builtin.assert:
        that:
          - "'tabooext' not in main_conf"
        fail_msg: 'Main logrotate.conf should not have tabooext on non-Arch'
      when: ansible_facts['os_family'] != 'Archlinux'

    # ==========================================================================
    # CONFIGURATION FILES - CUSTOM DROP-IN
    # ==========================================================================
    - name: Check custom testapp config exists
      ansible.builtin.stat:
        path: /etc/logrotate.d/testapp
      register: custom_config

    - name: Verify custom config exists with correct permissions
      ansible.builtin.assert:
        that:
          - custom_config.stat.exists
          - custom_config.stat.mode == '0644'
          - custom_config.stat.pw_name == 'root'
          - custom_config.stat.gr_name == 'root'
        fail_msg: '/etc/logrotate.d/testapp does not exist or has incorrect permissions'

    # ==========================================================================
    # CONFIGURATION CONTENT - CUSTOM DROP-IN
    # ==========================================================================
    - name: Read custom testapp config
      ansible.builtin.slurp:
        src: /etc/logrotate.d/testapp
      register: custom_content

    - name: Set custom config content fact
      ansible.builtin.set_fact:
        custom_conf: "{{ custom_content.content | b64decode }}"

    - name: Verify custom config contains ansible_managed header
      ansible.builtin.assert:
        that:
          - "'Ansible managed' in custom_conf"
        fail_msg: 'Custom config missing ansible_managed header'

    - name: Verify custom config contains expected settings
      ansible.builtin.assert:
        that:
          - "'/var/log/testapp/*.log' in custom_conf"
          - "'rotate 14' in custom_conf"
          - "'daily' in custom_conf"
          - "'compress' in custom_conf"
          - "'delaycompress' in custom_conf"
          - "'missingok' in custom_conf"
          - "'notifempty' in custom_conf"
          - "'create 0640 root root' in custom_conf"
          - "'sharedscripts' in custom_conf"
          - "'su root adm' in custom_conf"
          - "'maxage 90' in custom_conf"
        fail_msg: 'Custom logrotate config content is incorrect'

    - name: Verify custom config contains postrotate script
      ansible.builtin.assert:
        that:
          - "'postrotate' in custom_conf"
          - "'endscript' in custom_conf"
        fail_msg: 'Custom config does not contain postrotate script'

    # ==========================================================================
    # CONFIGURATION VALIDATION
    # ==========================================================================
    - name: Test logrotate syntax validation (debug mode)
      ansible.builtin.command: logrotate -d /etc/logrotate.conf
      register: logrotate_debug
      changed_when: false
      failed_when: logrotate_debug.rc != 0

    - name: Verify logrotate debug output contains expected files
      ansible.builtin.assert:
        that:
          - "'/var/log/testapp/*.log' in logrotate_debug.stderr"
        fail_msg: 'Logrotate debug mode did not include custom testapp config'

    # ==========================================================================
    # SERVICE VERIFICATION
    # ==========================================================================
    - name: Check logrotate timer is enabled
      ansible.builtin.systemd:
        name: logrotate.timer
        enabled: true
      check_mode: true
      register: timer_enabled
      failed_when: timer_enabled.changed

    - name: Check logrotate timer is running
      ansible.builtin.systemd:
        name: logrotate.timer
        state: started
      check_mode: true
      register: timer_running
      failed_when: timer_running.changed

    - name: Get logrotate timer status
      ansible.builtin.command: systemctl status logrotate.timer
      register: timer_status
      changed_when: false
      failed_when: false

    - name: Verify timer is active
      ansible.builtin.assert:
        that:
          - "'active' in timer_status.stdout"
        fail_msg: 'Logrotate timer is not active'
