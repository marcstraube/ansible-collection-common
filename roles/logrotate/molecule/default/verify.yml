---
- name: Verify
  hosts: all
  gather_facts: true

  tasks:
    #
    # Load OS-Specific Variables
    #

    - name: Verify | Load OS-specific variables
      ansible.builtin.include_vars: '{{ item }}'
      with_first_found:
        - files:
            - '{{ ansible_facts["distribution"] }}-{{ ansible_facts["distribution_major_version"] }}.yml'
            - '{{ ansible_facts["os_family"] }}-{{ ansible_facts["distribution_major_version"] }}.yml'
            - '{{ ansible_facts["distribution"] }}.yml'
            - '{{ ansible_facts["os_family"] }}.yml'
          paths:
            - '../../vars'

    #
    # Package Verification
    #

    - name: Verify | Check logrotate package is installed
      ansible.builtin.package:
        name: logrotate
        state: present
      check_mode: true
      register: __logrotate_pkg_check
      failed_when: __logrotate_pkg_check.changed

    #
    # Configuration Files - Main
    #

    - name: Verify | Check main logrotate.conf exists
      ansible.builtin.stat:
        path: '{{ __logrotate_config_file }}'
      register: __logrotate_main_config

    - name: Verify | Assert main config exists with correct permissions
      ansible.builtin.assert:
        that:
          - __logrotate_main_config.stat.exists
          - __logrotate_main_config.stat.mode == '0644'
          - __logrotate_main_config.stat.pw_name == 'root'
          - __logrotate_main_config.stat.gr_name == 'root'
        fail_msg: 'Main logrotate.conf does not exist or has incorrect permissions'

    - name: Verify | Check logrotate.d directory exists
      ansible.builtin.stat:
        path: '{{ __logrotate_config_dir }}'
      register: __logrotate_config_dir_stat

    - name: Verify | Assert logrotate.d directory exists with correct permissions
      ansible.builtin.assert:
        that:
          - __logrotate_config_dir_stat.stat.exists
          - __logrotate_config_dir_stat.stat.isdir
          - __logrotate_config_dir_stat.stat.mode == '0755'
        fail_msg: '/etc/logrotate.d does not exist or has incorrect permissions'

    #
    # Configuration Content - Main
    #

    - name: Verify | Read main logrotate.conf
      ansible.builtin.slurp:
        src: '{{ __logrotate_config_file }}'
      register: __logrotate_main_content

    - name: Verify | Set main config content fact
      ansible.builtin.set_fact:
        __logrotate_main_conf: "{{ __logrotate_main_content.content | b64decode }}"

    - name: Verify | Assert main config contains ansible_managed header
      ansible.builtin.assert:
        that:
          - "'Ansible managed' in __logrotate_main_conf"
        fail_msg: 'Main logrotate.conf missing ansible_managed header'

    - name: Verify | Assert main config contains global settings
      ansible.builtin.assert:
        that:
          - "'daily' in __logrotate_main_conf"
          - "'rotate 7' in __logrotate_main_conf"
          - "'compress' in __logrotate_main_conf"
          - "'delaycompress' in __logrotate_main_conf"
          - "'notifempty' in __logrotate_main_conf"
          - "'missingok' in __logrotate_main_conf"
          - "'nomail' in __logrotate_main_conf"
          - "'sharedscripts' in __logrotate_main_conf"
          - "'su root adm' in __logrotate_main_conf"
          - "'include /etc/logrotate.d' in __logrotate_main_conf"
        fail_msg: 'Main logrotate.conf does not contain expected global settings'

    - name: Verify | Assert Arch tabooext in main config
      ansible.builtin.assert:
        that:
          - "'tabooext + .pacorig .pacnew .pacsave' in __logrotate_main_conf"
        fail_msg: 'Main logrotate.conf missing Arch tabooext'
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Verify | Assert no tabooext on non-Arch
      ansible.builtin.assert:
        that:
          - "'tabooext' not in __logrotate_main_conf"
        fail_msg: 'Main logrotate.conf should not have tabooext on non-Arch'
      when: ansible_facts['os_family'] != 'Archlinux'

    #
    # Configuration Files - Custom Drop-In
    #

    - name: Verify | Check custom testapp config exists
      ansible.builtin.stat:
        path: '{{ __logrotate_config_dir }}/testapp'
      register: __logrotate_custom_config

    - name: Verify | Assert custom config exists with correct permissions
      ansible.builtin.assert:
        that:
          - __logrotate_custom_config.stat.exists
          - __logrotate_custom_config.stat.mode == '0644'
          - __logrotate_custom_config.stat.pw_name == 'root'
          - __logrotate_custom_config.stat.gr_name == 'root'
        fail_msg: '/etc/logrotate.d/testapp does not exist or has incorrect permissions'

    #
    # Configuration Content - Custom Drop-In
    #

    - name: Verify | Read custom testapp config
      ansible.builtin.slurp:
        src: '{{ __logrotate_config_dir }}/testapp'
      register: __logrotate_custom_content

    - name: Verify | Set custom config content fact
      ansible.builtin.set_fact:
        __logrotate_custom_conf: "{{ __logrotate_custom_content.content | b64decode }}"

    - name: Verify | Assert custom config contains ansible_managed header
      ansible.builtin.assert:
        that:
          - "'Ansible managed' in __logrotate_custom_conf"
        fail_msg: 'Custom config missing ansible_managed header'

    - name: Verify | Assert custom config contains expected settings
      ansible.builtin.assert:
        that:
          - "'/var/log/testapp/*.log' in __logrotate_custom_conf"
          - "'rotate 14' in __logrotate_custom_conf"
          - "'daily' in __logrotate_custom_conf"
          - "'compress' in __logrotate_custom_conf"
          - "'delaycompress' in __logrotate_custom_conf"
          - "'missingok' in __logrotate_custom_conf"
          - "'notifempty' in __logrotate_custom_conf"
          - "'create 0640 root root' in __logrotate_custom_conf"
          - "'sharedscripts' in __logrotate_custom_conf"
          - "'su root adm' in __logrotate_custom_conf"
          - "'maxage 90' in __logrotate_custom_conf"
        fail_msg: 'Custom logrotate config content is incorrect'

    - name: Verify | Assert custom config contains postrotate script
      ansible.builtin.assert:
        that:
          - "'postrotate' in __logrotate_custom_conf"
          - "'endscript' in __logrotate_custom_conf"
        fail_msg: 'Custom config does not contain postrotate script'

    #
    # Configuration Validation
    #

    - name: Verify | Test logrotate syntax validation (debug mode)
      ansible.builtin.command: logrotate -d /etc/logrotate.conf
      register: __logrotate_debug
      changed_when: false
      failed_when: __logrotate_debug.rc != 0

    - name: Verify | Assert logrotate debug output contains expected files
      ansible.builtin.assert:
        that:
          - "'/var/log/testapp/*.log' in __logrotate_debug.stderr"
        fail_msg: 'Logrotate debug mode did not include custom testapp config'

    #
    # Service Verification
    #

    - name: Verify | Check logrotate timer is enabled and running
      ansible.builtin.systemd_service:
        name: '{{ __logrotate_timer_name }}'
      register: __logrotate_timer_check

    - name: Verify | Assert logrotate timer is active and enabled
      ansible.builtin.assert:
        that:
          - __logrotate_timer_check.status.ActiveState == 'active'
          - __logrotate_timer_check.status.UnitFileState == 'enabled'
        fail_msg: 'Logrotate timer is not active or enabled'
