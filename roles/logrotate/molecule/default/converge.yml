---
- name: Converge
  hosts: all
  gather_facts: true

  vars:
    logrotate_enabled: true
    logrotate_frequency: 'daily'
    logrotate_rotate: 7
    logrotate_compress: true
    logrotate_delaycompress: true
    logrotate_su: 'root adm'
    logrotate_configs:
      - name: 'testapp'
        path: '/var/log/testapp/*.log'
        options:
          frequency: 'daily'
          rotate: 14
          compress: true
          delaycompress: true
          missingok: true
          notifempty: true
          create: '0640 root root'
          sharedscripts: true
          su: 'root adm'
          maxage: 90
        postrotate: |
          true

  tasks:
    - name: Converge | Create test log directory
      ansible.builtin.file:
        path: '/var/log/testapp'
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Converge | Include logrotate role  # noqa: role-name[path]
      ansible.builtin.include_role:
        name: '{{ playbook_dir }}/../..'
