---
- name: Prepare
  hosts: all
  become: true
  gather_facts: true

  vars:
    __prepare_packages:
      Archlinux: []
      Debian:
        - systemd
        - procps
      RedHat:
        - systemd
        - procps-ng

  tasks:
    - name: Prepare | Update package cache (Arch)
      community.general.pacman:
        update_cache: true
        upgrade: true
      retries: 3
      delay: 5
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Prepare | Update package cache (Debian)
      ansible.builtin.apt:
        update_cache: true
      retries: 3
      delay: 5
      when: ansible_facts['os_family'] == 'Debian'

    - name: Prepare | Update package cache (RedHat)
      ansible.builtin.dnf:
        update_cache: true
      retries: 3
      delay: 5
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Prepare | Install container dependencies
      ansible.builtin.package:
        name: '{{ __prepare_packages[ansible_facts["os_family"]] }}'
        state: present
      retries: 3
      delay: 5
      when: __prepare_packages[ansible_facts['os_family']] | length > 0
