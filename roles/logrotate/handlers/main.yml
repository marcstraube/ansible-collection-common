---
- name: Reload logrotate systemd units
  ansible.builtin.systemd_service:
    daemon_reload: true
  failed_when: false
  when: logrotate_enabled | bool

- name: Restart logrotate timer
  ansible.builtin.systemd_service:
    name: '{{ __logrotate_timer_name }}'
    state: restarted
  when: logrotate_timer_enabled | bool
