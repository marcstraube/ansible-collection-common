---
- name: Service | Manage logrotate timer
  ansible.builtin.systemd_service:
    name: '{{ __logrotate_timer_name }}'
    enabled: "{{ logrotate_timer_enabled | bool }}"
    state: "{{ logrotate_timer_enabled | bool | ternary('started', 'stopped') }}"

- name: Service | Create timer override directory
  ansible.builtin.file:
    path: '/etc/systemd/system/logrotate.timer.d'
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: logrotate_timer_oncalendar | length > 0

- name: Service | Deploy timer schedule override
  ansible.builtin.copy:
    dest: '/etc/systemd/system/logrotate.timer.d/override.conf'
    content: |
      {{ ansible_managed | comment }}

      [Timer]
      OnCalendar=
      OnCalendar={{ logrotate_timer_oncalendar }}
    owner: root
    group: root
    mode: '0644'
  notify:
    - Reload logrotate systemd units
    - Restart logrotate timer
  when: logrotate_timer_oncalendar | length > 0

- name: Service | Remove timer override when not configured
  ansible.builtin.file:
    path: '/etc/systemd/system/logrotate.timer.d/override.conf'
    state: absent
  notify:
    - Reload logrotate systemd units
    - Restart logrotate timer
  when: logrotate_timer_oncalendar | length == 0
