---
- name: Service | Deploy systemd service unit
  ansible.builtin.template:
    src: lynis-audit.service.j2
    dest: '/etc/systemd/system/lynis-audit.service'
    owner: root
    group: root
    mode: '0644'
  notify: Reload lynis systemd units

- name: Service | Deploy systemd timer unit
  ansible.builtin.template:
    src: lynis-audit.timer.j2
    dest: '/etc/systemd/system/lynis-audit.timer'
    owner: root
    group: root
    mode: '0644'
  notify:
    - Reload lynis systemd units
    - Restart lynis timer

- name: Service | Manage lynis timer
  ansible.builtin.systemd_service:
    name: '{{ __lynis_timer_name }}'
    enabled: "{{ lynis_timer_enabled | bool }}"
    state: "{{ lynis_timer_enabled | bool | ternary('started', 'stopped') }}"
    daemon_reload: true
