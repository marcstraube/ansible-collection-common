---
- name: Install | Lynis packages
  ansible.builtin.package:
    name: '{{ __lynis_packages }}'
    state: present
  retries: 3
  delay: 5
  when:
    - lynis_install_method == 'package'
    - __lynis_packages | length > 0

- name: Install | Git package for lynis download
  ansible.builtin.package:
    name: git
    state: present
  retries: 3
  delay: 5
  when: lynis_install_method == 'git'

- name: Install | Clone lynis from GitHub
  ansible.builtin.git:
    repo: '{{ lynis_git_repo }}'
    dest: '{{ lynis_install_dir }}'
    version: '{{ lynis_version }}'
    update: true
  retries: 5
  delay: 10
  when: lynis_install_method == 'git'

- name: Install | Create lynis symlink
  ansible.builtin.file:
    src: '{{ lynis_install_dir }}/lynis'
    dest: '/usr/local/bin/lynis'
    state: link
    owner: root
    group: root
    mode: '0755'
  when: lynis_install_method == 'git'
