---
- name: Converge
  hosts: all
  gather_facts: true

  pre_tasks:
    - name: Converge | Set git install method for EL 10
      ansible.builtin.set_fact:
        lynis_install_method: 'git'
      when:
        - ansible_facts['os_family'] == 'RedHat'
        - ansible_facts['distribution_major_version'] == '10'

  vars:
    lynis_enabled: true
    lynis_timer_enabled: true
    lynis_machine_role: 'server'
    lynis_min_hardening_index: 50
    lynis_compliance_enabled: true
    lynis_compliance_standards:
      - 'iso27001'
    lynis_skip_tests:
      - 'BOOT-5122'

  tasks:
    - name: Converge | Include lynis role  # noqa: role-name[path]
      ansible.builtin.include_role:
        name: '{{ playbook_dir }}/../..'
