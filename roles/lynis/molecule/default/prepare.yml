---
- name: Prepare
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Prepare | Full system update (Arch)
      community.general.pacman:
        update_cache: true
        upgrade: true
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Prepare | Update package cache (Debian)
      ansible.builtin.apt:
        update_cache: true
      when: ansible_facts['os_family'] == 'Debian'

    - name: Prepare | Enable EPEL repository (EL 9)
      ansible.builtin.dnf:
        name: epel-release
        state: present
      when:
        - ansible_facts['os_family'] == 'RedHat'
        - ansible_facts['distribution_major_version'] == '9'

    - name: Prepare | Update package cache (RedHat)
      ansible.builtin.dnf:
        update_cache: true
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Prepare | Install git for EL 10 (git install method)
      ansible.builtin.package:
        name: git
        state: present
      when:
        - ansible_facts['os_family'] == 'RedHat'
        - ansible_facts['distribution_major_version'] == '10'
