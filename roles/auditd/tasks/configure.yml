---
- name: Configure | auditd.conf
  ansible.builtin.template:
    src: 'auditd.conf.j2'
    dest: '/etc/audit/auditd.conf'
    owner: root
    group: root
    mode: '0640'
  notify: Reload auditd config

- name: Configure | Syslog plugin
  ansible.builtin.template:
    src: 'syslog.conf.j2'
    dest: '/etc/audit/plugins.d/syslog.conf'
    owner: root
    group: root
    mode: '0640'
  notify: Reload auditd config
  when: auditd_plugin_syslog_enabled | bool
