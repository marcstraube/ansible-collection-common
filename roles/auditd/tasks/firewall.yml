---
# failed_when: false — firewalld may not be installed on the system
- name: Firewall | Check if firewalld is running
  ansible.builtin.systemd_service:
    name: firewalld
  register: __auditd_firewalld_status
  failed_when: false

- name: Firewall | Manage auditd remote logging firewall rule
  ansible.posix.firewalld:
    port: '{{ auditd_remote_port }}/tcp'
    zone: '{{ auditd_firewalld_zone }}'
    permanent: true
    immediate: true
    state: "{{ auditd_firewalld_enabled | bool | ternary('enabled', 'disabled') }}"
  when: __auditd_firewalld_status.status.ActiveState | default('') == 'active'
