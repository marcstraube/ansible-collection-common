---
- name: Install | Auditd packages
  ansible.builtin.package:
    name: '{{ __auditd_packages }}'
    state: present
  retries: 3
  delay: 5

- name: Install | Ensure audit log directory exists
  ansible.builtin.file:
    path: '{{ auditd_log_file | dirname }}'
    state: directory
    owner: root
    group: '{{ auditd_log_group }}'
    mode: '0700'
