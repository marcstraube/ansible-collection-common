---
# Use signal names (TERM, HUP) not aliases (stop, reload) for audit 3.x compat
- name: Stop auditd via audit subsystem
  ansible.builtin.command:
    cmd: auditctl --signal TERM
  changed_when: true
  listen: Restart auditd
  when: auditd_service_enabled | bool

- name: Start auditd after signal stop
  ansible.builtin.systemd_service:
    name: '{{ __auditd_service_name }}'
    state: started
  listen: Restart auditd
  when: auditd_service_enabled | bool

  # failed_when: false — auditctl requires kernel audit subsystem (unavailable in containers)
- name: Reload auditd config
  ansible.builtin.command:
    cmd: auditctl --signal HUP
  changed_when: true
  failed_when: false
  when: auditd_service_enabled | bool

  # failed_when: false — augenrules requires kernel audit subsystem (unavailable in containers)
- name: Reload auditd rules
  ansible.builtin.command:
    cmd: augenrules --load
  changed_when: true
  failed_when: false
  when: auditd_enabled | bool
