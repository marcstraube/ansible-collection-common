---
# =============================================================================
# Firejail Configuration
# =============================================================================
# Role: marcstraube.common.firejail
# Description: Configure Firejail application sandboxing via firecfg
# =============================================================================

# =============================================================================
# ROLE CONTROL
# =============================================================================

firejail_enabled: true

# =============================================================================
# APPLICATION EXCLUSIONS
# =============================================================================

# Applications to exclude from Firejail sandboxing
# These are commented out in /etc/firejail/firecfg.config so firecfg skips them
firejail_exclude:
  - 'keepassxc'                   # Password manager needs full access
  - 'patch'                       # Breaks fakeroot/makepkg (AUR builds)
  - 'steam'                       # Gaming platform - complex requirements

# =============================================================================
# GLOBAL SETTINGS
# =============================================================================

# Global Firejail settings (/etc/firejail/firejail.config)
firejail_config:
  browser-disable-u2f: 'no'      # Allow U2F/FIDO2 hardware keys
  browser-allow-drm: 'yes'       # Allow DRM (Netflix etc.)
  restricted-network: 'no'

# AppArmor confinement for all sandboxed applications
# Requires AppArmor enabled and firejail-default profile loaded
firejail_apparmor: false

# Global profile overrides (/etc/firejail/globals.local)
# List of directives applied to ALL sandboxed applications
firejail_globals: []
# firejail_globals:
#   - 'blacklist ${HOME}/.ssh'
#   - 'blacklist ${HOME}/.gnupg'

# =============================================================================
# CUSTOM PROFILES
# =============================================================================

# Per-application profile overrides (/etc/firejail/<app>.local)
# Dict of app name -> list of profile directives
firejail_profiles: {}
# firejail_profiles:
#   firefox:
#     - 'whitelist ${HOME}/.mozilla'
#     - 'blacklist ${HOME}/.ssh'
#     - 'net none'
#     - 'private-tmp'
#   chromium:
#     - 'whitelist ${HOME}/.config/chromium'
#     - 'private-tmp'

# =============================================================================
# PACMAN HOOK (Arch Linux only)
# =============================================================================

# Install pacman hook to re-run firecfg after package installs/upgrades
firejail_pacman_hook: true
