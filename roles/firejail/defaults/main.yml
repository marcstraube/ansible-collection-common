---
#
# Role Control
#

# Enable the firejail role
firejail_enabled: true

#
# Application Exclusions
#

# Applications to exclude from Firejail sandboxing
# These are commented out in /etc/firejail/firecfg.config so firecfg skips them
firejail_exclude:
  - 'keepassxc'
  - 'patch'
  - 'steam'

#
# Global Settings
#

# Global Firejail settings (/etc/firejail/firejail.config)
firejail_config:
  browser-disable-u2f: 'no'
  browser-allow-drm: 'yes'
  restricted-network: 'no'

# Enable AppArmor confinement for all sandboxed applications
# Requires AppArmor enabled and firejail-default profile loaded
firejail_apparmor_enabled: false

# DEPRECATED: Use firejail_apparmor_enabled instead (removed in v2.0.0)
# firejail_apparmor: {{ firejail_apparmor_enabled }}

# Global profile overrides (/etc/firejail/globals.local)
# List of directives applied to ALL sandboxed applications
firejail_globals: []
# Example:
#   - 'blacklist ${HOME}/.ssh'
#   - 'blacklist ${HOME}/.gnupg'

#
# Custom Profiles
#

# Per-application profile overrides (/etc/firejail/<app>.local)
# Dict of app name -> list of profile directives
firejail_profiles: {}
# Example:
#   firefox:
#     - 'whitelist ${HOME}/.mozilla'
#     - 'blacklist ${HOME}/.ssh'
#     - 'net none'
#     - 'private-tmp'
#   chromium:
#     - 'whitelist ${HOME}/.config/chromium'
#     - 'private-tmp'

#
# Pacman Hook (Arch Linux Only)
#

# Enable pacman hook to re-run firecfg after package installs/upgrades
firejail_pacman_hook_enabled: true

# DEPRECATED: Use firejail_pacman_hook_enabled instead (removed in v2.0.0)
# firejail_pacman_hook: {{ firejail_pacman_hook_enabled }}
