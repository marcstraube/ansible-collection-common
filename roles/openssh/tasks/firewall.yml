---
- name: Firewall | Check if firewalld is running
  ansible.builtin.systemd_service:
    name: firewalld
  register: __openssh_firewalld_status
  failed_when: false

- name: Firewall | Manage SSH firewall rule
  ansible.posix.firewalld:
    service: ssh
    zone: '{{ openssh_firewalld_zone }}'
    permanent: true
    immediate: true
    state: "{{ openssh_firewalld_enabled | bool | ternary('enabled', 'disabled') }}"
  when: __openssh_firewalld_status.status.ActiveState | default('') == 'active'

- name: Firewall | Manage additional SSH port rules
  ansible.posix.firewalld:
    port: '{{ item }}/tcp'
    zone: '{{ openssh_firewalld_zone }}'
    permanent: true
    immediate: true
    state: "{{ openssh_firewalld_enabled | bool | ternary('enabled', 'disabled') }}"
  loop: '{{ openssh_server_additional_ports }}'
  when:
    - __openssh_firewalld_status.status.ActiveState | default('') == 'active'
    - openssh_server_additional_ports | length > 0
