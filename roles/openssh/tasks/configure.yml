---
- name: Configure | Ensure SFTP chroot group exists
  ansible.builtin.group:
    name: '{{ openssh_server_sftp_chroot_group }}'
    state: present
    system: true
  when: openssh_server_sftp_chroot_enabled | default(false) | bool

- name: Configure | Ensure sshd_config.d directory exists
  ansible.builtin.file:
    path: '{{ __openssh_server_config_d_dir }}'
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: Configure | Ensure sshd_config includes config.d
  ansible.builtin.lineinfile:
    path: '{{ __openssh_server_config_file }}'
    line: 'Include {{ __openssh_server_config_d_dir }}/*.conf'
    insertbefore: BOF
    state: present
  notify: 'restart sshd'

- name: Configure | Remove default Subsystem directive from sshd_config
  ansible.builtin.lineinfile:
    path: '{{ __openssh_server_config_file }}'
    regexp: '^\s*Subsystem\s+'
    state: absent
  notify: 'restart sshd'

- name: Configure | SSH server - network settings
  ansible.builtin.template:
    src: 10-network.conf.j2
    dest: '{{ __openssh_server_config_d_dir }}/10-network.conf'
    owner: root
    group: root
    mode: '0600'
    validate: 'sshd -t -f %s'
  notify: 'restart sshd'

- name: Configure | SSH server - host keys
  ansible.builtin.template:
    src: 20-hostkeys.conf.j2
    dest: '{{ __openssh_server_config_d_dir }}/20-hostkeys.conf'
    owner: root
    group: root
    mode: '0600'
    validate: 'sshd -t -f %s'
  notify: 'restart sshd'

- name: Configure | SSH server - cryptography
  ansible.builtin.template:
    src: 30-crypto.conf.j2
    dest: '{{ __openssh_server_config_d_dir }}/30-crypto.conf'
    owner: root
    group: root
    mode: '0600'
    validate: 'sshd -t -f %s'
  notify: 'restart sshd'

- name: Configure | SSH server - authentication
  ansible.builtin.template:
    src: 40-authentication.conf.j2
    dest: '{{ __openssh_server_config_d_dir }}/40-authentication.conf'
    owner: root
    group: root
    mode: '0600'
    validate: 'sshd -t -f %s'
  notify: 'restart sshd'

- name: Configure | SSH server - access control
  ansible.builtin.template:
    src: 50-access.conf.j2
    dest: '{{ __openssh_server_config_d_dir }}/50-access.conf'
    owner: root
    group: root
    mode: '0600'
    validate: 'sshd -t -f %s'
  notify: 'restart sshd'

- name: Configure | SSH server - session settings
  ansible.builtin.template:
    src: 60-session.conf.j2
    dest: '{{ __openssh_server_config_d_dir }}/60-session.conf'
    owner: root
    group: root
    mode: '0600'
    validate: 'sshd -t -f %s'
  notify: 'restart sshd'

- name: Configure | SSH server - forwarding
  ansible.builtin.template:
    src: 70-forwarding.conf.j2
    dest: '{{ __openssh_server_config_d_dir }}/70-forwarding.conf'
    owner: root
    group: root
    mode: '0600'
    validate: 'sshd -t -f %s'
  notify: 'restart sshd'

- name: Configure | SSH server - subsystems
  ansible.builtin.template:
    src: 80-subsystems.conf.j2
    dest: '{{ __openssh_server_config_d_dir }}/80-subsystems.conf'
    owner: root
    group: root
    mode: '0600'
    validate: 'sshd -t -f %s'
  notify: 'restart sshd'

- name: Configure | SSH server - logging
  ansible.builtin.template:
    src: 85-logging.conf.j2
    dest: '{{ __openssh_server_config_d_dir }}/85-logging.conf'
    owner: root
    group: root
    mode: '0600'
    validate: 'sshd -t -f %s'
  notify: 'restart sshd'

- name: Configure | SSH server - match blocks
  ansible.builtin.template:
    src: 90-match.conf.j2
    dest: '{{ __openssh_server_config_d_dir }}/90-match.conf'
    owner: root
    group: root
    mode: '0600'
    validate: 'sshd -t -f %s'
  when: openssh_server_match_blocks | length > 0 or (openssh_server_sftp_chroot_enabled | default(false) | bool)
  notify: 'restart sshd'

- name: Configure | Remove match blocks config if not needed
  ansible.builtin.file:
    path: '{{ __openssh_server_config_d_dir }}/90-match.conf'
    state: absent
  when: openssh_server_match_blocks | length == 0 and not (openssh_server_sftp_chroot_enabled | default(false) | bool)
  notify: 'restart sshd'

- name: Configure | SSH banner
  ansible.builtin.copy:
    content: '{{ openssh_server_banner_content }}'
    dest: '{{ openssh_server_banner_file }}'
    owner: root
    group: root
    mode: '0644'
  when: openssh_server_banner_enabled | bool

- name: Configure | Generate SSHFP records
  ansible.builtin.command:
    cmd: 'ssh-keygen -r {{ openssh_server_sshfp_hostname }}'
  register: __openssh_sshfp_records
  changed_when: false
  when: openssh_server_generate_sshfp_records_enabled | bool

- name: Configure | Display SSHFP records
  ansible.builtin.debug:
    msg: '{{ __openssh_sshfp_records.stdout_lines }}'
  when:
    - openssh_server_generate_sshfp_records_enabled | bool
    - __openssh_sshfp_records.stdout_lines is defined
