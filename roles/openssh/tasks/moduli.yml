---
- name: Moduli | Check for weak moduli
  ansible.builtin.shell:
    cmd: "set -o pipefail && awk '$5 < {{ openssh_server_moduli_minimum_size }}' {{ __openssh_moduli_file }} | wc -l"
    executable: /bin/bash
  register: __openssh_weak_moduli
  changed_when: false
  failed_when: false

- name: Moduli | Remove weak Diffie-Hellman moduli
  when: __openssh_weak_moduli.stdout | int > 0
  block:
    - name: Moduli | Filter weak moduli to temporary file
      ansible.builtin.shell:
        cmd: >-
          awk '$5 >= {{ openssh_server_moduli_minimum_size }}'
          {{ __openssh_moduli_file }} > {{ __openssh_moduli_file }}.safe
      changed_when: true

    - name: Moduli | Install hardened moduli file
      ansible.builtin.copy:
        src: "{{ __openssh_moduli_file }}.safe"
        remote_src: true
        dest: "{{ __openssh_moduli_file }}"
        owner: 'root'
        group: 'root'
        mode: '0644'
        backup: true
      notify: 'restart sshd'

    - name: Moduli | Remove temporary moduli file
      ansible.builtin.file:
        path: "{{ __openssh_moduli_file }}.safe"
        state: absent
