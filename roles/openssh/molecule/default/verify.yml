---
- name: Verify
  hosts: all
  gather_facts: true

  tasks:
    # ==========================================================================
    # PACKAGE VERIFICATION
    # ==========================================================================
    - name: Set package name fact
      ansible.builtin.set_fact:
        openssh_package: "{{ 'openssh' if ansible_facts['os_family'] == 'Archlinux' else 'openssh-server' }}"

    - name: Check OpenSSH package is installed
      ansible.builtin.package:
        name: "{{ openssh_package }}"
        state: present
      check_mode: true
      register: pkg_check
      failed_when: pkg_check.changed

    # ==========================================================================
    # CONFIGURATION DIRECTORY
    # ==========================================================================
    - name: Check sshd_config.d directory exists
      ansible.builtin.stat:
        path: /etc/ssh/sshd_config.d
      register: config_d_dir

    - name: Verify sshd_config.d directory
      ansible.builtin.assert:
        that:
          - config_d_dir.stat.exists
          - config_d_dir.stat.isdir
          - config_d_dir.stat.mode == '0700'
        fail_msg: '/etc/ssh/sshd_config.d missing or wrong permissions'

    # ==========================================================================
    # CONFIGURATION FILES EXIST
    # ==========================================================================
    - name: Check all config snippets exist
      ansible.builtin.stat:
        path: '/etc/ssh/sshd_config.d/{{ item }}'
      register: config_files
      loop:
        - '10-network.conf'
        - '20-hostkeys.conf'
        - '30-crypto.conf'
        - '40-authentication.conf'
        - '50-access.conf'
        - '60-session.conf'
        - '70-forwarding.conf'
        - '80-subsystems.conf'
        - '85-logging.conf'
        - '90-match.conf'

    - name: Verify all config snippets exist
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.mode == '0644'
        fail_msg: '{{ item.item }} missing or wrong permissions'
      loop: "{{ config_files.results }}"
      loop_control:
        label: "{{ item.item }}"

    # ==========================================================================
    # AUTHENTICATION CONFIG CONTENT
    # ==========================================================================
    - name: Read authentication config
      ansible.builtin.slurp:
        src: /etc/ssh/sshd_config.d/40-authentication.conf
      register: auth_content

    - name: Verify authentication settings
      ansible.builtin.assert:
        that:
          - "'PermitRootLogin no' in (auth_content.content | b64decode)"
          - "'PasswordAuthentication no' in (auth_content.content | b64decode)"
          - "'MaxAuthTries 3' in (auth_content.content | b64decode)"
          - "'KbdInteractiveAuthentication no' in (auth_content.content | b64decode)"
          - "'UsePAM yes' in (auth_content.content | b64decode)"
        fail_msg: 'Authentication config incorrect'

    - name: Verify ChallengeResponseAuthentication is removed
      ansible.builtin.assert:
        that:
          - "'ChallengeResponseAuthentication' not in (auth_content.content | b64decode)"
        fail_msg: 'Deprecated ChallengeResponseAuthentication still present'

    # ==========================================================================
    # CRYPTO CONFIG CONTENT
    # ==========================================================================
    - name: Read crypto config
      ansible.builtin.slurp:
        src: /etc/ssh/sshd_config.d/30-crypto.conf
      register: crypto_content

    - name: Verify crypto settings
      ansible.builtin.assert:
        that:
          - "'curve25519-sha256' in (crypto_content.content | b64decode)"
          - "'chacha20-poly1305@openssh.com' in (crypto_content.content | b64decode)"
          - "'hmac-sha2-512-etm@openssh.com' in (crypto_content.content | b64decode)"
        fail_msg: 'Crypto config incorrect'

    - name: Verify auto-derived host key algorithms
      ansible.builtin.assert:
        that:
          - "'ssh-ed25519' in (crypto_content.content | b64decode)"
          - "'rsa-sha2-512' in (crypto_content.content | b64decode)"
        fail_msg: 'Auto-derived host key algorithms missing'

    - name: Verify RequiredRSASize on supported platforms
      ansible.builtin.assert:
        that:
          - "'RequiredRSASize 3072' in (crypto_content.content | b64decode)"
        fail_msg: 'RequiredRSASize missing on supported platform'
      when: >-
        not (ansible_facts['os_family'] == 'RedHat'
             and ansible_facts['distribution_major_version'] | int < 10)

    - name: Verify RequiredRSASize absent on Rocky 9
      ansible.builtin.assert:
        that:
          - "'RequiredRSASize' not in (crypto_content.content | b64decode)"
        fail_msg: 'RequiredRSASize should not be present on Rocky 9'
      when: >-
        ansible_facts['os_family'] == 'RedHat'
        and ansible_facts['distribution_major_version'] | int < 10

    # ==========================================================================
    # ACCESS CONTROL CONTENT
    # ==========================================================================
    - name: Read access config
      ansible.builtin.slurp:
        src: /etc/ssh/sshd_config.d/50-access.conf
      register: access_content

    - name: Verify access control settings
      ansible.builtin.assert:
        that:
          - "'AllowGroups wheel sudo' in (access_content.content | b64decode)"
        fail_msg: 'Access config incorrect'

    # ==========================================================================
    # SESSION CONFIG CONTENT
    # ==========================================================================
    - name: Read session config
      ansible.builtin.slurp:
        src: /etc/ssh/sshd_config.d/60-session.conf
      register: session_content

    - name: Verify session settings
      ansible.builtin.assert:
        that:
          - "'ClientAliveInterval 300' in (session_content.content | b64decode)"
          - "'ClientAliveCountMax 3' in (session_content.content | b64decode)"
          - "'Banner /etc/ssh/banner' in (session_content.content | b64decode)"
          - "'AcceptEnv LANG LC_*' in (session_content.content | b64decode)"
        fail_msg: 'Session config incorrect'

    - name: Verify PrintLastLog absent on platforms where removed
      ansible.builtin.assert:
        that:
          - "'PrintLastLog' not in (session_content.content | b64decode)"
        fail_msg: 'PrintLastLog should not be present on this platform'
      when: >-
        ansible_facts['os_family'] != 'RedHat'
        or ansible_facts['distribution_major_version'] | int >= 10

    # ==========================================================================
    # FORWARDING CONFIG CONTENT
    # ==========================================================================
    - name: Read forwarding config
      ansible.builtin.slurp:
        src: /etc/ssh/sshd_config.d/70-forwarding.conf
      register: fwd_content

    - name: Verify forwarding disabled by default
      ansible.builtin.assert:
        that:
          - "'AllowTcpForwarding no' in (fwd_content.content | b64decode)"
          - "'AllowAgentForwarding no' in (fwd_content.content | b64decode)"
          - "'X11Forwarding no' in (fwd_content.content | b64decode)"
        fail_msg: 'Forwarding should be disabled'

    # ==========================================================================
    # MATCH BLOCKS
    # ==========================================================================
    - name: Read match config
      ansible.builtin.slurp:
        src: /etc/ssh/sshd_config.d/90-match.conf
      register: match_content

    - name: Verify SFTP chroot match block
      ansible.builtin.assert:
        that:
          - "'Match Group sftponly' in (match_content.content | b64decode)"
          - "'ChrootDirectory /home/%u' in (match_content.content | b64decode)"
          - "'ForceCommand internal-sftp' in (match_content.content | b64decode)"
        fail_msg: 'SFTP chroot match block missing'

    - name: Verify custom match block
      ansible.builtin.assert:
        that:
          - "'Match User testdeploy' in (match_content.content | b64decode)"
        fail_msg: 'Custom match block missing'

    # ==========================================================================
    # SFTP CHROOT GROUP
    # ==========================================================================
    - name: Check sftponly group exists
      ansible.builtin.command:
        cmd: getent group sftponly
      register: sftp_group
      changed_when: false

    - name: Verify sftponly group
      ansible.builtin.assert:
        that:
          - sftp_group.rc == 0
        fail_msg: 'sftponly group not created'

    # ==========================================================================
    # BANNER
    # ==========================================================================
    - name: Check banner file exists
      ansible.builtin.stat:
        path: /etc/ssh/banner
      register: banner_file

    - name: Verify banner file
      ansible.builtin.assert:
        that:
          - banner_file.stat.exists
        fail_msg: 'Banner file not created'

    # ==========================================================================
    # HOST KEYS
    # ==========================================================================
    - name: Check ED25519 host key
      ansible.builtin.stat:
        path: /etc/ssh/ssh_host_ed25519_key
      register: ed25519_key

    - name: Check RSA host key
      ansible.builtin.stat:
        path: /etc/ssh/ssh_host_rsa_key
      register: rsa_key

    - name: Check DSA host key absent
      ansible.builtin.stat:
        path: /etc/ssh/ssh_host_dsa_key
      register: dsa_key

    - name: Verify host keys
      ansible.builtin.assert:
        that:
          - ed25519_key.stat.exists
          - ed25519_key.stat.mode == '0600'
          - rsa_key.stat.exists
          - rsa_key.stat.mode == '0600'
          - not dsa_key.stat.exists
        fail_msg: 'Host key verification failed'

    # ==========================================================================
    # ANSIBLE_MANAGED HEADER
    # ==========================================================================
    - name: Read network config for header check
      ansible.builtin.slurp:
        src: /etc/ssh/sshd_config.d/10-network.conf
      register: network_content

    - name: Verify ansible_managed header
      ansible.builtin.assert:
        that:
          - "'Ansible managed' in (network_content.content | b64decode)"
        fail_msg: 'ansible_managed header missing'

    # ==========================================================================
    # CLIENT CONFIG
    # ==========================================================================
    - name: Check client config exists
      ansible.builtin.stat:
        path: /etc/ssh/ssh_config.d/99-defaults.conf
      register: client_conf

    - name: Verify client config exists
      ansible.builtin.assert:
        that:
          - client_conf.stat.exists
        fail_msg: 'Client config missing'

    # ==========================================================================
    # CONFIGURATION VALIDATION
    # ==========================================================================
    - name: Validate SSH configuration
      ansible.builtin.command: sshd -t
      register: sshd_test
      changed_when: false
      failed_when: sshd_test.rc != 0

    # ==========================================================================
    # SERVICE VERIFICATION
    # ==========================================================================
    - name: Set service name fact
      ansible.builtin.set_fact:
        sshd_service: "{{ 'sshd.service' if ansible_facts['os_family'] in ['Archlinux', 'RedHat'] else 'ssh.service' }}"

    - name: Check SSH service is enabled
      ansible.builtin.systemd:
        name: "{{ sshd_service }}"
        enabled: true
      check_mode: true
      register: service_enabled
      failed_when: service_enabled.changed

    - name: Check SSH service is running
      ansible.builtin.systemd:
        name: "{{ sshd_service }}"
        state: started
      check_mode: true
      register: service_running
      failed_when: service_running.changed

    # ==========================================================================
    # FUNCTIONAL TESTS
    # ==========================================================================
    - name: Test SSH is listening on port 22
      ansible.builtin.wait_for:
        port: 22
        host: 127.0.0.1
        timeout: 5

    - name: Get SSH version banner
      ansible.builtin.command: ssh -V
      register: ssh_version
      changed_when: false

    - name: Verify SSH version output
      ansible.builtin.assert:
        that:
          - "'OpenSSH' in ssh_version.stderr"
        fail_msg: 'SSH version output unexpected'
