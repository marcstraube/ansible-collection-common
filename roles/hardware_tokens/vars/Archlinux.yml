---
# CCID smart card driver
__hardware_tokens_ccid_package: 'ccid'

# FIDO2 packages
__hardware_tokens_fido2_packages:
  - 'libfido2'

# Smartcard packages (pcsc-tools for diagnostics)
__hardware_tokens_smartcard_packages:
  - 'pcsc-tools'

# OpenSC smart card tools
__hardware_tokens_opensc_package: 'opensc'

# NitroKey packages
__hardware_tokens_nitrokey_packages:
  - 'libnitrokey'
  - 'nitrokey-udev-rules'

# NitroKey App GUI
__hardware_tokens_nitrokey_app_package: 'nitrokey-app'

# YubiKey packages
__hardware_tokens_yubikey_packages:
  - 'yubico-pam'

# YubiKey Manager CLI (ykman)
__hardware_tokens_yubikey_manager_package: 'yubikey-manager'

# PAM U2F
__hardware_tokens_pam_u2f_package: 'pam-u2f'

# Services
__hardware_tokens_pcscd_service: 'pcscd.socket'

# Udev rules directory
__hardware_tokens_udev_rules_dir: '/etc/udev/rules.d'

# PAM system auth config file
__hardware_tokens_pam_auth_config_file: '/etc/pam.d/system-auth'

# Required groups (Arch uses uaccess via udev, no plugdev needed)
__hardware_tokens_groups: []
