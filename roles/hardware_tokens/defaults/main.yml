---
#
# Role Control
#

# Enable the hardware_tokens role
hardware_tokens_enabled: true

#
# Supported Devices
#

# Enable NitroKey support (udev rules + packages)
hardware_tokens_nitrokey_enabled: true

# Enable NitroKey App GUI (Arch Linux only, not available on Debian/RHEL)
hardware_tokens_nitrokey_app_enabled: false

# Enable YubiKey support (udev rules + packages)
hardware_tokens_yubikey_enabled: true

# Enable YubiKey Manager CLI (Arch + Debian only, not in Rocky repos)
hardware_tokens_yubikey_manager_enabled: false

# Enable generic FIDO2/U2F support (udev rules + libfido2 + fido2-tools)
hardware_tokens_fido2_enabled: true

#
# Smartcard / PKCS#11
#

# Enable smartcard diagnostics (pcsc-tools)
hardware_tokens_smartcard_enabled: true

# Enable OpenSC for PKCS#11 smartcard access
hardware_tokens_opensc_enabled: true

# Enable PC/SC daemon socket for smartcard communication
hardware_tokens_pcscd_socket_enabled: true

#
# PAM / Login
#

# Enable PAM U2F module for login
hardware_tokens_pam_u2f_enabled: false

# PAM U2F authentication mode: '2fa' or 'passwordless'
#   2fa:          User password + token touch (auth required, after pam_unix)
#   passwordless: Token PIN + touch, no system password (auth sufficient, before pam_unix)
hardware_tokens_pam_u2f_mode: '2fa'

# Enable FIDO2 PIN verification for passwordless mode
hardware_tokens_pam_u2f_pin_enabled: true

# Allow login for users without registered keys (nouserok)
hardware_tokens_pam_u2f_nouserok_enabled: true

# Configure system-wide PAM auth instead of per-service
# When true, modifies system-auth (Arch/RHEL) or common-auth (Debian)
# When false, modifies individual service files from pam_u2f_services list
hardware_tokens_pam_u2f_system_auth_enabled: false

# PAM services to configure (only when pam_u2f_system_auth_enabled is false)
# SDDM does not support pam_u2f — do not add 'sddm' here
hardware_tokens_pam_u2f_services:
  - 'sudo'
  - 'login'

# PAM U2F configuration
hardware_tokens_pam_u2f_config:
  authfile: '/etc/u2f_mappings'
  # Show "Please touch device" prompt
  cue: true
  # Wait for user to press Enter before checking
  interactive: false
  origin: 'pam://{{ ansible_facts["hostname"] }}'
  appid: 'pam://{{ ansible_facts["hostname"] }}'

#
# Udev Rules
#

# Enable udev rules deployment for device access
hardware_tokens_udev_rules_enabled: true

#
# Lock on Removal
#

# Enable auto-lock screen when hardware token is removed
hardware_tokens_lock_on_removal_enabled: false

# Device vendor/product IDs that trigger lock on removal
hardware_tokens_lock_on_removal_devices:
  - vendor: '20a0'
    product: '42b2'
    name: 'Nitrokey 3'
  - vendor: '20a0'
    product: '42b1'
    name: 'Nitrokey FIDO2'

#
# User Configuration
#

# Users with hardware token access (group membership)
hardware_tokens_users: []
