---
- name: Prepare instances
  hosts: all
  gather_facts: false
  become: true
  tasks:
    - name: Install Python 3 (Debian)
      ansible.builtin.raw: apt-get update && apt-get install -y python3
      changed_when: false
      when: inventory_hostname == 'hardware-tokens-debian'

    - name: Gather facts
      ansible.builtin.setup:

    - name: Full system update (Arch Linux)
      community.general.pacman:
        update_cache: true
        upgrade: true
      when: ansible_facts['os_family'] == 'Archlinux'
      retries: 3
      delay: 10
      register: system_update
      until: system_update is succeeded

    - name: Update package cache (Debian)
      ansible.builtin.apt:
        update_cache: true
      when: ansible_facts['os_family'] == 'Debian'

    - name: Enable EPEL repository (RedHat)
      ansible.builtin.dnf:
        name: epel-release
        state: present
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Update package cache (RedHat)
      ansible.builtin.dnf:
        update_cache: true
      when: ansible_facts['os_family'] == 'RedHat'
