---
# Vagrant-based: needs real udev for hardware token rules

driver:
  name: default
  options:
    managed: false
    login_cmd_template: bash -c 'cd ${MOLECULE_EPHEMERAL_DIRECTORY} && vagrant ssh {instance}'

platforms:
  - name: hardware-tokens-archlinux
    groups:
      - test_hosts
  - name: hardware-tokens-debian-trixie
    groups:
      - test_hosts
  - name: hardware-tokens-rocky-9
    groups:
      - test_hosts
  - name: hardware-tokens-rocky-10
    groups:
      - test_hosts

provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: ${MOLECULE_PROJECT_DIRECTORY}/..
  config_options:
    defaults:
      callbacks_enabled: profile_tasks,timer
      stdout_callback: default
      result_format: yaml
      inject_facts_as_vars: false
      allow_broken_conditionals: true
  inventory:
    host_vars:
      hardware-tokens-archlinux:
        ansible_python_interpreter: /usr/bin/python
        ansible_port: 2222
        ansible_ssh_private_key_file: >-
          {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY')
          }}/.vagrant/machines/hardware-tokens-archlinux/virtualbox/private_key
      hardware-tokens-debian-trixie:
        ansible_python_interpreter: /usr/bin/python3
        ansible_port: 2223
        ansible_ssh_private_key_file: >-
          {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY')
          }}/.vagrant/machines/hardware-tokens-debian-trixie/virtualbox/private_key
      hardware-tokens-rocky-9:
        ansible_python_interpreter: /usr/bin/python3
        ansible_port: 2224
        ansible_ssh_private_key_file: >-
          {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY')
          }}/.vagrant/machines/hardware-tokens-rocky-9/virtualbox/private_key
      hardware-tokens-rocky-10:
        ansible_python_interpreter: /usr/bin/python3
        ansible_port: 2225
        ansible_ssh_private_key_file: >-
          {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY')
          }}/.vagrant/machines/hardware-tokens-rocky-10/virtualbox/private_key
    group_vars:
      test_hosts:
        ansible_connection: ssh
        ansible_user: vagrant
        ansible_become: true
        ansible_host: 127.0.0.1
        ansible_ssh_common_args: -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
      all:
        #
        # Role Configuration for Testing
        #

        hardware_tokens_enabled: true
        hardware_tokens_nitrokey_enabled: true
        hardware_tokens_yubikey_enabled: true
        hardware_tokens_fido2_enabled: true
        hardware_tokens_smartcard_enabled: true
        hardware_tokens_opensc_enabled: true
        hardware_tokens_pcscd_socket_enabled: true
        hardware_tokens_lock_on_removal_enabled: true
        hardware_tokens_lock_on_removal_devices:
          - vendor: '20a0'
            product: '42b2'
            name: 'Nitrokey 3'
        hardware_tokens_users: []

  playbooks:
    create: create.yml
    destroy: destroy.yml
    prepare: prepare.yml
    converge: converge.yml
    verify: verify.yml

verifier:
  name: ansible

scenario:
  name: default
  test_sequence:
    - dependency
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy
