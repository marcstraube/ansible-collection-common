---
# Reloads gpg-agent for all configured users. The agent runs per-user,
# so we iterate over gnupg_users to reload each user's agent.
# failed_when: false — gpg-agent not running in containers (no user session)
- name: Reload GnuPG agent
  ansible.builtin.command:
    cmd: 'gpgconf --reload gpg-agent'
  become: true
  become_user: '{{ item.username }}'
  loop: '{{ gnupg_users }}'
  loop_control:
    label: '{{ item.username }}'
  changed_when: false
  failed_when: false
  when: gnupg_enabled | bool

# failed_when: false — scdaemon requires smartcard hardware (unavailable in containers)
- name: Reload GnuPG scdaemon
  ansible.builtin.command:
    cmd: 'gpgconf --reload scdaemon'
  become: true
  become_user: '{{ item.username }}'
  loop: '{{ gnupg_users }}'
  loop_control:
    label: '{{ item.username }}'
  changed_when: false
  failed_when: false
  when: gnupg_enabled | bool
