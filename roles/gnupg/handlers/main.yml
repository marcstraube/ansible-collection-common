---
# =============================================================================
# GnuPG Handlers
# =============================================================================

# Reloads gpg-agent for all configured users. The agent runs per-user,
# so we iterate over gnupg_users to reload each user's agent.
- name: GnuPG reload agent
  ansible.builtin.command:
    cmd: 'gpgconf --reload gpg-agent'
  become: true
  become_user: '{{ item.username }}'
  loop: '{{ gnupg_users }}'
  loop_control:
    label: '{{ item.username }}'
  changed_when: false
  failed_when: false

# Reloads scdaemon for all configured users.
- name: GnuPG reload scdaemon
  ansible.builtin.command:
    cmd: 'gpgconf --reload scdaemon'
  become: true
  become_user: '{{ item.username }}'
  loop: '{{ gnupg_users }}'
  loop_control:
    label: '{{ item.username }}'
  changed_when: false
  failed_when: false
