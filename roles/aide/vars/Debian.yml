---
__aide_package: 'aide'

__aide_aur: false

__aide_config_file: '/etc/aide/aide.conf'

# Use aide --init directly instead of aideinit to avoid config merging
# (aideinit runs update-aide.conf which merges /etc/aide/aide.conf.d/ fragments
# into an autogenerated config that may differ from our deployed config)
__aide_init_command: 'aide --init -c /etc/aide/aide.conf'

__aide_database_directive: 'database_in'

__aide_supports_log_level: true

# Debian aideinit uses capsh to drop privileges to _aide user
__aide_dir_owner: '_aide'
__aide_dir_group: '_aide'

# OS-specific paths to exclude from monitoring
__aide_os_exclude_paths:
  - '/var/lib/dpkg'
  - '/var/cache/apt'
  - '/usr/src'
  - '/usr/tmp'

# OS-specific important config files to monitor with FIPSR rule
__aide_os_critical_configs:
  - '/etc/apt'
  - '/etc/dpkg'
