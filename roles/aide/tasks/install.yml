---
- name: Install | Import GPG keys for AUR package verification
  become: true
  become_user: 'aur_builder'
  ansible.builtin.command:
    cmd: 'gpg --keyserver keys.openpgp.org --recv-keys {{ item }}'
  loop: '{{ __aide_gpg_keys | default([]) }}'
  register: __aide_gpg_import
  changed_when: "'imported:' in __aide_gpg_import.stderr"
  retries: 5
  delay: 10
  when: __aide_aur | bool

- name: Install | AIDE package (AUR)
  become: true
  become_user: 'aur_builder'
  kewlfft.aur.aur:
    name: '{{ __aide_aur_packages.aide }}'
    state: present
  retries: 3
  delay: 5
  when: __aide_aur | bool

- name: Install | AIDE package (official repos)
  ansible.builtin.package:
    name: '{{ __aide_package }}'
    state: present
  retries: 3
  delay: 5
  when: not (__aide_aur | bool)

- name: Install | Ensure AIDE directories exist
  ansible.builtin.file:
    path: '{{ item }}'
    state: directory
    owner: '{{ __aide_dir_owner }}'
    group: '{{ __aide_dir_group }}'
    mode: '0700'
  loop:
    - '{{ aide_database | dirname }}'
    - '{{ aide_log_dir }}'
