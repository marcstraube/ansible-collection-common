---
- name: Reinitialize AIDE database
  ansible.builtin.command:
    cmd: '{{ __aide_init_command }}'
  register: aide_reinit
  changed_when: aide_reinit.rc == 0
  async: 3600
  poll: 10
  when: aide_enabled | bool
  listen: Reinitialize AIDE database

- name: Move new database to production after reinit
  ansible.builtin.command:
    cmd: >-
      mv {{ aide_database_new }}{{ '.gz' if aide_database_format == 'gzip' else '' }}
      {{ aide_database }}{{ '.gz' if aide_database_format == 'gzip' else '' }}
    removes: '{{ aide_database_new }}{{ ".gz" if aide_database_format == "gzip" else "" }}'
  when:
    - aide_enabled | bool
    - aide_reinit is changed
  changed_when: true
  listen: Reinitialize AIDE database

- name: Reload AIDE systemd units
  ansible.builtin.systemd_service:
    daemon_reload: true
  failed_when: false
  when: aide_enabled | bool

- name: Restart AIDE timer
  ansible.builtin.systemd_service:
    name: aide-check.timer
    state: restarted
  when: aide_timer_enabled | bool
