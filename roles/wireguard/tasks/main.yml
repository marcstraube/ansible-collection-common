---
- name: Main | Load OS-specific variables
  ansible.builtin.include_vars: '{{ item }}'
  with_first_found:
    - files:
        - '{{ ansible_facts["distribution"] }}-{{ ansible_facts["distribution_major_version"] }}.yml'
        - '{{ ansible_facts["os_family"] }}-{{ ansible_facts["distribution_major_version"] }}.yml'
        - '{{ ansible_facts["distribution"] }}.yml'
        - '{{ ansible_facts["os_family"] }}.yml'
      paths:
        - 'vars'
  tags:
    - wireguard

- name: Main | Handle deprecated variables
  ansible.builtin.set_fact:
    wireguard_server_mode_enabled: >-
      {{ wireguard_server_mode | default(wireguard_server_mode_enabled) | bool }}
    wireguard_ip_forward_enabled: >-
      {{ wireguard_ip_forward | default(wireguard_ip_forward_enabled) | bool }}
    wireguard_client_mode_enabled: >-
      {{ wireguard_client_mode | default(wireguard_client_mode_enabled) | bool }}
    wireguard_generate_keys_enabled: >-
      {{ wireguard_generate_keys | default(wireguard_generate_keys_enabled) | bool }}
    wireguard_saveconfig_enabled: >-
      {{ wireguard_saveconfig | default(wireguard_saveconfig_enabled) | bool }}
  when:
    - wireguard_enabled | bool
    - >-
      wireguard_server_mode is defined or
      wireguard_ip_forward is defined or
      wireguard_client_mode is defined or
      wireguard_generate_keys is defined or
      wireguard_saveconfig is defined
  tags:
    - wireguard

- name: Main | Import install tasks
  ansible.builtin.import_tasks: install.yml
  when: wireguard_enabled | bool
  tags:
    - wireguard
    - wireguard:install

- name: Main | Import keys tasks
  ansible.builtin.import_tasks: keys.yml
  when:
    - wireguard_enabled | bool
    - wireguard_generate_keys_enabled | bool
  tags:
    - wireguard
    - wireguard:keys

- name: Main | Import configure tasks
  ansible.builtin.import_tasks: configure.yml
  when: wireguard_enabled | bool
  tags:
    - wireguard
    - wireguard:configure

- name: Main | Import service tasks
  ansible.builtin.import_tasks: service.yml
  when: wireguard_enabled | bool
  tags:
    - wireguard
    - wireguard:service

- name: Main | Include firewall tasks
  ansible.builtin.include_tasks:
    file: firewall.yml
    apply:
      tags:
        - wireguard
        - wireguard:firewall
  when:
    - wireguard_enabled | bool
    - wireguard_firewalld_enabled | bool
  tags:
    - wireguard
    - wireguard:firewall
