---
- name: Verify
  hosts: all
  gather_facts: true

  tasks:
    #
    # Package Verification
    #

    - name: Verify | Set package names per OS family
      ansible.builtin.set_fact:
        __verify_nano_package: 'nano'
        __verify_vim_package: >-
          {{ 'vim-enhanced' if ansible_facts['os_family'] == 'RedHat'
          else 'vim' }}

    - name: Verify | Check nano package is installed
      ansible.builtin.package:
        name: '{{ __verify_nano_package }}'
        state: present
      check_mode: true
      register: __verify_nano_pkg
      failed_when: __verify_nano_pkg.changed

    - name: Verify | Check vim package is installed
      ansible.builtin.package:
        name: '{{ __verify_vim_package }}'
        state: present
      check_mode: true
      register: __verify_vim_pkg
      failed_when: __verify_vim_pkg.changed

    - name: Verify | Check neovim package is installed
      ansible.builtin.package:
        name: neovim
        state: present
      check_mode: true
      register: __verify_neovim_pkg
      failed_when: __verify_neovim_pkg.changed

    #
    # Binary Verification
    #

    - name: Verify | Check nano binary exists
      ansible.builtin.command: nano --version
      register: __verify_nano_version
      changed_when: false

    - name: Verify | Assert nano version output
      ansible.builtin.assert:
        that:
          - "'GNU nano' in __verify_nano_version.stdout"

    - name: Verify | Check vim binary exists
      ansible.builtin.command: vim --version
      register: __verify_vim_version
      changed_when: false

    - name: Verify | Assert vim version output
      ansible.builtin.assert:
        that:
          - "'VIM' in __verify_vim_version.stdout or 'Vi IMproved' in __verify_vim_version.stdout"

    - name: Verify | Check neovim binary exists
      ansible.builtin.command: nvim --version
      register: __verify_nvim_version
      changed_when: false

    - name: Verify | Assert neovim version output
      ansible.builtin.assert:
        that:
          - "'NVIM' in __verify_nvim_version.stdout"

    #
    # Configuration Files
    #

    - name: Verify | Set config paths per OS family
      ansible.builtin.set_fact:
        __verify_nano_config: '/etc/nanorc'
        __verify_vim_config: >-
          {{ '/etc/vim/vimrc' if ansible_facts['os_family'] == 'Debian'
          else '/etc/vimrc' }}
        __verify_neovim_config: '/etc/xdg/nvim/sysinit.vim'

    - name: Verify | Check nano config exists
      ansible.builtin.stat:
        path: '{{ __verify_nano_config }}'
      register: __verify_nano_conf

    - name: Verify | Assert nano config exists with correct permissions
      ansible.builtin.assert:
        that:
          - __verify_nano_conf.stat.exists
          - __verify_nano_conf.stat.mode == '0644'
          - __verify_nano_conf.stat.pw_name == 'root'

    - name: Verify | Check vim config exists
      ansible.builtin.stat:
        path: '{{ __verify_vim_config }}'
      register: __verify_vim_conf

    - name: Verify | Assert vim config exists with correct permissions
      ansible.builtin.assert:
        that:
          - __verify_vim_conf.stat.exists
          - __verify_vim_conf.stat.mode == '0644'
          - __verify_vim_conf.stat.pw_name == 'root'

    - name: Verify | Check neovim config directory exists
      ansible.builtin.stat:
        path: /etc/xdg/nvim
      register: __verify_neovim_conf_dir

    - name: Verify | Assert neovim config directory
      ansible.builtin.assert:
        that:
          - __verify_neovim_conf_dir.stat.exists
          - __verify_neovim_conf_dir.stat.isdir
          - __verify_neovim_conf_dir.stat.mode == '0755'

    - name: Verify | Check neovim config exists
      ansible.builtin.stat:
        path: '{{ __verify_neovim_config }}'
      register: __verify_neovim_conf

    - name: Verify | Assert neovim config permissions
      ansible.builtin.assert:
        that:
          - __verify_neovim_conf.stat.exists
          - __verify_neovim_conf.stat.mode == '0644'
          - __verify_neovim_conf.stat.pw_name == 'root'

    #
    # Configuration Content
    #

    - name: Verify | Read nano config
      ansible.builtin.slurp:
        src: '{{ __verify_nano_config }}'
      register: __verify_nano_content

    - name: Verify | Assert nano config content
      ansible.builtin.assert:
        that:
          - "'Ansible managed' in (__verify_nano_content.content | b64decode)"
          - "'set autoindent' in (__verify_nano_content.content | b64decode)"
          - "'set linenumbers' in (__verify_nano_content.content | b64decode)"
          - "'set mouse' in (__verify_nano_content.content | b64decode)"
          - "'set tabsize 4' in (__verify_nano_content.content | b64decode)"
          - "'set tabstospaces' in (__verify_nano_content.content | b64decode)"
          - "'set softwrap' in (__verify_nano_content.content | b64decode)"
          - "'set constantshow' in (__verify_nano_content.content | b64decode)"
          - "'set indicator' in (__verify_nano_content.content | b64decode)"
          - "'set stateflags' in (__verify_nano_content.content | b64decode)"
          - "'/usr/share/nano/*.nanorc' in (__verify_nano_content.content | b64decode)"

    - name: Verify | Assert nano config does not contain shell redirects
      ansible.builtin.assert:
        that:
          - "'2>/dev/null' not in (__verify_nano_content.content | b64decode)"

    - name: Verify | Read vim config
      ansible.builtin.slurp:
        src: '{{ __verify_vim_config }}'
      register: __verify_vim_content

    - name: Verify | Assert vim config content
      ansible.builtin.assert:
        that:
          - "'Ansible managed' in (__verify_vim_content.content | b64decode)"
          - "'syntax on' in (__verify_vim_content.content | b64decode)"
          - "'set number' in (__verify_vim_content.content | b64decode)"
          - "'set expandtab' in (__verify_vim_content.content | b64decode)"
          - "'set tabstop=4' in (__verify_vim_content.content | b64decode)"
          - "'set shiftwidth=4' in (__verify_vim_content.content | b64decode)"
          - "'set mouse=a' in (__verify_vim_content.content | b64decode)"
          - "'set encoding=utf-8' in (__verify_vim_content.content | b64decode)"
          - "'set clipboard=unnamedplus' in (__verify_vim_content.content | b64decode)"
          - "'set hlsearch' in (__verify_vim_content.content | b64decode)"
          - "'set showmatch' in (__verify_vim_content.content | b64decode)"
          - "'set wildmenu' in (__verify_vim_content.content | b64decode)"
          - "'set backspace=indent,eol,start' in (__verify_vim_content.content | b64decode)"

    - name: Verify | Read neovim config
      ansible.builtin.slurp:
        src: '{{ __verify_neovim_config }}'
      register: __verify_neovim_content

    - name: Verify | Assert neovim config content
      ansible.builtin.assert:
        that:
          - "'Ansible managed' in (__verify_neovim_content.content | b64decode)"
          - "'syntax on' in (__verify_neovim_content.content | b64decode)"
          - "'set number' in (__verify_neovim_content.content | b64decode)"
          - "'set relativenumber' in (__verify_neovim_content.content | b64decode)"
          - "'set expandtab' in (__verify_neovim_content.content | b64decode)"
          - "'set mouse=a' in (__verify_neovim_content.content | b64decode)"
          - "'set termguicolors' in (__verify_neovim_content.content | b64decode)"
          - "'set hlsearch' in (__verify_neovim_content.content | b64decode)"
          - "'set signcolumn=yes' in (__verify_neovim_content.content | b64decode)"
          - "'set cursorline' in (__verify_neovim_content.content | b64decode)"
          - "'set updatetime=300' in (__verify_neovim_content.content | b64decode)"

    #
    # Environment Configuration
    #

    - name: Verify | Check editor.sh profile script exists
      ansible.builtin.stat:
        path: /etc/profile.d/editor.sh
      register: __verify_editor_profile

    - name: Verify | Assert editor.sh exists with correct permissions
      ansible.builtin.assert:
        that:
          - __verify_editor_profile.stat.exists
          - __verify_editor_profile.stat.mode == '0644'
          - __verify_editor_profile.stat.pw_name == 'root'

    - name: Verify | Read editor.sh content
      ansible.builtin.slurp:
        src: /etc/profile.d/editor.sh
      register: __verify_editor_content

    - name: Verify | Assert editor.sh content
      ansible.builtin.assert:
        that:
          - "'Ansible managed' in (__verify_editor_content.content | b64decode)"
          - "'export EDITOR=vim' in (__verify_editor_content.content | b64decode)"
          - "'export VISUAL=vim' in (__verify_editor_content.content | b64decode)"

    #
    # Per-User Configuration — Managed User (testuser)
    #

    - name: Verify | Check testuser vim config exists
      ansible.builtin.stat:
        path: /home/testuser/.vimrc
      register: __verify_testuser_vimrc

    - name: Verify | Assert testuser vim config
      ansible.builtin.assert:
        that:
          - __verify_testuser_vimrc.stat.exists
          - __verify_testuser_vimrc.stat.mode == '0644'
          - __verify_testuser_vimrc.stat.pw_name == 'testuser'

    - name: Verify | Read testuser vim config
      ansible.builtin.slurp:
        src: /home/testuser/.vimrc
      register: __verify_testuser_vimrc_content

    - name: Verify | Assert testuser vim config has merged content
      ansible.builtin.assert:
        that:
          - "'Ansible managed' in (__verify_testuser_vimrc_content.content | b64decode)"
          - "'set relativenumber' in (__verify_testuser_vimrc_content.content | b64decode)"
          - "'set expandtab' in (__verify_testuser_vimrc_content.content | b64decode)"
          - "'set mouse=a' in (__verify_testuser_vimrc_content.content | b64decode)"

    - name: Verify | Check testuser neovim config directory exists
      ansible.builtin.stat:
        path: /home/testuser/.config/nvim
      register: __verify_testuser_nvim_dir

    - name: Verify | Assert testuser neovim config directory
      ansible.builtin.assert:
        that:
          - __verify_testuser_nvim_dir.stat.exists
          - __verify_testuser_nvim_dir.stat.isdir
          - __verify_testuser_nvim_dir.stat.mode == '0755'

    - name: Verify | Check testuser neovim config exists
      ansible.builtin.stat:
        path: /home/testuser/.config/nvim/init.vim
      register: __verify_testuser_nvim_conf

    - name: Verify | Assert testuser neovim config
      ansible.builtin.assert:
        that:
          - __verify_testuser_nvim_conf.stat.exists
          - __verify_testuser_nvim_conf.stat.mode == '0644'
          - __verify_testuser_nvim_conf.stat.pw_name == 'testuser'

    - name: Verify | Read testuser neovim config
      ansible.builtin.slurp:
        src: /home/testuser/.config/nvim/init.vim
      register: __verify_testuser_nvim_content

    - name: Verify | Assert testuser neovim config has merged content with override
      ansible.builtin.assert:
        that:
          - "'colorscheme catppuccin' in (__verify_testuser_nvim_content.content | b64decode)"
          - "'set number' in (__verify_testuser_nvim_content.content | b64decode)"

    - name: Verify | Check testuser nano config exists
      ansible.builtin.stat:
        path: /home/testuser/.config/nano/nanorc
      register: __verify_testuser_nanorc

    - name: Verify | Assert testuser nano config
      ansible.builtin.assert:
        that:
          - __verify_testuser_nanorc.stat.exists
          - __verify_testuser_nanorc.stat.mode == '0644'
          - __verify_testuser_nanorc.stat.pw_name == 'testuser'

    - name: Verify | Read testuser nano config
      ansible.builtin.slurp:
        src: /home/testuser/.config/nano/nanorc
      register: __verify_testuser_nano_content

    - name: Verify | Assert testuser nano config has merge with override (mouse disabled)
      ansible.builtin.assert:
        that:
          - "'Ansible managed' in (__verify_testuser_nano_content.content | b64decode)"
          - "'set autoindent' in (__verify_testuser_nano_content.content | b64decode)"
          - "'set mouse' not in (__verify_testuser_nano_content.content | b64decode)"

    #
    # Per-User Configuration — Disabled User (disableduser)
    #

    - name: Verify | Check disableduser has no vim config
      ansible.builtin.stat:
        path: /home/disableduser/.vimrc
      register: __verify_disabled_vimrc

    - name: Verify | Assert disableduser has no per-user config
      ansible.builtin.assert:
        that:
          - not __verify_disabled_vimrc.stat.exists

    - name: Verify | Check disableduser has no neovim config
      ansible.builtin.stat:
        path: /home/disableduser/.config/nvim/init.vim
      register: __verify_disabled_nvim

    - name: Verify | Assert disableduser has no neovim config
      ansible.builtin.assert:
        that:
          - not __verify_disabled_nvim.stat.exists

    - name: Verify | Check disableduser has no nano config
      ansible.builtin.stat:
        path: /home/disableduser/.config/nano/nanorc
      register: __verify_disabled_nano

    - name: Verify | Assert disableduser has no nano config
      ansible.builtin.assert:
        that:
          - not __verify_disabled_nano.stat.exists
