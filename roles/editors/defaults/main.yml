---
#
# Role Control
#

# Enable the editors role
editors_enabled: true

#
# Editors
#

# Enable nano editor
editors_nano_enabled: true

# Enable vim editor
editors_vim_enabled: true

# Enable neovim editor
editors_neovim_enabled: true

# Default editor (for EDITOR/VISUAL env vars via /etc/profile.d/editor.sh)
# Options: nano, vim, nvim
editors_default: 'nvim'

#
# Configuration Management
#
# Set to false to skip deploying global config (e.g. when using own dotfiles)

# Enable global nano configuration deployment
editors_nano_config_enabled: true

# Enable global vim configuration deployment
editors_vim_config_enabled: true

# Enable global neovim configuration deployment
editors_neovim_config_enabled: true

#
# Neovim Binary Install (RedHat only)
#
# Neovim is not in EPEL — install pre-built binary from GitHub releases.
# Set to true on RedHat systems. Ignored on Arch/Debian (uses package manager).

# Enable neovim binary install from GitHub releases
editors_neovim_binary_enabled: false

# Neovim release version to install
editors_neovim_version: 'v0.12.1'

#
# Nano Configuration
#

# Nano editor settings
editors_nano_config:
  set_autoindent: true
  set_linenumbers: true
  set_mouse: true
  set_tabsize: 4
  set_tabstospaces: true
  set_softwrap: true
  # Show cursor position in status bar
  set_constantshow: true
  # Show scroll position indicator
  set_indicator: true
  # Show state flags in title bar
  set_stateflags: true
  syntax_highlighting: true

#
# Vim Configuration
#

# Vim editor settings
editors_vim_config:
  # Syntax and line numbers
  syntax_on: true
  set_number: true
  set_relativenumber: false
  # Indentation
  set_expandtab: true
  set_tabstop: 4
  set_shiftwidth: 4
  set_autoindent: true
  set_smartindent: true
  # Mouse and clipboard
  set_mouse: 'a'
  set_clipboard: 'unnamedplus'
  # Encoding
  set_encoding: 'utf-8'
  # Search
  set_hlsearch: true
  set_incsearch: true
  set_ignorecase: true
  set_smartcase: true
  # Visual
  set_showmatch: true
  set_showcmd: true
  set_wildmenu: true
  set_laststatus: 2
  set_ruler: true
  # Editing
  set_backspace: 'indent,eol,start'
  # Colorscheme (empty = default)
  colorscheme: ''

#
# Per-User Configuration
#
# Per-user editor config deployment. Each entry controls which editor configs
# are deployed to the user's home directory.
#
# Mode controls deployment behavior:
#   managed  — deploy config on every run (Ansible owns the file)
#   initial  — deploy only when user is newly created (user owns after that)
#   disabled — skip per-user config deployment entirely
#
# config_merge controls how user config relates to global defaults:
#   true  — merge: editors_<editor>_config | combine(user.<editor>_config)
#   false — standalone: only user.<editor>_config is used
#
# Example:
#   editors_users:
#     - username: 'johndoe'
#       mode: 'managed'
#       config_merge: true
#       vim_config:
#         set_relativenumber: true
#       neovim_config:
#         colorscheme: 'catppuccin'
#     - username: 'guest'
#       mode: 'disabled'
editors_users: []

# Default mode when user entry has no 'mode' key
editors_user_config_mode: 'initial'

# Default config_merge: true = global | combine(user), false = user only
editors_user_config_merge: true

#
# Neovim Configuration
#

# Neovim editor settings
editors_neovim_config:
  # Syntax and line numbers
  syntax_on: true
  set_number: true
  set_relativenumber: true
  # Indentation
  set_expandtab: true
  set_tabstop: 4
  set_shiftwidth: 4
  set_autoindent: true
  set_smartindent: true
  # Mouse and clipboard
  set_mouse: 'a'
  set_clipboard: 'unnamedplus'
  # Encoding
  set_encoding: 'utf-8'
  # True color support
  set_termguicolors: true
  # Search
  set_hlsearch: true
  set_incsearch: true
  set_ignorecase: true
  set_smartcase: true
  # Visual
  set_showmatch: true
  set_showcmd: true
  set_laststatus: 2
  set_signcolumn: 'yes'
  set_cursorline: true
  # Performance
  set_updatetime: 300
  set_timeoutlen: 500
  # Colorscheme (empty = default)
  colorscheme: ''
