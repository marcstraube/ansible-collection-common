---
- name: Main | Load OS-specific variables
  ansible.builtin.include_vars: '{{ item }}'
  with_first_found:
    - files:
        - '{{ ansible_facts["distribution"] }}-{{ ansible_facts["distribution_major_version"] }}.yml'
        - '{{ ansible_facts["os_family"] }}-{{ ansible_facts["distribution_major_version"] }}.yml'
        - '{{ ansible_facts["distribution"] }}.yml'
        - '{{ ansible_facts["os_family"] }}.yml'
      paths:
        - 'vars'
  tags:
    - editors

- name: Main | Handle deprecated variables
  ansible.builtin.set_fact:
    editors_nano_enabled: >-
      {{ editors_nano | default(editors_nano_enabled) | bool }}
    editors_vim_enabled: >-
      {{ editors_vim | default(editors_vim_enabled) | bool }}
    editors_neovim_enabled: >-
      {{ editors_neovim | default(editors_neovim_enabled) | bool }}
    editors_nano_config_enabled: >-
      {{ editors_nano_config_manage | default(editors_nano_config_enabled) | bool }}
    editors_vim_config_enabled: >-
      {{ editors_vim_config_manage | default(editors_vim_config_enabled) | bool }}
    editors_neovim_config_enabled: >-
      {{ editors_neovim_config_manage | default(editors_neovim_config_enabled) | bool }}
    editors_neovim_binary_enabled: >-
      {{ editors_neovim_binary_install | default(editors_neovim_binary_enabled) | bool }}
  when:
    - editors_enabled | bool
    - >-
      editors_nano is defined
      or editors_vim is defined
      or editors_neovim is defined
      or editors_nano_config_manage is defined
      or editors_vim_config_manage is defined
      or editors_neovim_config_manage is defined
      or editors_neovim_binary_install is defined
  tags:
    - editors

- name: Main | Import install tasks
  ansible.builtin.import_tasks: install.yml
  when: editors_enabled | bool
  tags:
    - editors
    - editors:install

- name: Main | Import environment tasks
  ansible.builtin.import_tasks: environment.yml
  when: editors_enabled | bool
  tags:
    - editors
    - editors:environment

- name: Main | Import nano tasks
  ansible.builtin.import_tasks: nano.yml
  when:
    - editors_enabled | bool
    - editors_nano_enabled | bool
    - editors_nano_config_enabled | bool
  tags:
    - editors
    - editors:nano

- name: Main | Import vim tasks
  ansible.builtin.import_tasks: vim.yml
  when:
    - editors_enabled | bool
    - editors_vim_enabled | bool
    - editors_vim_config_enabled | bool
  tags:
    - editors
    - editors:vim

- name: Main | Import neovim tasks
  ansible.builtin.import_tasks: neovim.yml
  when:
    - editors_enabled | bool
    - editors_neovim_enabled | bool
    - editors_neovim_config_enabled | bool
  tags:
    - editors
    - editors:neovim

- name: Main | Include per-user config tasks
  ansible.builtin.include_tasks:
    file: users.yml
    apply:
      tags:
        - editors
        - editors:users
  when:
    - editors_enabled | bool
    - editors_users | length > 0
  tags:
    - editors
    - editors:users
