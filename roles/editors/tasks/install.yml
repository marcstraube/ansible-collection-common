---
#
# Nano
#

- name: Install | Nano
  ansible.builtin.package:
    name: '{{ __editors_nano_package }}'
    state: present
  retries: 3
  delay: 5
  when: editors_nano_enabled | bool

#
# Vim
#

- name: Install | Vim
  ansible.builtin.package:
    name: '{{ __editors_vim_package }}'
    state: present
  retries: 3
  delay: 5
  when: editors_vim_enabled | bool

#
# Neovim
#

- name: Install | Neovim
  ansible.builtin.package:
    name: '{{ __editors_neovim_package }}'
    state: present
  retries: 3
  delay: 5
  when:
    - editors_neovim_enabled | bool
    - not (editors_neovim_binary_enabled | default(false) | bool)

- name: Install | Neovim (RedHat) via binary release
  ansible.builtin.include_tasks:
    file: neovim_binary.yml
    apply:
      tags:
        - editors
        - editors:install
  when:
    - ansible_facts['os_family'] == 'RedHat'
    - editors_neovim_enabled | bool
    - editors_neovim_binary_enabled | bool
  tags:
    - editors
    - editors:install
