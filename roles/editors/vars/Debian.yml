---
# =============================================================================
# Debian/Ubuntu-specific variables for editors
# =============================================================================

__editors_nano_package: 'nano'
__editors_vim_package: 'vim'
__editors_neovim_package: 'neovim'

# Config paths
__editors_nano_config_global: '/etc/nanorc'
__editors_vim_config_global: '/etc/vim/vimrc'
__editors_neovim_config_global: '/etc/xdg/nvim/sysinit.vim'
