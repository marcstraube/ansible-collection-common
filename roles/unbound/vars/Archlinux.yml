---
__unbound_packages:
  - 'unbound'
  - 'expat'

__unbound_service_name: 'unbound.service'
__unbound_user: 'unbound'
__unbound_group: 'unbound'

__unbound_root_key: '/etc/unbound/root.key'
__unbound_tls_cert_bundle: '/etc/ssl/certs/ca-certificates.crt'
__unbound_apparmor_profile: '/usr/bin/unbound'
