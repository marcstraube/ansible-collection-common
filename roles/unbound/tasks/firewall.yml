---
- name: Firewall | Check if firewalld is running
  ansible.builtin.systemd_service:
    name: firewalld
  register: __unbound_firewalld_status
  failed_when: false

- name: Firewall | Manage unbound firewall rule
  ansible.posix.firewalld:
    service: dns
    zone: '{{ unbound_firewalld_zone }}'
    permanent: true
    immediate: true
    state: "{{ unbound_firewalld_enabled | bool | ternary('enabled', 'disabled') }}"
  when: __unbound_firewalld_status.status.ActiveState | default('') == 'active'
