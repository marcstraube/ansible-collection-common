---
# =============================================================================
# Unbound - AppArmor Tasks
# =============================================================================

- name: AppArmor | Check if AppArmor is active
  ansible.builtin.stat:
    path: /sys/kernel/security/apparmor
  register: __unbound_apparmor_active

- name: AppArmor | Get current profile status
  ansible.builtin.command:
    cmd: aa-status --json
  register: __unbound_aa_status
  changed_when: false
  failed_when: false
  when: __unbound_apparmor_active.stat.exists

- name: AppArmor | Build enforce set
  ansible.builtin.set_fact:
    __unbound_apparmor_enforce_set: >-
      {{ (__unbound_aa_status.stdout | default('{}') | from_json).get('profiles', {})
         | dict2items | selectattr('value', 'eq', 'enforce')
         | map(attribute='key') | list }}
  when:
    - __unbound_apparmor_active.stat.exists
    - __unbound_aa_status.rc == 0

- name: AppArmor | Enforce unbound profile
  ansible.builtin.command:
    cmd: 'aa-enforce {{ __unbound_apparmor_profile }}'
  when:
    - __unbound_apparmor_active.stat.exists
    - >-
      __unbound_apparmor_profile not in __unbound_apparmor_enforce_set | default([])
      and (__unbound_apparmor_profile | basename) not in __unbound_apparmor_enforce_set | default([])
  changed_when: true
