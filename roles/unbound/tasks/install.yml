---
- name: Install | Unbound packages
  ansible.builtin.package:
    name: '{{ __unbound_packages }}'
    state: present
  retries: 3
  delay: 5

- name: Install | Ensure config directory exists
  ansible.builtin.file:
    path: '/etc/unbound'
    state: directory
    owner: root
    group: '{{ __unbound_group }}'
    mode: '0755'

- name: Install | Ensure conf.d directory exists
  ansible.builtin.file:
    path: '/etc/unbound/conf.d'
    state: directory
    owner: root
    group: '{{ __unbound_group }}'
    mode: '0755'

- name: Install | Download root hints
  ansible.builtin.get_url:
    url: 'https://www.internic.net/domain/named.root'
    dest: '{{ unbound_root_hints_file }}'
    owner: '{{ __unbound_user }}'
    group: '{{ __unbound_group }}'
    mode: '0644'
  retries: 5
  delay: 10
  when: unbound_root_hints_update_enabled | bool

- name: Install | Deploy root hints update systemd service
  ansible.builtin.template:
    src: 'unbound-root-hints.service.j2'
    dest: '/etc/systemd/system/unbound-root-hints.service'
    owner: root
    group: root
    mode: '0644'
  notify: Reload unbound systemd units

- name: Install | Deploy root hints update systemd timer
  ansible.builtin.template:
    src: 'unbound-root-hints.timer.j2'
    dest: '/etc/systemd/system/unbound-root-hints.timer'
    owner: root
    group: root
    mode: '0644'
  notify: Reload unbound systemd units

- name: Install | Deploy blocklist update systemd service
  ansible.builtin.template:
    src: 'unbound-blocklist.service.j2'
    dest: '/etc/systemd/system/unbound-blocklist.service'
    owner: root
    group: root
    mode: '0644'
  notify: Reload unbound systemd units

- name: Install | Deploy blocklist update systemd timer
  ansible.builtin.template:
    src: 'unbound-blocklist.timer.j2'
    dest: '/etc/systemd/system/unbound-blocklist.timer'
    owner: root
    group: root
    mode: '0644'
  notify: Reload unbound systemd units
