---
- name: Reload unbound systemd units
  ansible.builtin.systemd_service:
    daemon_reload: true
  # Container-safety for molecule
  failed_when: false
  when: unbound_enabled | bool

- name: Restart unbound
  ansible.builtin.systemd_service:
    name: '{{ __unbound_service_name }}'
    state: restarted
  when: unbound_service_enabled | bool

- name: Reload unbound
  ansible.builtin.systemd_service:
    name: '{{ __unbound_service_name }}'
    state: reloaded
  when: unbound_service_enabled | bool
