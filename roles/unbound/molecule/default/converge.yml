---
- name: Converge
  hosts: all
  gather_facts: true

  vars:
    unbound_enabled: true
    unbound_interfaces:
      - '127.0.0.1'
    unbound_port: 5353
    unbound_dnssec_enabled: false
    unbound_root_hints_update_enabled: false
    unbound_remote_control_enabled: false
    unbound_access_control:
      - subnet: '127.0.0.0/8'
        action: 'allow'
    unbound_local_data:
      - name: 'test.local'
        type: 'A'
        value: '192.168.1.100'
    unbound_local_data_ptr:
      - ip: '192.168.1.100'
        name: 'test.local'
    unbound_forward_zones:
      - name: 'example.com.'
        forward_addresses:
          - '1.1.1.1'
          - '1.0.0.1'
        forward_tls_upstream: true
        forward_first: false
    unbound_tls_upstream: true
    unbound_serve_expired: true
    unbound_serve_expired_ttl: 3600
    unbound_use_caps_for_id: true
    unbound_private_domains:
      - 'internal.example.com'
    unbound_insecure_domains:
      - 'test.example.com'

  tasks:
    - name: Converge | Include unbound role  # noqa: role-name[path]
      ansible.builtin.include_role:
        name: '{{ playbook_dir }}/../..'
