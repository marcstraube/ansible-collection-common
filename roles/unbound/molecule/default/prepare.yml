---
- name: Prepare
  hosts: all
  become: true
  gather_facts: true

  vars:
    __prepare_packages:
      Archlinux:
        - unbound
      Debian:
        - unbound
      RedHat:
        - unbound

  tasks:
    - name: Prepare | Update package cache (Arch)
      community.general.pacman:
        update_cache: true
        upgrade: true
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Prepare | Update package cache (Debian)
      ansible.builtin.apt:
        update_cache: true
      when: ansible_facts['os_family'] == 'Debian'

    - name: Prepare | Update package cache (RedHat)
      ansible.builtin.dnf:
        update_cache: true
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Prepare | Install container dependencies
      ansible.builtin.package:
        name: '{{ __prepare_packages[ansible_facts["os_family"]] }}'
        state: present

    - name: Prepare | Detect unbound binary path
      ansible.builtin.command:
        cmd: which unbound
      register: __prepare_unbound_path
      changed_when: false

    - name: Prepare | Create systemd override directory for unbound
      ansible.builtin.file:
        path: /etc/systemd/system/unbound.service.d
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Prepare | Override unbound service for containers
      ansible.builtin.copy:
        content: |
          [Service]
          Type=simple
          ExecStart=
          ExecStart={{ __prepare_unbound_path.stdout }} -d
          ExecReload=
          ExecReload=/bin/true
        dest: /etc/systemd/system/unbound.service.d/override.conf
        owner: root
        group: root
        mode: '0644'

    - name: Prepare | Stop unbound before converge
      ansible.builtin.systemd_service:
        name: unbound.service
        state: stopped
        daemon_reload: true
      failed_when: false
