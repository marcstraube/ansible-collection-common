---
- name: Main | Load OS-specific variables
  ansible.builtin.include_vars: '{{ item }}'
  with_first_found:
    - files:
        - '{{ ansible_facts["distribution"] }}-{{ ansible_facts["distribution_major_version"] }}.yml'
        - '{{ ansible_facts["os_family"] }}-{{ ansible_facts["distribution_major_version"] }}.yml'
        - '{{ ansible_facts["distribution"] }}.yml'
        - '{{ ansible_facts["os_family"] }}.yml'
      paths:
        - 'vars'
  tags:
    - graphics

- name: Main | Handle deprecated variables
  ansible.builtin.set_fact:
    graphics_intel_mesa_enabled: >-
      {{ graphics_intel_mesa | default(graphics_intel_mesa_enabled) | bool }}
    graphics_intel_vulkan_enabled: >-
      {{ graphics_intel_vulkan | default(graphics_intel_vulkan_enabled) | bool }}
    graphics_intel_vaapi_enabled: >-
      {{ graphics_intel_vaapi | default(graphics_intel_vaapi_enabled) | bool }}
    graphics_intel_guc_huc_enabled: >-
      {{ graphics_intel_guc_huc | default(graphics_intel_guc_huc_enabled) | bool }}
    graphics_intel_32bit_enabled: >-
      {{ graphics_intel_32bit | default(graphics_intel_32bit_enabled) | bool }}
    graphics_amd_mesa_enabled: >-
      {{ graphics_amd_mesa | default(graphics_amd_mesa_enabled) | bool }}
    graphics_amd_vulkan_enabled: >-
      {{ graphics_amd_vulkan | default(graphics_amd_vulkan_enabled) | bool }}
    graphics_amd_32bit_enabled: >-
      {{ graphics_amd_32bit | default(graphics_amd_32bit_enabled) | bool }}
    graphics_nvidia_32bit_enabled: >-
      {{ graphics_nvidia_32bit | default(graphics_nvidia_32bit_enabled) | bool }}
    graphics_nvidia_cuda_enabled: >-
      {{ graphics_nvidia_cuda | default(graphics_nvidia_cuda_enabled) | bool }}
    graphics_vulkan_tools_enabled: >-
      {{ graphics_vulkan_tools | default(graphics_vulkan_tools_enabled) | bool }}
    graphics_vaapi_tools_enabled: >-
      {{ graphics_vaapi_tools | default(graphics_vaapi_tools_enabled) | bool }}
    graphics_vdpau_tools_enabled: >-
      {{ graphics_vdpau_tools | default(graphics_vdpau_tools_enabled) | bool }}
    graphics_mesa_utils_enabled: >-
      {{ graphics_mesa_utils | default(graphics_mesa_utils_enabled) | bool }}
    graphics_hybrid_switcheroo_enabled: >-
      {{ graphics_hybrid_switcheroo | default(graphics_hybrid_switcheroo_enabled) | bool }}
    graphics_hybrid_prime_run_enabled: >-
      {{ graphics_hybrid_prime_run | default(graphics_hybrid_prime_run_enabled) | bool }}
    graphics_hybrid_nvidia_rtd3_enabled: >-
      {{ graphics_hybrid_nvidia_rtd3 | default(graphics_hybrid_nvidia_rtd3_enabled) | bool }}
    graphics_hybrid_nvidia_persistenced_enabled: >-
      {{ graphics_hybrid_nvidia_persistenced | default(graphics_hybrid_nvidia_persistenced_enabled) | bool }}
  when:
    - graphics_enabled | bool
    - >-
      graphics_intel_mesa is defined or
      graphics_intel_vulkan is defined or
      graphics_intel_vaapi is defined or
      graphics_intel_guc_huc is defined or
      graphics_intel_32bit is defined or
      graphics_amd_mesa is defined or
      graphics_amd_vulkan is defined or
      graphics_amd_32bit is defined or
      graphics_nvidia_32bit is defined or
      graphics_nvidia_cuda is defined or
      graphics_vulkan_tools is defined or
      graphics_vaapi_tools is defined or
      graphics_vdpau_tools is defined or
      graphics_mesa_utils is defined or
      graphics_hybrid_switcheroo is defined or
      graphics_hybrid_prime_run is defined or
      graphics_hybrid_nvidia_rtd3 is defined or
      graphics_hybrid_nvidia_persistenced is defined
  tags:
    - graphics

- name: Main | Import detect tasks
  ansible.builtin.import_tasks: detect.yml
  when:
    - graphics_enabled | bool
    - graphics_gpu == 'auto'
  tags:
    - graphics
    - graphics:detect

- name: Main | Set GPU flags from detection or config
  ansible.builtin.set_fact:
    __graphics_install_intel: "{{
        graphics_intel_enabled | bool or
        graphics_gpu == 'intel' or
        'intel' in graphics_gpus or
        (__detected_gpus | default([]) | select('search', 'intel') | list | length > 0)
      }}"
    __graphics_install_amd: "{{
        graphics_amd_enabled | bool or
        graphics_gpu == 'amd' or
        'amd' in graphics_gpus or
        (__detected_gpus | default([]) | select('search', 'amd') | list | length > 0)
      }}"
    __graphics_install_nvidia: "{{
        graphics_nvidia_enabled | bool or
        graphics_gpu == 'nvidia' or
        'nvidia' in graphics_gpus or
        (__detected_gpus | default([]) | select('search', 'nvidia') | list | length > 0)
      }}"
  when: graphics_enabled | bool
  tags:
    - graphics

- name: Main | Import Intel tasks
  ansible.builtin.import_tasks: intel.yml
  when:
    - graphics_enabled | bool
    - __graphics_install_intel | bool
  tags:
    - graphics
    - graphics:intel

- name: Main | Import AMD tasks
  ansible.builtin.import_tasks: amd.yml
  when:
    - graphics_enabled | bool
    - __graphics_install_amd | bool
  tags:
    - graphics
    - graphics:amd

- name: Main | Import NVIDIA tasks
  ansible.builtin.import_tasks: nvidia.yml
  when:
    - graphics_enabled | bool
    - __graphics_install_nvidia | bool
  tags:
    - graphics
    - graphics:nvidia

- name: Main | Import tools tasks
  ansible.builtin.import_tasks: tools.yml
  when: graphics_enabled | bool
  tags:
    - graphics
    - graphics:tools

- name: Main | Import hybrid tasks
  ansible.builtin.import_tasks: hybrid.yml
  when:
    - graphics_enabled | bool
    - graphics_hybrid_enabled | bool
  tags:
    - graphics
    - graphics:hybrid

- name: Main | Import kernel params tasks
  ansible.builtin.import_tasks: kernel_params.yml
  when:
    - graphics_enabled | bool
    - graphics_kernel_params_enabled | bool
  tags:
    - graphics
    - graphics:configure
