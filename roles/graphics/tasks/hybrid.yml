---
- name: Hybrid | Install switcheroo-control
  ansible.builtin.package:
    name: '{{ __graphics_hybrid_switcheroo }}'
    state: present
  when:
    - graphics_hybrid_switcheroo | bool
    - __graphics_hybrid_switcheroo | length > 0

- name: Hybrid | Enable switcheroo-control service
  ansible.builtin.systemd:
    name: switcheroo-control.service
    enabled: true
    state: started
  when:
    - graphics_hybrid_switcheroo | bool
    - __graphics_hybrid_switcheroo | length > 0

- name: Hybrid | Install prime-run helper
  ansible.builtin.package:
    name: '{{ __graphics_hybrid_prime_run }}'
    state: present
  when:
    - graphics_hybrid_prime_run | bool
    - __graphics_hybrid_prime_run | length > 0

- name: Hybrid | Deploy NVIDIA RTD3 udev rules
  ansible.builtin.template:
    src: 80-nvidia-pm.rules.j2
    dest: /etc/udev/rules.d/80-nvidia-pm.rules
    owner: root
    group: root
    mode: '0644'
  notify:
    - Reload graphics udev rules
    - Trigger udev rules
  when:
    - graphics_hybrid_nvidia_rtd3 | bool
    - __graphics_install_nvidia | bool

- name: Hybrid | Remove NVIDIA RTD3 udev rules when disabled
  ansible.builtin.file:
    path: /etc/udev/rules.d/80-nvidia-pm.rules
    state: absent
  notify:
    - Reload graphics udev rules
  when: not (graphics_hybrid_nvidia_rtd3 | bool) or not (__graphics_install_nvidia | bool)

- name: Hybrid | Deploy NVIDIA power management modprobe config
  ansible.builtin.template:
    src: nvidia-pm.conf.j2
    dest: /etc/modprobe.d/nvidia-pm.conf
    owner: root
    group: root
    mode: '0644'
  when:
    - graphics_hybrid_nvidia_rtd3 | bool
    - __graphics_install_nvidia | bool

- name: Hybrid | Remove NVIDIA PM modprobe config when disabled
  ansible.builtin.file:
    path: /etc/modprobe.d/nvidia-pm.conf
    state: absent
  when: not (graphics_hybrid_nvidia_rtd3 | bool) or not (__graphics_install_nvidia | bool)

- name: Hybrid | Enable nvidia-persistenced service
  ansible.builtin.systemd:
    name: nvidia-persistenced.service
    enabled: true
    state: started
  when:
    - graphics_hybrid_nvidia_persistenced | bool
    - __graphics_install_nvidia | bool
    - graphics_nvidia_driver != 'nouveau'

- name: Hybrid | Disable nvidia-persistenced service when not needed
  ansible.builtin.systemd:
    name: nvidia-persistenced.service
    enabled: false
    state: stopped
  failed_when: false
  when: not (graphics_hybrid_nvidia_persistenced | bool) or not (__graphics_install_nvidia | bool)
