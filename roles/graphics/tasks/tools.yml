---
- name: Tools | Build package list
  ansible.builtin.set_fact:
    __tools_packages: >-
      {{
        (graphics_vulkan_tools_enabled | bool | ternary([__graphics_vulkan_icd_loader, __graphics_vulkan_tools], [])) +
        (graphics_vaapi_tools_enabled | bool | ternary([__graphics_vaapi_tools], [])) +
        (graphics_vdpau_tools_enabled | bool | ternary([__graphics_vdpau_tools], [])) +
        (graphics_mesa_utils_enabled | bool | ternary([__graphics_mesa_utils], []))
      }}

- name: Tools | Filter empty package names
  ansible.builtin.set_fact:
    __tools_packages: '{{ __tools_packages | select("string") | reject("equalto", "") | list }}'

- name: Tools | Install packages
  ansible.builtin.package:
    name: '{{ __tools_packages }}'
    state: present
  retries: 3
  delay: 5
  when: __tools_packages | length > 0
