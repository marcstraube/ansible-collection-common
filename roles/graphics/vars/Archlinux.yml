---
# Intel packages
__graphics_intel_mesa: 'mesa'
__graphics_intel_mesa_32bit: 'lib32-mesa'
__graphics_intel_vulkan: 'vulkan-intel'
__graphics_intel_vulkan_32bit: 'lib32-vulkan-intel'
__graphics_intel_vaapi_modern: 'intel-media-driver'
__graphics_intel_vaapi_legacy: 'libva-intel-driver'

# AMD packages
__graphics_amd_mesa: 'mesa'
__graphics_amd_mesa_32bit: 'lib32-mesa'
__graphics_amd_vulkan: 'vulkan-radeon'
__graphics_amd_vulkan_32bit: 'lib32-vulkan-radeon'

# NVIDIA packages (nvidia-open is the only official driver since Dec 2025)
__graphics_nvidia_open: 'nvidia-open'
__graphics_nvidia_proprietary: 'nvidia-open'
__graphics_nvidia_utils: 'nvidia-utils'
__graphics_nvidia_utils_32bit: 'lib32-nvidia-utils'
__graphics_nvidia_nouveau: 'xf86-video-nouveau'
__graphics_nvidia_cuda: 'cuda'

# Legacy NVIDIA (AUR — community maintained)
__graphics_nvidia_legacy_packages:
  '580xx': 'nvidia-580xx-dkms'
  '470xx': 'nvidia-470xx-dkms'
  '390xx': 'nvidia-390xx-dkms'
__graphics_nvidia_legacy_aur: true

# Common packages
__graphics_vulkan_icd_loader: 'vulkan-icd-loader'
__graphics_vulkan_tools: 'vulkan-tools'
__graphics_vaapi_tools: 'libva-utils'
__graphics_vdpau_tools: 'vdpauinfo'
__graphics_mesa_utils: 'mesa-utils'

# Hybrid graphics
__graphics_hybrid_prime_run: 'nvidia-prime'
__graphics_hybrid_switcheroo: ''
