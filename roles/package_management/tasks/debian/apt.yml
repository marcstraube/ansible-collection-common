---
# =============================================================================
# APT Tasks - Package Manager Configuration (Debian/Ubuntu)
# =============================================================================

- name: apt | Configure APT
  ansible.builtin.template:
    src: 'debian/apt.conf.j2'
    dest: '/etc/apt/apt.conf.d/99-ansible-managed'
    owner: root
    group: root
    mode: '0644'
  notify: 'apt configuration changed'

- name: apt | Configure APT periodic updates
  ansible.builtin.template:
    src: 'debian/apt-periodic.conf.j2'
    dest: '/etc/apt/apt.conf.d/10periodic'
    owner: root
    group: root
    mode: '0644'
  when: apt_periodic_enabled | bool

- name: apt | Disable APT periodic updates
  ansible.builtin.file:
    path: '/etc/apt/apt.conf.d/10periodic'
    state: absent
  when: not (apt_periodic_enabled | bool)

- name: apt | Configure APT preferences (pinning)
  ansible.builtin.template:
    src: 'debian/apt-preferences.j2'
    dest: '/etc/apt/preferences.d/99-ansible-managed'
    owner: root
    group: root
    mode: '0644'
  when: apt_preferences | length > 0

- name: apt | Install apt-transport-https
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - gnupg
      - curl
    state: present
    update_cache: true
    cache_valid_time: 3600
