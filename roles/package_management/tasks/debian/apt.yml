---
- name: APT | Deploy apt.conf
  ansible.builtin.template:
    src: 'debian/apt.conf.j2'
    dest: '/etc/apt/apt.conf.d/99-ansible-managed'
    owner: root
    group: root
    mode: '0644'
  notify: 'apt configuration changed'

- name: APT | Deploy periodic update config
  ansible.builtin.template:
    src: 'debian/apt-periodic.conf.j2'
    dest: '/etc/apt/apt.conf.d/10periodic'
    owner: root
    group: root
    mode: '0644'
  when: apt_periodic_enabled | bool

- name: APT | Disable periodic updates
  ansible.builtin.file:
    path: '/etc/apt/apt.conf.d/10periodic'
    state: absent
  when: not (apt_periodic_enabled | bool)

- name: APT | Deploy preferences (pinning)
  ansible.builtin.template:
    src: 'debian/apt-preferences.j2'
    dest: '/etc/apt/preferences.d/99-ansible-managed'
    owner: root
    group: root
    mode: '0644'
  when: apt_preferences | length > 0

- name: APT | Install transport dependencies
  ansible.builtin.package:
    name:
      - apt-transport-https
      - ca-certificates
      - gnupg
      - curl
    state: present
  retries: 3
  delay: 5
