---
#
# Backports (Debian only)
#

- name: Repos | Enable Debian Backports
  ansible.builtin.apt_repository:
    repo: "deb http://deb.debian.org/debian {{ ansible_facts['distribution_release'] }}-backports main contrib non-free"
    state: present
    filename: 'backports'
  retries: 5
  delay: 10
  when:
    - apt_backports_enabled | bool
    - ansible_facts['distribution'] == 'Debian'
  notify: 'apt configuration changed'

#
# PPAs (Ubuntu only)
#

- name: Repos | Add PPAs
  ansible.builtin.apt_repository:
    repo: '{{ item }}'
    state: present
  retries: 5
  delay: 10
  loop: '{{ apt_ppas }}'
  when:
    - apt_ppas | length > 0
    - ansible_facts['distribution'] == 'Ubuntu'
  notify: 'apt configuration changed'

#
# PostgreSQL PGDG
#

- name: Repos | Setup PostgreSQL repository
  when: apt_postgresql_repo_enabled | bool
  block:
    - name: Repos | Add PostgreSQL GPG key
      ansible.builtin.get_url:
        url: 'https://www.postgresql.org/media/keys/ACCC4CF8.asc'
        dest: '/etc/apt/keyrings/postgresql.asc'
        owner: root
        group: root
        mode: '0644'
      retries: 5
      delay: 10

    - name: Repos | Add PostgreSQL repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [signed-by=/etc/apt/keyrings/postgresql.asc]
          https://apt.postgresql.org/pub/repos/apt
          {{ ansible_facts['distribution_release'] }}-pgdg main
        state: present
        filename: 'postgresql'
      retries: 5
      delay: 10
      notify: 'apt configuration changed'

#
# Sury (PHP, Apache2, nginx — Debian/Ubuntu)
#

- name: Repos | Setup Sury repository
  when: apt_sury_enabled | bool
  block:
    - name: Repos | Add PHP Sury GPG key
      ansible.builtin.get_url:
        url: 'https://packages.sury.org/php/apt.gpg'
        dest: '/etc/apt/keyrings/php-sury.gpg'
        owner: root
        group: root
        mode: '0644'
      retries: 5
      delay: 10
      when: ansible_facts['distribution'] == 'Debian'

    - name: Repos | Add PHP Sury repository (Debian)
      ansible.builtin.apt_repository:
        repo: >-
          deb [signed-by=/etc/apt/keyrings/php-sury.gpg]
          https://packages.sury.org/php/ {{ ansible_facts['distribution_release'] }} main
        state: present
        filename: 'php-sury'
      retries: 5
      delay: 10
      when: ansible_facts['distribution'] == 'Debian'
      notify: 'apt configuration changed'

    - name: Repos | Add PHP PPA (Ubuntu)
      ansible.builtin.apt_repository:
        repo: 'ppa:ondrej/php'
        state: present
      retries: 5
      delay: 10
      when: ansible_facts['distribution'] == 'Ubuntu'
      notify: 'apt configuration changed'

#
# Grafana
#

- name: Repos | Setup Grafana repository
  when: apt_grafana_repo_enabled | bool
  block:
    - name: Repos | Add Grafana GPG key
      ansible.builtin.get_url:
        url: 'https://apt.grafana.com/gpg.key'
        dest: '/etc/apt/keyrings/grafana.asc'
        owner: root
        group: root
        mode: '0644'
      retries: 5
      delay: 10

    - name: Repos | Add Grafana repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [signed-by=/etc/apt/keyrings/grafana.asc]
          https://apt.grafana.com stable main
        state: present
        filename: 'grafana'
      retries: 5
      delay: 10
      notify: 'apt configuration changed'

#
# Kubernetes
#

- name: Repos | Setup Kubernetes repository
  when: apt_kubernetes_repo_enabled | bool
  block:
    - name: Repos | Add Kubernetes GPG key
      ansible.builtin.get_url:
        url: "https://pkgs.k8s.io/core:/stable:/v{{ apt_kubernetes_version }}/deb/Release.key"
        dest: '/etc/apt/keyrings/kubernetes.asc'
        owner: root
        group: root
        mode: '0644'
      retries: 5
      delay: 10

    - name: Repos | Add Kubernetes repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [signed-by=/etc/apt/keyrings/kubernetes.asc]
          https://pkgs.k8s.io/core:/stable:/v{{ apt_kubernetes_version }}/deb/ /
        state: present
        filename: 'kubernetes'
      retries: 5
      delay: 10
      notify: 'apt configuration changed'

#
# Custom Repositories
#

- name: Repos | Add custom repository GPG keys
  ansible.builtin.get_url:
    url: '{{ item.gpg_key }}'
    dest: '/etc/apt/keyrings/{{ item.name }}.asc'
    owner: root
    group: root
    mode: '0644'
  retries: 5
  delay: 10
  loop: '{{ apt_custom_repos }}'
  loop_control:
    label: '{{ item.name }}'
  when:
    - apt_custom_repos | length > 0
    - item.gpg_key is defined

- name: Repos | Add custom repositories
  ansible.builtin.apt_repository:
    repo: '{{ item.repo }}'
    state: present
    filename: '{{ item.name }}'
  retries: 5
  delay: 10
  loop: '{{ apt_custom_repos }}'
  loop_control:
    label: '{{ item.name }}'
  when: apt_custom_repos | length > 0
  notify: 'apt configuration changed'

- name: Repos | Flush handlers to update apt cache
  ansible.builtin.meta: flush_handlers
