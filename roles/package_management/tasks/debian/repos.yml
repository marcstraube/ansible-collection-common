---
# =============================================================================
# External Repositories (Debian/Ubuntu)
# =============================================================================

# -----------------------------------------------------------------------------
# Backports (Debian only)
# -----------------------------------------------------------------------------
- name: Enable Debian Backports
  ansible.builtin.apt_repository:
    repo: "deb http://deb.debian.org/debian {{ ansible_facts['distribution_release'] }}-backports main contrib non-free"
    state: present
    filename: 'backports'
  when:
    - apt_backports_enabled | bool
    - ansible_facts['distribution'] == 'Debian'
  notify: 'apt configuration changed'

# -----------------------------------------------------------------------------
# PPAs (Ubuntu only)
# -----------------------------------------------------------------------------
- name: Add PPAs
  ansible.builtin.apt_repository:
    repo: '{{ item }}'
    state: present
  loop: '{{ apt_ppas }}'
  when:
    - apt_ppas | length > 0
    - ansible_facts['distribution'] == 'Ubuntu'
  notify: 'apt configuration changed'

# -----------------------------------------------------------------------------
# Docker CE
# -----------------------------------------------------------------------------
- name: Setup Docker CE repository
  when: apt_docker_repo | bool
  block:
    - name: Add Docker GPG key
      ansible.builtin.get_url:
        url: 'https://download.docker.com/linux/{{ ansible_facts["distribution"] | lower }}/gpg'
        dest: '/etc/apt/keyrings/docker.asc'
        mode: '0644'

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ ansible_facts['architecture'] | replace('x86_64', 'amd64') }}
          signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/{{ ansible_facts["distribution"] | lower }}
          {{ ansible_facts['distribution_release'] }} stable
        state: present
        filename: 'docker-ce'
      notify: 'apt configuration changed'

# -----------------------------------------------------------------------------
# PostgreSQL PGDG
# -----------------------------------------------------------------------------
- name: Setup PostgreSQL repository
  when: apt_postgresql_repo | bool
  block:
    - name: Add PostgreSQL GPG key
      ansible.builtin.get_url:
        url: 'https://www.postgresql.org/media/keys/ACCC4CF8.asc'
        dest: '/etc/apt/keyrings/postgresql.asc'
        mode: '0644'

    - name: Add PostgreSQL repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [signed-by=/etc/apt/keyrings/postgresql.asc]
          https://apt.postgresql.org/pub/repos/apt
          {{ ansible_facts['distribution_release'] }}-pgdg main
        state: present
        filename: 'postgresql'
      notify: 'apt configuration changed'

# -----------------------------------------------------------------------------
# NodeSource (Node.js)
# -----------------------------------------------------------------------------
# REMOVED: NodeSource repository management has been consolidated into the
# marcstraube.common.nodejs role. Use that role instead of
# apt_nodesource_repo/apt_nodesource_version.

# -----------------------------------------------------------------------------
# PHP Sury (Debian/Ubuntu)
# -----------------------------------------------------------------------------
- name: Setup PHP Sury repository
  when: apt_php_sury_repo | bool
  block:
    - name: Add PHP Sury GPG key
      ansible.builtin.get_url:
        url: "https://packages.sury.org/php/apt.gpg"
        dest: '/etc/apt/keyrings/php-sury.gpg'
        mode: '0644'
      when: ansible_facts['distribution'] == 'Debian'

    - name: Add PHP Sury repository (Debian)
      ansible.builtin.apt_repository:
        repo: >-
          deb [signed-by=/etc/apt/keyrings/php-sury.gpg]
          https://packages.sury.org/php/ {{ ansible_facts['distribution_release'] }} main
        state: present
        filename: 'php-sury'
      when: ansible_facts['distribution'] == 'Debian'
      notify: 'apt configuration changed'

    - name: Add PHP PPA (Ubuntu)
      ansible.builtin.apt_repository:
        repo: 'ppa:ondrej/php'
        state: present
      when: ansible_facts['distribution'] == 'Ubuntu'
      notify: 'apt configuration changed'

# -----------------------------------------------------------------------------
# Grafana
# -----------------------------------------------------------------------------
- name: Setup Grafana repository
  when: apt_grafana_repo | bool
  block:
    - name: Add Grafana GPG key
      ansible.builtin.get_url:
        url: 'https://apt.grafana.com/gpg.key'
        dest: '/etc/apt/keyrings/grafana.asc'
        mode: '0644'

    - name: Add Grafana repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [signed-by=/etc/apt/keyrings/grafana.asc]
          https://apt.grafana.com stable main
        state: present
        filename: 'grafana'
      notify: 'apt configuration changed'

# -----------------------------------------------------------------------------
# Kubernetes
# -----------------------------------------------------------------------------
- name: Setup Kubernetes repository
  when: apt_kubernetes_repo | bool
  block:
    - name: Add Kubernetes GPG key
      ansible.builtin.get_url:
        url: "https://pkgs.k8s.io/core:/stable:/v{{ apt_kubernetes_version }}/deb/Release.key"
        dest: '/etc/apt/keyrings/kubernetes.asc'
        mode: '0644'

    - name: Add Kubernetes repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [signed-by=/etc/apt/keyrings/kubernetes.asc]
          https://pkgs.k8s.io/core:/stable:/v{{ apt_kubernetes_version }}/deb/ /
        state: present
        filename: 'kubernetes'
      notify: 'apt configuration changed'

# -----------------------------------------------------------------------------
# Custom repositories
# -----------------------------------------------------------------------------
- name: Add custom repository GPG keys
  ansible.builtin.get_url:
    url: '{{ item.gpg_key }}'
    dest: '/etc/apt/keyrings/{{ item.name }}.asc'
    mode: '0644'
  loop: '{{ apt_custom_repos }}'
  loop_control:
    label: '{{ item.name }}'
  when:
    - apt_custom_repos | length > 0
    - item.gpg_key is defined

- name: Add custom repositories
  ansible.builtin.apt_repository:
    repo: '{{ item.repo }}'
    state: present
    filename: '{{ item.name }}'
  loop: '{{ apt_custom_repos }}'
  loop_control:
    label: '{{ item.name }}'
  when: apt_custom_repos | length > 0
  notify: 'apt configuration changed'

- name: Flush handlers to update apt cache
  ansible.builtin.meta: flush_handlers
