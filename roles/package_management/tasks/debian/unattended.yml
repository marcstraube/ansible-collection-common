---
- name: Unattended | Install unattended-upgrades
  ansible.builtin.package:
    name:
      - unattended-upgrades
      - apt-listchanges
    state: present
  retries: 3
  delay: 5

- name: Unattended | Deploy unattended-upgrades config
  ansible.builtin.template:
    src: 'debian/unattended-upgrades.conf.j2'
    dest: '/etc/apt/apt.conf.d/50unattended-upgrades'
    owner: root
    group: root
    mode: '0644'

- name: Unattended | Deploy auto-upgrades config
  ansible.builtin.template:
    src: 'debian/auto-upgrades.conf.j2'
    dest: '/etc/apt/apt.conf.d/20auto-upgrades'
    owner: root
    group: root
    mode: '0644'

- name: Unattended | Manage unattended-upgrades timer
  ansible.builtin.systemd_service:
    name: 'apt-daily-upgrade.timer'
    enabled: "{{ apt_unattended_upgrades_enabled | bool }}"
    state: "{{ apt_unattended_upgrades_enabled | bool | ternary('started', 'stopped') }}"
