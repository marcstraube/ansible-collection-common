---
- name: Main | Include Archlinux tasks
  when:
    - package_management_enabled | bool
    - ansible_facts['os_family'] == 'Archlinux'
  tags:
    - package-management
  block:
    - name: Main | Import Reflector tasks
      ansible.builtin.import_tasks: archlinux/reflector.yml
      when: reflector_enabled | bool
      tags:
        - package-management
        - package-management:repos

    - name: Main | Import Pacman tasks
      ansible.builtin.import_tasks: archlinux/pacman.yml
      tags:
        - package-management
        - package-management:configure

    - name: Main | Import Makepkg tasks
      ansible.builtin.import_tasks: archlinux/makepkg.yml
      tags:
        - package-management
        - package-management:configure

    - name: Main | Import AUR tasks
      ansible.builtin.import_tasks: archlinux/aur.yml
      when: aur_helper | length > 0
      tags:
        - package-management
        - package-management:install

    - name: Main | Import Paru tasks
      ansible.builtin.import_tasks: archlinux/paru.yml
      when: aur_helper == 'paru'
      tags:
        - package-management
        - package-management:configure

    - name: Main | Import Tools tasks
      ansible.builtin.import_tasks: archlinux/tools.yml
      tags:
        - package-management
        - package-management:tools

- name: Main | Include Debian tasks
  when:
    - package_management_enabled | bool
    - ansible_facts['os_family'] == 'Debian'
  tags:
    - package-management
  block:
    - name: Main | Import APT tasks
      ansible.builtin.import_tasks: debian/apt.yml
      tags:
        - package-management
        - package-management:configure

    - name: Main | Import Repos tasks
      ansible.builtin.import_tasks: debian/repos.yml
      tags:
        - package-management
        - package-management:repos

    - name: Main | Import unattended-upgrades tasks
      ansible.builtin.import_tasks: debian/unattended.yml
      when: apt_unattended_upgrades_enabled | bool
      tags:
        - package-management
        - package-management:configure

    - name: Main | Import Tools tasks
      ansible.builtin.import_tasks: debian/tools.yml
      tags:
        - package-management
        - package-management:tools

- name: Main | Include RedHat tasks
  when:
    - package_management_enabled | bool
    - ansible_facts['os_family'] == 'RedHat'
  tags:
    - package-management
  block:
    - name: Main | Import DNF tasks
      ansible.builtin.import_tasks: redhat/dnf.yml
      tags:
        - package-management
        - package-management:configure

    - name: Main | Import Repos tasks
      ansible.builtin.import_tasks: redhat/repos.yml
      tags:
        - package-management
        - package-management:repos

    - name: Main | Import dnf-automatic tasks
      ansible.builtin.import_tasks: redhat/automatic.yml
      when: dnf_automatic_enabled | bool
      tags:
        - package-management
        - package-management:configure

    - name: Main | Import Tools tasks
      ansible.builtin.import_tasks: redhat/tools.yml
      tags:
        - package-management
        - package-management:tools
