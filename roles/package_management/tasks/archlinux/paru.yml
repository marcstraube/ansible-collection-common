---
- name: Paru | Derive shared users from wheel group (exclude system users)  # noqa: var-naming[no-role-prefix]
  ansible.builtin.set_fact:
    paru_shared_users: >-
      {{ (users_list
          | selectattr('groups', 'defined')
          | selectattr('groups', 'contains', 'wheel')
          | selectattr('system', 'undefined') | list
          + users_list
          | selectattr('groups', 'defined')
          | selectattr('groups', 'contains', 'wheel')
          | selectattr('system', 'defined')
          | rejectattr('system', 'equalto', true) | list)
         | map(attribute='name') | list }}
  when:
    - paru_shared_users | length == 0
    - users_list is defined
    - users_list | length > 0

- name: Paru | Create shared AUR group
  ansible.builtin.group:
    name: aur_shared
    system: true
    state: present

- name: Paru | Add aur_builder to shared AUR group
  ansible.builtin.user:
    name: '{{ aur_builder_user }}'
    groups: aur_shared
    append: true

- name: Paru | Add users to shared AUR group
  ansible.builtin.user:
    name: '{{ item }}'
    groups: aur_shared
    append: true
  loop: '{{ paru_shared_users }}'

- name: Paru | Create shared clone directory
  ansible.builtin.file:
    path: '{{ paru_clone_dir }}'
    state: directory
    owner: root
    group: aur_shared
    mode: '2775'

- name: Paru | Disable Copy-on-Write on shared clone directory (BTRFS)
  ansible.builtin.file:
    path: '{{ paru_clone_dir }}'
    attr: +C
  # BTRFS attribute only works on BTRFS filesystems
  failed_when: false

- name: Paru | Deploy paru.conf
  ansible.builtin.template:
    src: 'archlinux/paru.conf.j2'
    dest: '/etc/paru.conf'
    owner: root
    group: root
    mode: '0644'
