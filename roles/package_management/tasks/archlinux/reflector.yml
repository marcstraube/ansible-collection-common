---
- name: Reflector | Install reflector
  ansible.builtin.package:
    name: 'reflector'
    state: present
  retries: 3
  delay: 5

- name: Reflector | Deploy reflector.conf
  ansible.builtin.template:
    src: 'archlinux/reflector.conf.j2'
    dest: '/etc/xdg/reflector/reflector.conf'
    owner: root
    group: root
    mode: '0644'
    backup: true
  notify: 'reflector configuration changed'

- name: Reflector | Manage reflector service
  ansible.builtin.systemd_service:
    name: 'reflector.service'
    enabled: "{{ reflector_enabled | bool }}"

- name: Reflector | Manage reflector timer
  ansible.builtin.systemd_service:
    name: 'reflector.timer'
    enabled: "{{ reflector_timer_enabled | bool }}"
    state: "{{ reflector_timer_enabled | bool | ternary('started', 'stopped') }}"
