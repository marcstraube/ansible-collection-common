---
- name: Pacman | Ensure hook directory exists
  ansible.builtin.file:
    path: '{{ pacman_hook_dir }}'
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Pacman | Import GPG keys for custom repositories
  ansible.builtin.command:
    cmd: >-
      pacman-key --recv-keys {{ item.key_id }}
      --keyserver {{ item.keyserver | default('keyserver.ubuntu.com') }}
  loop: '{{ pacman_custom_repositories }}'
  loop_control:
    label: '{{ item.name }}'
  when: item.key_id is defined
  register: __package_management_gpg_import
  changed_when: "'imported' in __package_management_gpg_import.stdout"
  failed_when:
    - __package_management_gpg_import.rc != 0
    - "'already in keyring' not in __package_management_gpg_import.stderr"

- name: Pacman | Check if GPG keys are locally signed
  ansible.builtin.command:
    cmd: pacman-key --list-sigs {{ item.key_id }}
  loop: '{{ pacman_custom_repositories }}'
  loop_control:
    label: '{{ item.name }}'
  when: item.key_id is defined
  register: __package_management_gpg_sig_check
  changed_when: false
  # Key may not be in keyring yet
  failed_when: false

- name: Pacman | Sign imported GPG keys
  ansible.builtin.command:
    cmd: pacman-key --lsign-key {{ item.item.key_id }}
  loop: '{{ __package_management_gpg_sig_check.results | default([]) }}'
  loop_control:
    label: '{{ item.item.name }}'
  when:
    - item.item.key_id is defined
    - "'[ultimate]' not in (item.stdout | default(''))"
  changed_when: true

- name: Pacman | Deploy pacman.conf
  ansible.builtin.template:
    src: 'archlinux/pacman.conf.j2'
    dest: '/etc/pacman.conf'
    owner: root
    group: root
    mode: '0644'
    backup: true
  notify: 'pacman configuration changed'

- name: Pacman | Flush handlers to update cache
  ansible.builtin.meta: flush_handlers

- name: Pacman | Install pacman-contrib
  ansible.builtin.package:
    name: 'pacman-contrib'
    state: present

- name: Pacman | Configure paccache
  ansible.builtin.lineinfile:
    path: '/etc/conf.d/pacman-contrib'
    regexp: '^PACCACHE_ARGS=.*'
    line: 'PACCACHE_ARGS="{{ paccache_args }}"'
    owner: root
    group: root
    mode: '0644'
    create: true
  when: paccache_timer_enabled | bool

- name: Pacman | Manage paccache timer
  ansible.builtin.systemd_service:
    name: 'paccache.timer'
    enabled: "{{ paccache_timer_enabled | bool }}"
    state: "{{ paccache_timer_enabled | bool | ternary('started', 'stopped') }}"

- name: Pacman | Install custom hooks
  ansible.builtin.copy:
    src: '{{ item }}'
    dest: '{{ pacman_hook_dir }}/{{ item | basename }}'
    owner: root
    group: root
    mode: '0644'
  loop: '{{ pacman_custom_hooks }}'
  when: pacman_custom_hooks | length > 0
