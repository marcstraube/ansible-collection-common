---
#
# PowerTools / CRB (CodeReady Builder)
#

- name: Repos | Enable PowerTools/CRB repository
  when:
    - dnf_powertools_enabled | bool
    - ansible_facts['distribution_major_version'] | int >= 8
    - ansible_facts['distribution'] != 'Fedora'
  block:
    # Rocky/AlmaLinux: Enable via repo config file (idempotent, works with dnf4 + dnf5)
    - name: Repos | Enable CRB repository (Rocky/Alma 9+)
      vars:
        __crb_repo_file:
          Rocky: 'rocky.repo'
          AlmaLinux: 'almalinux-crb.repo'
      community.general.ini_file:
        path: "/etc/yum.repos.d/{{ __crb_repo_file[ansible_facts['distribution']] }}"
        section: crb
        option: enabled
        value: "1"
        no_extra_spaces: true
        mode: '0644'
      when:
        - ansible_facts['distribution'] in ['Rocky', 'AlmaLinux']
        - ansible_facts['distribution_major_version'] | int >= 9
      notify: 'dnf configuration changed'

    - name: Repos | Enable PowerTools repository (Rocky/Alma 8)
      vars:
        __powertools_repo_file:
          Rocky: 'Rocky-PowerTools.repo'
          AlmaLinux: 'almalinux-powertools.repo'
      community.general.ini_file:
        path: "/etc/yum.repos.d/{{ __powertools_repo_file[ansible_facts['distribution']] }}"
        section: powertools
        option: enabled
        value: "1"
        no_extra_spaces: true
        mode: '0644'
      when:
        - ansible_facts['distribution'] in ['Rocky', 'AlmaLinux']
        - ansible_facts['distribution_major_version'] | int == 8
      notify: 'dnf configuration changed'

    # RHEL: Enable via subscription-manager (idempotent)
    - name: Repos | Enable CRB/PowerTools repository (RHEL)
      vars:
        __rhel_ver: "{{ ansible_facts['distribution_major_version'] }}"
        __rhel_arch: "{{ ansible_facts['architecture'] }}"
      community.general.rhsm_repository:
        name: "codeready-builder-for-rhel-{{ __rhel_ver }}-{{ __rhel_arch }}-rpms"
        state: enabled
      when: ansible_facts['distribution'] == 'RedHat'
      notify: 'dnf configuration changed'

#
# EPEL (Extra Packages for Enterprise Linux)
#

# On fresh Rocky/RHEL installs the distribution GPG key is not yet imported into
# the RPM keyring. The Ansible dnf module cannot handle the interactive GPG key
# confirmation prompt and silently fails the transaction while reporting changed.
# Import the key via rpm --import before installing epel-release.
- name: Repos | Import distribution GPG key (Rocky/Alma)
  vars:
    __distro: "{{ ansible_facts['distribution'] }}"
    __distro_ver: "{{ ansible_facts['distribution_major_version'] }}"
  ansible.builtin.rpm_key:
    key: "/etc/pki/rpm-gpg/RPM-GPG-KEY-{{ __distro }}-{{ __distro_ver }}"
    state: present
  when:
    - dnf_epel_enabled | bool
    - ansible_facts['distribution'] in ['Rocky', 'AlmaLinux']

- name: Repos | Install EPEL repository
  ansible.builtin.package:
    name: 'epel-release'
    state: present
  when:
    - dnf_epel_enabled | bool
    - ansible_facts['distribution'] != 'Fedora'
  notify: 'dnf configuration changed'

#
# Remi Repository (PHP, MariaDB)
#

- name: Repos | Setup Remi repository
  when:
    - dnf_remi_enabled | bool
    - ansible_facts['distribution'] != 'Fedora'
  block:
    - name: Repos | Install Remi repository
      ansible.builtin.dnf:
        name: "https://rpms.remirepo.net/enterprise/remi-release-{{ ansible_facts['distribution_major_version'] }}.rpm"
        state: present
        disable_gpg_check: true
      notify: 'dnf configuration changed'

    - name: Repos | Check current PHP module stream
      ansible.builtin.command:
        cmd: dnf module list php --enabled
      register: __package_management_remi_php_current
      changed_when: false
      # Module may not be available yet
      failed_when: false
      when:
        - dnf_remi_php_version | length > 0
        - ansible_facts['distribution_major_version'] | int < 10

    - name: Repos | Enable Remi PHP module stream (dnf4, modularity removed in dnf5)
      ansible.builtin.shell:
        cmd: "dnf module reset php -y && dnf module enable php:remi-{{ dnf_remi_php_version }} -y"
      changed_when: true
      when:
        - dnf_remi_php_version | length > 0
        - ansible_facts['distribution_major_version'] | int < 10
        - "'remi-' + dnf_remi_php_version not in (__package_management_remi_php_current.stdout | default(''))"

#
# RPM Fusion (Free)
#

- name: Repos | Install RPM Fusion Free repository
  vars:
    __rpmfusion_distro: "{{ 'fedora' if ansible_facts['distribution'] == 'Fedora' else 'el' }}"
    __distro_ver: "{{ ansible_facts['distribution_major_version'] }}"
  ansible.builtin.dnf:
    name: >-
      https://mirrors.rpmfusion.org/free/{{ __rpmfusion_distro }}/rpmfusion-free-release-{{ __distro_ver }}.noarch.rpm
    state: present
    disable_gpg_check: true
  when: dnf_rpmfusion_free_enabled | bool
  notify: 'dnf configuration changed'

#
# RPM Fusion (Nonfree)
#

- name: Repos | Install RPM Fusion Nonfree repository
  vars:
    __rpmfusion_distro: "{{ 'fedora' if ansible_facts['distribution'] == 'Fedora' else 'el' }}"
    __distro_ver: "{{ ansible_facts['distribution_major_version'] }}"
  ansible.builtin.dnf:
    name: >-
      https://mirrors.rpmfusion.org/nonfree/{{
      __rpmfusion_distro }}/rpmfusion-nonfree-release-{{
      __distro_ver }}.noarch.rpm
    state: present
    disable_gpg_check: true
  when: dnf_rpmfusion_nonfree_enabled | bool
  notify: 'dnf configuration changed'

#
# ELRepo (Kernel, Hardware Drivers)
#

- name: Repos | Install ELRepo repository
  vars:
    __distro_ver: "{{ ansible_facts['distribution_major_version'] }}"
  ansible.builtin.dnf:
    name: >-
      https://www.elrepo.org/elrepo-release-{{ __distro_ver }}.el{{ __distro_ver }}.elrepo.noarch.rpm
    state: present
    disable_gpg_check: true
  when:
    - dnf_elrepo_enabled | bool
    - ansible_facts['distribution'] != 'Fedora'
  notify: 'dnf configuration changed'

#
# Docker CE
#

- name: Repos | Setup Docker CE repository
  when: dnf_docker_repo_enabled | bool
  vars:
    __docker_distro: >-
      {{ 'fedora' if ansible_facts['distribution'] == 'Fedora'
         else 'rhel' if ansible_facts['distribution'] == 'RedHat'
         else 'centos' }}
  block:
    - name: Repos | Add Docker CE repository
      ansible.builtin.command:
        cmd: >-
          dnf config-manager --add-repo
          https://download.docker.com/linux/{{ __docker_distro }}/docker-ce.repo
      args:
        creates: '/etc/yum.repos.d/docker-ce.repo'
      notify: 'dnf configuration changed'

#
# PostgreSQL PGDG
#

- name: Repos | Install PostgreSQL repository
  vars:
    __distro_ver: "{{ ansible_facts['distribution_major_version'] }}"
  ansible.builtin.dnf:
    name: >-
      https://download.postgresql.org/pub/repos/yum/reporpms/EL-{{
      __distro_ver }}-x86_64/pgdg-redhat-repo-latest.noarch.rpm
    state: present
    disable_gpg_check: true
  when:
    - dnf_postgresql_repo_enabled | bool
    - ansible_facts['distribution'] != 'Fedora'
  notify: 'dnf configuration changed'

#
# Grafana
#

- name: Repos | Setup Grafana repository
  when: dnf_grafana_repo_enabled | bool
  block:
    - name: Repos | Add Grafana repository
      ansible.builtin.yum_repository:
        name: grafana
        description: Grafana OSS
        baseurl: 'https://rpm.grafana.com'
        gpgkey: 'https://rpm.grafana.com/gpg.key'
        gpgcheck: true
        enabled: true
      notify: 'dnf configuration changed'

#
# Kubernetes
#

- name: Repos | Setup Kubernetes repository
  when: dnf_kubernetes_repo_enabled | bool
  block:
    - name: Repos | Add Kubernetes repository
      ansible.builtin.yum_repository:
        name: kubernetes
        description: Kubernetes
        baseurl: "https://pkgs.k8s.io/core:/stable:/v{{ dnf_kubernetes_version }}/rpm/"
        gpgkey: "https://pkgs.k8s.io/core:/stable:/v{{ dnf_kubernetes_version }}/rpm/repodata/repomd.xml.key"
        gpgcheck: true
        enabled: true
        exclude: 'kubelet kubeadm kubectl cri-tools kubernetes-cni'
      notify: 'dnf configuration changed'

#
# COPR Repositories
#

- name: Repos | Check enabled COPR repositories
  ansible.builtin.command:
    cmd: dnf copr list --enabled
  register: __package_management_copr_list
  changed_when: false
  # COPR plugin may not be installed
  failed_when: false
  when: dnf_copr_repos | length > 0

- name: Repos | Enable COPR repositories
  ansible.builtin.command:
    cmd: "dnf copr enable {{ item }} -y"
  loop: '{{ dnf_copr_repos }}'
  changed_when: true
  when:
    - dnf_copr_repos | length > 0
    - item not in (__package_management_copr_list.stdout | default(''))

#
# Custom Repositories
#

- name: Repos | Add custom repositories
  ansible.builtin.yum_repository:
    name: '{{ item.name }}'
    description: '{{ item.description | default(item.name) }}'
    baseurl: '{{ item.baseurl }}'
    gpgkey: '{{ item.gpgkey | default(omit) }}'
    gpgcheck: '{{ item.gpgcheck | default(true) }}'
    enabled: '{{ item.enabled | default(true) }}'
  loop: '{{ dnf_custom_repos }}'
  loop_control:
    label: '{{ item.name }}'
  when: dnf_custom_repos | length > 0
  notify: 'dnf configuration changed'

- name: Repos | Flush handlers to update dnf cache
  ansible.builtin.meta: flush_handlers
