---
- name: Tools | Install dnf-utils (dnf4)
  ansible.builtin.package:
    name: 'dnf-utils'
    state: present
  retries: 3
  delay: 5
  when:
    - dnf_utils_enabled | bool
    - ansible_facts['distribution_major_version'] | int < 10

- name: Tools | Install needs-restarting helper (dnf4)
  ansible.builtin.package:
    name: 'yum-utils'
    state: present
  retries: 3
  delay: 5
  when:
    - dnf_needs_restarting_enabled | bool
    - ansible_facts['distribution_major_version'] | int < 10

- name: Tools | Install rpm-build for package building
  ansible.builtin.package:
    name:
      - rpm-build
      - rpmdevtools
    state: present
  retries: 3
  delay: 5
  when: dnf_rpmbuild_enabled | bool

- name: Tools | Install mock for chroot building
  ansible.builtin.package:
    name: 'mock'
    state: present
  retries: 3
  delay: 5
  when: dnf_mock_enabled | bool

- name: Tools | Add users to mock group
  ansible.builtin.user:
    name: '{{ item }}'
    groups: mock
    append: true
  loop: '{{ dnf_mock_users }}'
  when:
    - dnf_mock_enabled | bool
    - dnf_mock_users | length > 0
