---
# =============================================================================
# Additional Tools (RHEL/Fedora/Rocky)
# =============================================================================

- name: Install dnf-utils (dnf4)
  ansible.builtin.dnf:
    name: dnf-utils
    state: present
  when:
    - dnf_install_utils | bool
    - ansible_facts['distribution_major_version'] | int < 10

- name: Install needs-restarting helper (dnf4)
  ansible.builtin.dnf:
    name: yum-utils
    state: present
  when:
    - dnf_install_needs_restarting | bool
    - ansible_facts['distribution_major_version'] | int < 10

- name: Install rpm-build for package building
  ansible.builtin.dnf:
    name:
      - rpm-build
      - rpmdevtools
    state: present
  when: dnf_install_rpmbuild | bool

- name: Install mock for chroot building
  ansible.builtin.dnf:
    name: mock
    state: present
  when: dnf_install_mock | bool

- name: Add user to mock group
  ansible.builtin.user:
    name: '{{ item }}'
    groups: mock
    append: true
  loop: '{{ dnf_mock_users }}'
  when:
    - dnf_install_mock | bool
    - dnf_mock_users | length > 0
