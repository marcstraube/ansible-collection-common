---
- name: Automatic | Install dnf-automatic
  ansible.builtin.package:
    name: 'dnf-automatic'
    state: present
  retries: 3
  delay: 5

- name: Automatic | Deploy dnf-automatic config
  ansible.builtin.template:
    src: 'redhat/dnf-automatic.conf.j2'
    dest: '/etc/dnf/automatic.conf'
    owner: root
    group: root
    mode: '0644'

- name: Automatic | Enable dnf-automatic timer
  ansible.builtin.systemd_service:
    name: "dnf-automatic{{ '-install' if dnf_automatic_apply_updates | bool else '-notifyonly' }}.timer"
    state: started
    enabled: true

- name: Automatic | Disable other dnf-automatic timers
  ansible.builtin.systemd_service:
    name: '{{ item }}'
    state: stopped
    enabled: false
  loop:
    - dnf-automatic.timer
    - "dnf-automatic{{ '-notifyonly' if dnf_automatic_apply_updates | bool else '-install' }}.timer"
  # Timer may not exist on the system
  failed_when: false
