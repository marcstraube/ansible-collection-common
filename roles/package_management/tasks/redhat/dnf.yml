---
- name: DNF | Deploy dnf.conf
  ansible.builtin.template:
    src: 'redhat/dnf.conf.j2'
    dest: '/etc/dnf/dnf.conf'
    owner: root
    group: root
    mode: '0644'
    backup: true
  notify: 'dnf configuration changed'

- name: DNF | Install plugins (dnf4)
  ansible.builtin.package:
    name: 'dnf-plugins-core'
    state: present
  when: ansible_facts['distribution_major_version'] | int < 10

- name: DNF | Install fastest mirror plugin (EL8 only)
  ansible.builtin.package:
    name: 'dnf-plugin-fastestmirror'
    state: "{{ 'present' if dnf_fastestmirror | bool else 'absent' }}"
  when:
    - ansible_facts['distribution'] != 'Fedora'
    - ansible_facts['distribution_major_version'] | int < 9

- name: DNF | Manage makecache timer
  ansible.builtin.systemd_service:
    name: 'dnf-makecache.timer'
    enabled: "{{ dnf_makecache_timer_enabled | bool }}"
    state: "{{ dnf_makecache_timer_enabled | bool | ternary('started', 'stopped') }}"
