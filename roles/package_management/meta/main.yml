---
# =============================================================================
# Package Management Role Metadata
# =============================================================================

galaxy_info:
  author: 'Marc Straube'
  description: 'Configure package managers and repositories for ArchLinux, Debian/Ubuntu, and RHEL/Fedora/Rocky'
  license: 'MIT'
  min_ansible_version: '2.17'

  platforms:
    - name: 'ArchLinux'
      versions:
        - 'all'
    - name: 'Debian'
      versions:
        - 'trixie'
    - name: 'EL'
      versions:
        - '9'
        - '10'

  galaxy_tags:
    - 'archlinux'
    - 'debian'
    - 'ubuntu'
    - 'rhel'
    - 'fedora'
    - 'rocky'
    - 'pacman'
    - 'apt'
    - 'dnf'
    - 'aur'
    - 'epel'
    - 'remi'
    - 'packages'

dependencies: []

collections:
  - 'community.general'
  - 'kewlfft.aur'
