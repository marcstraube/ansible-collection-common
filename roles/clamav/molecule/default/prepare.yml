---
- name: Prepare
  hosts: all
  become: true
  gather_facts: true

  vars:
    __prepare_packages:
      Archlinux:
        - systemd
        - which
      Debian:
        - systemd
        - procps
      RedHat:
        - systemd
        - procps-ng

  tasks:
    - name: Prepare | Update package cache (Arch)
      community.general.pacman:
        update_cache: true
        upgrade: true
      retries: 3
      delay: 5
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Prepare | Update package cache (Debian)
      ansible.builtin.apt:
        update_cache: true
      retries: 3
      delay: 5
      when: ansible_facts['os_family'] == 'Debian'

    - name: Prepare | Enable EPEL repository (RedHat)
      ansible.builtin.dnf:
        name: epel-release
        state: present
      retries: 3
      delay: 5
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Prepare | Update package cache (RedHat)
      ansible.builtin.dnf:
        update_cache: true
      retries: 3
      delay: 5
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Prepare | Install container dependencies
      ansible.builtin.package:
        name: '{{ __prepare_packages[ansible_facts["os_family"]] }}'
        state: present
      retries: 3
      delay: 5

    # ClamAV daemon may fail to start in containers without override
    - name: Prepare | Create systemd override directory for clamd (Arch)
      ansible.builtin.file:
        path: /etc/systemd/system/clamav-daemon.service.d
        state: directory
        owner: root
        group: root
        mode: '0755'
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Prepare | Deploy systemd override for clamd (Arch)
      ansible.builtin.copy:
        dest: /etc/systemd/system/clamav-daemon.service.d/override.conf
        owner: root
        group: root
        mode: '0644'
        content: |
          [Service]
          Type=simple
          ExecStart=
          ExecStart=/usr/bin/clamd --foreground
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Prepare | Create systemd override directory for clamd (Debian)
      ansible.builtin.file:
        path: /etc/systemd/system/clamav-daemon.service.d
        state: directory
        owner: root
        group: root
        mode: '0755'
      when: ansible_facts['os_family'] == 'Debian'

    - name: Prepare | Deploy systemd override for clamd (Debian)
      ansible.builtin.copy:
        dest: /etc/systemd/system/clamav-daemon.service.d/override.conf
        owner: root
        group: root
        mode: '0644'
        content: |
          [Service]
          Type=simple
          ExecStart=
          ExecStart=/usr/sbin/clamd --foreground
      when: ansible_facts['os_family'] == 'Debian'

    - name: Prepare | Create systemd override directory for clamd@scan (RedHat)
      ansible.builtin.file:
        path: /etc/systemd/system/clamd@scan.service.d
        state: directory
        owner: root
        group: root
        mode: '0755'
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Prepare | Deploy systemd override for clamd@scan (RedHat)
      ansible.builtin.copy:
        dest: /etc/systemd/system/clamd@scan.service.d/override.conf
        owner: root
        group: root
        mode: '0644'
        content: |
          [Service]
          Type=simple
          ExecStart=
          ExecStart=/usr/sbin/clamd --foreground -c /etc/clamd.d/scan.conf
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Prepare | Create systemd override directory for freshclam
      ansible.builtin.file:
        path: /etc/systemd/system/clamav-freshclam.service.d
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Prepare | Deploy systemd override for freshclam
      ansible.builtin.copy:
        dest: /etc/systemd/system/clamav-freshclam.service.d/override.conf
        owner: root
        group: root
        mode: '0644'
        content: |
          [Service]
          Type=simple
          ExecStart=
          ExecStart=/usr/bin/freshclam --daemon --foreground

    - name: Prepare | Reload systemd daemon
      ansible.builtin.systemd_service:
        daemon_reload: true
