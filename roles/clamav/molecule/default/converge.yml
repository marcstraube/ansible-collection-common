---
- name: Converge
  hosts: all
  gather_facts: true

  vars:
    # Disable postfix/rspamd integration for testing
    clamav_postfix_integration: false
    clamav_rspamd_integration: false
    # Disable freshclam for faster testing (no DB download)
    clamav_freshclam_enabled: false
    # Disable daemon (no DB = daemon can't start)
    clamav_daemon_enabled: false
    # Disable firewall/apparmor for container testing
    clamav_firewalld_enabled: false
    clamav_apparmor_enabled: false
    # Test custom settings
    clamav_max_filesize: '50M'
    clamav_max_threads: 5
    clamav_scan_mail: true
    clamav_scan_archive: true
    clamav_log_verbose: true
    clamav_detect_pua: true
    clamav_pua_exclude:
      - 'NetTool'
      - 'PWTool'
    clamav_bytecode_security: 'TrustSigned'
    clamav_exclude_path:
      - '^/proc/'
      - '^/sys/'

  tasks:
    - name: Converge | Include clamav role  # noqa: role-name[path]
      ansible.builtin.include_role:
        name: '{{ playbook_dir }}/../..'
