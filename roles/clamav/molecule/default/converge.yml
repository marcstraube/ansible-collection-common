---
- name: Converge
  hosts: all
  become: true
  gather_facts: true

  pre_tasks:
    - name: Full system update (Arch)
      community.general.pacman:
        update_cache: true
        upgrade: true
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Install systemd on Archlinux
      community.general.pacman:
        name:
          - systemd
          - which
        state: present
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Install systemd on Debian
      ansible.builtin.apt:
        name:
          - systemd
          - procps
        state: present
        update_cache: true
      when: ansible_facts['os_family'] == 'Debian'

    - name: Install systemd on RedHat
      ansible.builtin.dnf:
        name:
          - systemd
          - procps-ng
        state: present
        update_cache: true
      when: ansible_facts['os_family'] == 'RedHat'

  vars:
    # Disable postfix/rspamd integration for testing
    clamav_postfix_integration: false
    clamav_rspamd_integration: false
    # Disable freshclam for faster testing (no DB download)
    clamav_freshclam_enabled: false
    # Disable daemon (no DB = daemon can't start)
    clamav_daemon_enabled: false
    # Disable firewall/apparmor for container testing
    clamav_firewalld_enabled: false
    clamav_apparmor_enabled: false
    # Test custom settings
    clamav_max_filesize: '50M'
    clamav_max_threads: 5
    clamav_scan_mail: true
    clamav_scan_archive: true
    clamav_log_verbose: true
    clamav_detect_pua: true
    clamav_pua_exclude:
      - 'NetTool'
      - 'PWTool'
    clamav_bytecode_security: 'TrustSigned'
    clamav_exclude_path:
      - '^/proc/'
      - '^/sys/'

  tasks:
    - name: Include clamav role  # noqa: role-name[path]
      ansible.builtin.include_role:
        name: '{{ playbook_dir }}/../..'
