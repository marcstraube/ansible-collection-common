---
- name: Service | Manage ClamAV daemon
  ansible.builtin.systemd_service:
    name: '{{ __clamav_daemon_service }}'
    enabled: "{{ clamav_daemon_enabled | bool }}"
    state: "{{ clamav_daemon_enabled | bool | ternary('started', 'stopped') }}"

- name: Service | Manage ClamAV freshclam service
  ansible.builtin.systemd_service:
    name: '{{ __clamav_freshclam_service }}'
    enabled: "{{ clamav_freshclam_enabled | bool }}"
    state: "{{ clamav_freshclam_enabled | bool | ternary('started', 'stopped') }}"

- name: Service | Manage ClamAV milter service
  ansible.builtin.systemd_service:
    name: '{{ __clamav_milter_service }}'
    enabled: "{{ clamav_milter_enabled | bool }}"
    state: "{{ clamav_milter_enabled | bool | ternary('started', 'stopped') }}"
  when: __clamav_milter_service | default('') | length > 0
