---
- name: Main | Load OS-specific variables
  ansible.builtin.include_vars: '{{ item }}'
  with_first_found:
    - files:
        - '{{ ansible_facts["distribution"] }}-{{ ansible_facts["distribution_major_version"] }}.yml'
        - '{{ ansible_facts["os_family"] }}-{{ ansible_facts["distribution_major_version"] }}.yml'
        - '{{ ansible_facts["distribution"] }}.yml'
        - '{{ ansible_facts["os_family"] }}.yml'
      paths:
        - 'vars'
  tags:
    - clamav

- name: Main | Handle deprecated clamav_postfix_integration variable
  ansible.builtin.set_fact:
    clamav_postfix_integration_enabled: >-
      {{ clamav_postfix_integration | default(clamav_postfix_integration_enabled) | bool }}
  when: clamav_postfix_integration is defined
  tags:
    - clamav

- name: Main | Handle deprecated clamav_rspamd_integration variable
  ansible.builtin.set_fact:
    clamav_rspamd_integration_enabled: >-
      {{ clamav_rspamd_integration | default(clamav_rspamd_integration_enabled) | bool }}
  when: clamav_rspamd_integration is defined
  tags:
    - clamav

- name: Main | Import install tasks
  ansible.builtin.import_tasks: install.yml
  when: clamav_enabled | bool
  tags:
    - clamav
    - clamav:install

- name: Main | Include BTRFS tasks
  ansible.builtin.include_tasks:
    file: btrfs.yml
    apply:
      tags:
        - clamav
        - clamav:install
  when: clamav_enabled | bool
  tags:
    - clamav
    - clamav:install

- name: Main | Import configure tasks
  ansible.builtin.import_tasks: configure.yml
  when: clamav_enabled | bool
  tags:
    - clamav
    - clamav:configure

- name: Main | Import service tasks
  ansible.builtin.import_tasks: service.yml
  when: clamav_enabled | bool
  tags:
    - clamav
    - clamav:service

- name: Main | Include firewall tasks
  ansible.builtin.include_tasks:
    file: firewall.yml
    apply:
      tags:
        - clamav
        - clamav:firewall
  when:
    - clamav_enabled | bool
    - clamav_firewalld_enabled | bool
  tags:
    - clamav
    - clamav:firewall

- name: Main | Include AppArmor tasks
  ansible.builtin.include_tasks:
    file: apparmor.yml
    apply:
      tags:
        - clamav
        - clamav:apparmor
  when:
    - clamav_enabled | bool
    - clamav_apparmor_enabled | bool
    - ansible_facts['os_family'] != 'RedHat'
  tags:
    - clamav
    - clamav:apparmor
