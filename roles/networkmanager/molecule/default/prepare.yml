---
- name: Prepare
  hosts: all
  become: true
  gather_facts: true

  vars:
    __prepare_packages:
      Debian: [systemd, procps, network-manager]
      RedHat: [systemd, procps-ng, NetworkManager]

  tasks:
    - name: Prepare | Update package cache (Arch)
      community.general.pacman:
        update_cache: true
        upgrade: true
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Prepare | Update package cache (Debian)
      ansible.builtin.apt:
        update_cache: true
      when: ansible_facts['os_family'] == 'Debian'

    - name: Prepare | Update package cache (RedHat)
      ansible.builtin.dnf:
        update_cache: true
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Prepare | Install VM dependencies
      ansible.builtin.package:
        name: '{{ __prepare_packages[ansible_facts["os_family"]] }}'
        state: present
      when: ansible_facts['os_family'] in __prepare_packages

    # WiFi simulation (Arch only)
    - name: Prepare | Install WiFi tools (Arch)
      ansible.builtin.package:
        name:
          - iw
          - hostapd
        state: present
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Prepare | Unload mac80211_hwsim module if loaded
      ansible.builtin.shell: |
        set -o pipefail
        if lsmod | grep -q mac80211_hwsim; then
          modprobe -r mac80211_hwsim || true
        fi
      args:
        executable: /bin/bash
      changed_when: false
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Prepare | Load mac80211_hwsim kernel module with 4 radios
      ansible.builtin.shell: |
        # Create 4 radios: 2 for APs (wlan0, wlan1) and 2 for clients (wlan2, wlan3)
        modprobe mac80211_hwsim radios=4
        sleep 2
      changed_when: false
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Prepare | Verify WiFi interfaces were created
      ansible.builtin.command: iw dev
      register: wifi_devices
      changed_when: false
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Prepare | Display created WiFi interfaces
      ansible.builtin.debug:
        msg: "{{ wifi_devices.stdout_lines }}"
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Prepare | Bring wlan interfaces up
      ansible.builtin.command: ip link set {{ item }} up
      loop:
        - wlan0
        - wlan1
      changed_when: false
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Prepare | Create hostapd configuration for Office WiFi
      ansible.builtin.copy:
        dest: /tmp/hostapd_office.conf
        content: |
          interface=wlan0
          driver=nl80211
          ssid=Office-Network
          hw_mode=g
          channel=6
          wmm_enabled=0
          macaddr_acl=0
          auth_algs=1
          ignore_broadcast_ssid=0
        owner: root
        group: root
        mode: '0644'
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Prepare | Create hostapd configuration for Home WiFi
      ansible.builtin.copy:
        dest: /tmp/hostapd_home.conf
        content: |
          interface=wlan1
          driver=nl80211
          ssid=Home-Network
          hw_mode=g
          channel=11
          wmm_enabled=0
          macaddr_acl=0
          auth_algs=1
          ignore_broadcast_ssid=0
        owner: root
        group: root
        mode: '0644'
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Prepare | Start hostapd for Office WiFi in background
      ansible.builtin.shell: |
        nohup hostapd /tmp/hostapd_office.conf > /tmp/hostapd_office.log 2>&1 &
        sleep 2
      changed_when: false
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Prepare | Start hostapd for Home WiFi in background
      ansible.builtin.shell: |
        nohup hostapd /tmp/hostapd_home.conf > /tmp/hostapd_home.log 2>&1 &
        sleep 2
      changed_when: false
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Prepare | Bring client WiFi interfaces up
      ansible.builtin.command: ip link set {{ item }} up
      loop:
        - wlan2
        - wlan3
      changed_when: false
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Prepare | Wait for WiFi APs to be fully operational
      ansible.builtin.pause:
        seconds: 5
      when: ansible_facts['os_family'] == 'Archlinux'
