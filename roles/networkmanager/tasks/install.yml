---
# marcstraube.networkmanager/tasks/install.yml

- name: Install | NetworkManager packages
  ansible.builtin.package:
    name: '{{ __networkmanager_packages }}'
    state: present
  when: __networkmanager_packages | length > 0

- name: Install | NetworkManager applet
  ansible.builtin.package:
    name: '{{ __networkmanager_applet_packages }}'
    state: present
  when: networkmanager_install_applet | default(false) | bool

- name: Install | VPN plugins
  ansible.builtin.package:
    name: '{{ networkmanager_vpn_plugins }}'
    state: present
  when: networkmanager_vpn_plugins | length > 0

- name: Install | Optional dependencies
  ansible.builtin.package:
    name: '{{ item.name }}'
    state: present
  loop:
    - { name: curl, needed: "{{ networkmanager_configure_timezone }}" }
    - { name: cifs-utils, needed: "{{ networkmanager_smb_shares | length > 0 }}" }
    - { name: sshfs, needed: "{{ networkmanager_sshfs_shares | length > 0 }}" }
  when: item.needed | bool
  loop_control:
    label: '{{ item.name }}'
