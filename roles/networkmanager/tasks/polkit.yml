---
- name: Polkit | Deploy NetworkManager polkit rule
  ansible.builtin.template:
    src: 49-networkmanager.rules.j2
    dest: /etc/polkit-1/rules.d/49-networkmanager.rules
    owner: root
    group: root
    mode: "0644"
  when: networkmanager_polkit
  notify: Restart polkitd

- name: Polkit | Remove NetworkManager polkit rule
  ansible.builtin.file:
    path: /etc/polkit-1/rules.d/49-networkmanager.rules
    state: absent
  when: not networkmanager_polkit
  notify: Restart polkitd
