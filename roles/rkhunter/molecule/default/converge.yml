---
# =============================================================================
# Molecule Converge Playbook for rkhunter Role
# =============================================================================

- name: Converge
  hosts: all
  become: true
  gather_facts: true

  vars:
    rkhunter_enabled: true
    rkhunter_update_on_install: false
    rkhunter_timer_enabled: true
    rkhunter_mail_on_warning: ''
    rkhunter_allowhiddendir:
      - '/dev/.udev'

  tasks:
    - name: Include rkhunter role  # noqa: role-name[path]
      ansible.builtin.include_role:
        name: '{{ playbook_dir }}/../..'
