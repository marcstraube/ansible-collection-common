---
# =============================================================================
# Molecule Converge Playbook for rkhunter Role
# =============================================================================

- name: Converge
  hosts: all
  become: true
  gather_facts: true

  pre_tasks:
    - name: Update package cache (Arch)
      community.general.pacman:
        update_cache: true
        upgrade: true
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Update package cache (Debian)
      ansible.builtin.apt:
        update_cache: true
      when: ansible_facts['os_family'] == 'Debian'

    - name: Install EPEL repository (RedHat)
      ansible.builtin.dnf:
        name: epel-release
        state: present
      when: ansible_facts['os_family'] == 'RedHat'

  vars:
    rkhunter_enabled: true
    rkhunter_update_on_install: false
    rkhunter_timer_enabled: true
    rkhunter_mail_on_warning: ''
    rkhunter_allowhiddendir:
      - '/dev/.udev'

  tasks:
    - name: Include rkhunter role  # noqa: role-name[path]
      ansible.builtin.include_role:
        name: '{{ playbook_dir }}/../..'
