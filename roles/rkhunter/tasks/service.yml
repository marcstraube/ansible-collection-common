---
- name: Service | Deploy rkhunter systemd service
  ansible.builtin.template:
    src: rkhunter-check.service.j2
    dest: '/etc/systemd/system/rkhunter-check.service'
    owner: root
    group: root
    mode: '0644'
  notify: Reload rkhunter systemd units

- name: Service | Deploy rkhunter systemd timer
  ansible.builtin.template:
    src: rkhunter-check.timer.j2
    dest: '/etc/systemd/system/rkhunter-check.timer'
    owner: root
    group: root
    mode: '0644'
  notify:
    - Reload rkhunter systemd units
    - Restart rkhunter timer

- name: Service | Manage rkhunter timer
  ansible.builtin.systemd_service:
    name: '{{ __rkhunter_timer_name }}'
    enabled: "{{ rkhunter_timer_enabled | bool }}"
    state: "{{ rkhunter_timer_enabled | bool | ternary('started', 'stopped') }}"
    daemon_reload: true
