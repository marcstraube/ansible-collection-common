---
- name: Install | rkhunter packages
  ansible.builtin.package:
    name: '{{ __rkhunter_packages }}'
    state: present
  retries: 3
  delay: 5

- name: Install | Ensure rkhunter directories exist
  ansible.builtin.file:
    path: '{{ item }}'
    state: directory
    owner: root
    group: root
    mode: '0700'
  loop:
    - '/var/lib/rkhunter/db'
    - '/var/lib/rkhunter/tmp'
