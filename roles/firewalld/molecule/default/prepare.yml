---
- name: Prepare
  hosts: all
  become: true
  gather_facts: true

  vars:
    __prepare_packages:
      Archlinux:
        - systemd
        - dbus
        - procps-ng
      Debian:
        - systemd
        - dbus
        - procps
      RedHat:
        - systemd
        - dbus
        - procps-ng

  tasks:
    - name: Prepare | Update package cache (Arch)
      community.general.pacman:
        update_cache: true
        upgrade: true
      retries: 3
      delay: 5
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Prepare | Update package cache (Debian)
      ansible.builtin.apt:
        update_cache: true
      retries: 3
      delay: 5
      when: ansible_facts['os_family'] == 'Debian'

    - name: Prepare | Update package cache (RedHat)
      ansible.builtin.dnf:
        update_cache: true
      retries: 3
      delay: 5
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Prepare | Install container dependencies
      ansible.builtin.package:
        name: '{{ __prepare_packages[ansible_facts["os_family"]] }}'
        state: present
      retries: 3
      delay: 5

    - name: Prepare | Start dbus
      ansible.builtin.systemd_service:
        name: dbus
        state: started
      failed_when: false

    # Debian containers need polkitd installed and dbus restarted
    # before firewalld can acquire its D-Bus name
    - name: Prepare | Install polkitd (Debian)
      ansible.builtin.apt:
        name:
          - polkitd
        state: present
        update_cache: true
      retries: 3
      delay: 5
      when: ansible_facts['os_family'] == 'Debian'

    - name: Prepare | Create polkit rules directories (Debian)
      ansible.builtin.file:
        path: '{{ item }}'
        state: directory
        owner: root
        group: root
        mode: '0755'
      loop:
        - /run/polkit-1/rules.d
        - /usr/local/share/polkit-1/rules.d
      when: ansible_facts['os_family'] == 'Debian'

    - name: Prepare | Restart dbus to clear stale activation state (Debian)
      ansible.builtin.systemd_service:
        name: dbus
        state: restarted
      when: ansible_facts['os_family'] == 'Debian'

    - name: Prepare | Start polkit (Debian)
      ansible.builtin.systemd_service:
        name: polkit
        state: started
      when: ansible_facts['os_family'] == 'Debian'
