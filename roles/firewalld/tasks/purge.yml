---
# Removes services from managed zones that are not in the desired state.
# Desired state = firewalld_services + firewalld_zone_services.

# -----------------------------------------------------------------------------
# Build desired services map: zone -> [services]
# -----------------------------------------------------------------------------

- name: Purge | Initialize desired services from default zone
  ansible.builtin.set_fact:
    __firewalld_purge_desired: >-
      {{ {firewalld_default_zone: (firewalld_services | default([]) | unique | list)} }}

- name: Purge | Merge zone services into desired map
  ansible.builtin.set_fact:
    __firewalld_purge_desired: >-
      {{ __firewalld_purge_desired | combine({
           item.zone:
             ((__firewalld_purge_desired[item.zone] | default([]))
              + item.services) | unique | list
         }) }}
  loop: "{{ firewalld_zone_services | default([]) }}"
  loop_control:
    label: "{{ item.zone }}"

# -----------------------------------------------------------------------------
# Query active services and compute excess
# -----------------------------------------------------------------------------

- name: Purge | Query active services per managed zone
  ansible.builtin.command:
    cmd: "firewall-cmd --zone={{ item.key }} --list-services --permanent"
  register: __firewalld_purge_active
  changed_when: false
  loop: "{{ __firewalld_purge_desired | dict2items }}"
  loop_control:
    label: "{{ item.key }}"

- name: Purge | Build list of excess services to remove
  ansible.builtin.set_fact:
    __firewalld_purge_excess: >-
      {%- set ns = namespace(items=[]) -%}
      {%- for result in __firewalld_purge_active.results -%}
        {%- set zone = result.item.key -%}
        {%- set active = result.stdout.split() -%}
        {%- set desired = result.item.value -%}
        {%- for svc in active if svc not in desired -%}
          {%- set ns.items = ns.items + [{'zone': zone, 'service': svc}] -%}
        {%- endfor -%}
      {%- endfor -%}
      {{ ns.items }}

# -----------------------------------------------------------------------------
# Remove excess services
# -----------------------------------------------------------------------------

- name: Purge | Remove unconfigured services
  ansible.posix.firewalld:
    service: "{{ item.service }}"
    zone: "{{ item.zone }}"
    state: disabled
    permanent: true
    immediate: true
  loop: "{{ __firewalld_purge_excess }}"
  loop_control:
    label: "{{ item.zone }}: {{ item.service }}"
  when: __firewalld_purge_excess | length > 0
