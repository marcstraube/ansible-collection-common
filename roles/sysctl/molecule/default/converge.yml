---
- name: Converge
  hosts: all
  become: true
  gather_facts: true

  pre_tasks:
    - name: Update package cache (Arch)
      community.general.pacman:
        update_cache: true
        upgrade: true
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Update package cache (Debian)
      ansible.builtin.apt:
        update_cache: true
      when: ansible_facts['os_family'] == 'Debian'

  vars:
    sysctl_enabled: true
    sysctl_profile_security: true
    sysctl_profile_network_performance: true
    sysctl_profile_database: false
    sysctl_profile_webserver: false
    sysctl_profile_docker: false
    sysctl_parameters:
      vm.swappiness: 10
      net.core.somaxconn: 1024
    sysctl_apply_immediately: true

  tasks:
    - name: Converge | Include sysctl role  # noqa: role-name[path]
      ansible.builtin.include_role:
        name: '{{ playbook_dir }}/../..'
