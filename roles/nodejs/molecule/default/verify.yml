---
- name: Verify
  hosts: all
  gather_facts: true

  tasks:
    #
    # Node.js Verification
    #

    - name: Verify | Check Node.js is installed
      ansible.builtin.command: node --version
      register: nodejs_version_check
      changed_when: false
      failed_when: nodejs_version_check.rc != 0

    - name: Verify | Assert Node.js version output
      ansible.builtin.assert:
        that:
          - "nodejs_version_check.stdout is match('^v[0-9]+\\.[0-9]+\\.[0-9]+')"
        fail_msg: "Node.js version output unexpected: {{ nodejs_version_check.stdout }}"

    #
    # npm Verification
    #

    - name: Verify | Check npm is installed
      ansible.builtin.command: npm --version
      register: npm_version_check
      changed_when: false
      failed_when: npm_version_check.rc != 0

    - name: Verify | Assert npm version output
      ansible.builtin.assert:
        that:
          - "npm_version_check.stdout is match('^[0-9]+\\.[0-9]+\\.[0-9]+')"
        fail_msg: "npm version output unexpected: {{ npm_version_check.stdout }}"

    #
    # NodeSource Repository Verification (Debian/RedHat only)
    #

    - name: Verify | Check NodeSource GPG key exists (Debian)
      ansible.builtin.stat:
        path: /etc/apt/keyrings/nodesource.asc
      register: nodesource_key_stat
      when: ansible_facts['os_family'] == 'Debian'

    - name: Verify | Assert NodeSource GPG key exists (Debian)
      ansible.builtin.assert:
        that:
          - nodesource_key_stat.stat.exists
        fail_msg: "NodeSource GPG key not found"
      when: ansible_facts['os_family'] == 'Debian'

    - name: Verify | Check NodeSource repository file exists (Debian)
      ansible.builtin.stat:
        path: /etc/apt/sources.list.d/nodesource.list
      register: nodesource_repo_stat
      when: ansible_facts['os_family'] == 'Debian'

    - name: Verify | Assert NodeSource repository exists (Debian)
      ansible.builtin.assert:
        that:
          - nodesource_repo_stat.stat.exists
        fail_msg: "NodeSource repository not configured"
      when: ansible_facts['os_family'] == 'Debian'

    - name: Verify | Check NodeSource repository file exists (RedHat)
      ansible.builtin.stat:
        path: /etc/yum.repos.d/nodesource.repo
      register: nodesource_redhat_repo_stat
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Verify | Check AppStream nodejs module enabled (RedHat)
      ansible.builtin.command: dnf module list --enabled nodejs
      register: nodejs_appstream_status
      changed_when: false
      failed_when: false
      when:
        - ansible_facts['os_family'] == 'RedHat'
        - not (nodesource_redhat_repo_stat.stat.exists | default(false))

    - name: Verify | Assert Node.js source configured (RedHat)
      ansible.builtin.assert:
        that:
          - (nodesource_redhat_repo_stat.stat.exists | default(false)) or
            (nodejs_appstream_status.rc | default(1) == 0)
        fail_msg: "Neither NodeSource repo nor AppStream nodejs module configured"
      when: ansible_facts['os_family'] == 'RedHat'

    #
    # Version Check (should provide version 24+)
    #

    - name: Verify | Assert Node.js major version
      ansible.builtin.assert:
        that:
          - (nodejs_version_check.stdout | regex_replace('^v', '') | split('.') | first | int) >= 24
        fail_msg: "Expected Node.js 24+, got {{ nodejs_version_check.stdout }}"

    #
    # yarn Verification (installed via package_managers)
    #

    - name: Verify | Get npm global prefix
      ansible.builtin.command: npm prefix -g
      register: npm_global_prefix
      changed_when: false

    - name: Verify | Check yarn is installed
      ansible.builtin.command: "{{ npm_global_prefix.stdout | trim }}/bin/yarn --version"
      register: yarn_version_check
      changed_when: false
      failed_when: yarn_version_check.rc != 0

    - name: Verify | Assert yarn version output
      ansible.builtin.assert:
        that:
          - "yarn_version_check.stdout is match('^[0-9]+\\.[0-9]+\\.[0-9]+')"
        fail_msg: "yarn version output unexpected: {{ yarn_version_check.stdout }}"
