---
- name: Prepare
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Prepare | Update package cache (Arch)
      community.general.pacman:
        update_cache: true
        upgrade: true
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Prepare | Update package cache (Debian)
      ansible.builtin.apt:
        update_cache: true
      when: ansible_facts['os_family'] == 'Debian'

    - name: Prepare | Update package cache (RedHat)
      ansible.builtin.dnf:
        update_cache: true
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Prepare | Install dependencies on Archlinux
      community.general.pacman:
        name:
          - which
          - sudo
        state: present
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Prepare | Install dependencies on Debian
      ansible.builtin.apt:
        name:
          - curl
          - gnupg
          - ca-certificates
        state: present
      when: ansible_facts['os_family'] == 'Debian'

    - name: Prepare | Replace curl-minimal with curl (RedHat Docker)  # noqa: command-instead-of-module
      ansible.builtin.command: dnf swap -y curl-minimal curl
      changed_when: false
      failed_when: false
      when: ansible_facts['os_family'] == 'RedHat'
