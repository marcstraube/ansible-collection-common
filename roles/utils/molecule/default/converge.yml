---
- name: Converge
  hosts: all
  become: true
  gather_facts: true

  vars:
    # Monitors
    utils_monitor_htop: true
    utils_monitor_btop: true

    # Multiplexers
    utils_mux_tmux: true
    utils_mux_screen: false

    # File transfer
    utils_transfer_rsync: true

    # Search tools
    utils_search_ripgrep: true
    utils_search_fd: true

    # System info
    utils_fetch_fastfetch: true

    # Fun tools (available on all platforms)
    utils_fun_cowsay: true
    utils_fun_figlet: true
    utils_fun_sl: true

  pre_tasks:
    - name: Update package cache (Arch)
      community.general.pacman:
        update_cache: true
      changed_when: false
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Upgrade all packages (Arch)
      community.general.pacman:
        upgrade: true
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Update package cache (Debian)
      ansible.builtin.apt:
        update_cache: true
      changed_when: false
      when: ansible_facts['os_family'] == 'Debian'

    - name: Enable EPEL on Rocky
      ansible.builtin.dnf:
        name: epel-release
        state: present
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Create aur_builder user for AUR packages (Arch)
      ansible.builtin.user:
        name: aur_builder
        group: wheel
        create_home: true
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Allow aur_builder passwordless sudo (Arch)
      ansible.builtin.lineinfile:
        path: /etc/sudoers.d/99-aur_builder
        line: 'aur_builder ALL=(ALL) NOPASSWD: /usr/bin/pacman'
        create: true
        mode: '0440'
      when: ansible_facts['os_family'] == 'Archlinux'

  tasks:
    - name: Include utils role  # noqa: role-name[path]
      ansible.builtin.include_role:
        name: '{{ playbook_dir }}/../..'
