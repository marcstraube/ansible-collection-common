---
- name: Converge
  hosts: all
  gather_facts: true

  vars:
    utils_enabled: true

    # Monitors
    utils_monitor_htop_enabled: true
    utils_monitor_btop_enabled: true

    # File transfer
    utils_transfer_rsync_enabled: true

    # File managers
    utils_filemgr_mc_enabled: true
    utils_filemgr_vifm_enabled: true

    # Search tools
    utils_search_ripgrep_enabled: true
    utils_search_fd_enabled: true

    # System info
    utils_fetch_fastfetch_enabled: true

    # Fun tools (available on all platforms)
    utils_fun_cowsay_enabled: true
    utils_fun_figlet_enabled: true
    utils_fun_sl_enabled: true

  tasks:
    - name: Converge | Include utils role  # noqa: role-name[path]
      ansible.builtin.include_role:
        name: '{{ playbook_dir }}/../..'
