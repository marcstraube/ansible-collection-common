---
# =============================================================================
# Utils Installation
# =============================================================================
# Build a dynamic package list from enabled toggles, filter empty strings
# (packages unavailable on the current OS), and install in one transaction.
# =============================================================================

- name: Install | Build package list
  ansible.builtin.set_fact:
    _utils_packages: >-
      {{
        [
          (utils_monitor_htop | bool)      | ternary(__utils_monitor_htop, ''),
          (utils_monitor_btop | bool)      | ternary(__utils_monitor_btop, ''),
          (utils_monitor_bottom | bool)    | ternary(__utils_monitor_bottom, ''),
          (utils_monitor_atop | bool)      | ternary(__utils_monitor_atop, ''),
          (utils_mux_tmux | bool)          | ternary(__utils_mux_tmux, ''),
          (utils_mux_zellij | bool)        | ternary(__utils_mux_zellij, ''),
          (utils_mux_screen | bool)        | ternary(__utils_mux_screen, ''),
          (utils_transfer_rsync | bool)    | ternary(__utils_transfer_rsync, ''),
          (utils_search_ripgrep | bool)    | ternary(__utils_search_ripgrep, ''),
          (utils_search_fd | bool)         | ternary(__utils_search_fd, ''),
          (utils_fetch_fastfetch | bool)   | ternary(__utils_fetch_fastfetch, ''),
          (utils_fetch_hyfetch | bool)     | ternary(__utils_fetch_hyfetch, ''),
          (utils_fetch_archey4 | bool)     | ternary(__utils_fetch_archey4, ''),
          (utils_fetch_cpufetch | bool)    | ternary(__utils_fetch_cpufetch, ''),
          (utils_fun_cowsay | bool)        | ternary(__utils_fun_cowsay, ''),
          (utils_fun_fortune | bool)       | ternary(__utils_fun_fortune, ''),
          (utils_fun_lolcat | bool)        | ternary(__utils_fun_lolcat, ''),
          (utils_fun_ponysay | bool)       | ternary(__utils_fun_ponysay, ''),
          (utils_fun_figlet | bool)        | ternary(__utils_fun_figlet, ''),
          (utils_fun_toilet | bool)        | ternary(__utils_fun_toilet, ''),
          (utils_fun_sl | bool)            | ternary(__utils_fun_sl, ''),
          (utils_fun_cmatrix | bool)       | ternary(__utils_fun_cmatrix, ''),
          (utils_fun_cbonsai | bool)       | ternary(__utils_fun_cbonsai, ''),
          (utils_fun_asciiquarium | bool)  | ternary(__utils_fun_asciiquarium, ''),
          (utils_fun_nyancat | bool)       | ternary(__utils_fun_nyancat, ''),
          (utils_fun_no_more_secrets | bool) | ternary(__utils_fun_no_more_secrets, ''),
          (utils_fun_tty_clock | bool)     | ternary(__utils_fun_tty_clock, ''),
          (utils_fun_pipes | bool)         | ternary(__utils_fun_pipes, ''),
          (utils_fun_pokemon_colorscripts | bool) | ternary(__utils_fun_pokemon_colorscripts, ''),
          (utils_fun_pokemonsay | bool)    | ternary(__utils_fun_pokemonsay, ''),
          (utils_fun_hollywood | bool)     | ternary(__utils_fun_hollywood, ''),
        ] | reject('equalto', '') | list
      }}

- name: Install | Install utils packages
  ansible.builtin.package:
    name: '{{ _utils_packages }}'
    state: present
  when:
    - _utils_packages | length > 0

# =============================================================================
# AUR packages (Arch Linux only)
# =============================================================================

- name: Install | Build AUR package list
  ansible.builtin.set_fact:
    _utils_aur_packages: >-
      {{
        [
          (utils_fun_cbonsai | bool)
            | ternary(__utils_fun_cbonsai_aur | default(''), ''),
          (utils_fun_no_more_secrets | bool)
            | ternary(__utils_fun_no_more_secrets_aur | default(''), ''),
          (utils_fun_tty_clock | bool)
            | ternary(__utils_fun_tty_clock_aur | default(''), ''),
          (utils_fun_pipes | bool)
            | ternary(__utils_fun_pipes_aur | default(''), ''),
          (utils_fetch_archey4 | bool)
            | ternary(__utils_fetch_archey4_aur | default(''), ''),
          (utils_fun_pokemon_colorscripts | bool)
            | ternary(__utils_fun_pokemon_colorscripts_aur | default(''), ''),
          (utils_fun_pokemonsay | bool)
            | ternary(__utils_fun_pokemonsay_aur | default(''), ''),
          (utils_fun_hollywood | bool)
            | ternary(__utils_fun_hollywood_aur | default(''), ''),
        ] | reject('equalto', '') | list
      }}
  when:
    - ansible_facts['os_family'] == 'Archlinux'

- name: Install | Install AUR packages (Arch)
  become: true
  become_user: 'aur_builder'
  kewlfft.aur.aur:
    name: '{{ _utils_aur_packages }}'
    state: present
  when:
    - ansible_facts['os_family'] == 'Archlinux'
    - _utils_aur_packages | length > 0
