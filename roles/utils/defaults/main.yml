# DEPRECATED: Use utils_monitor_htop_enabled instead (removed in v2.0.0)
# utils_monitor_htop: {{ utils_monitor_htop_enabled }}

# Modern resource monitor with TUI (btop++)
utils_monitor_btop_enabled: false

# DEPRECATED: Use utils_monitor_btop_enabled instead (removed in v2.0.0)
# utils_monitor_btop: {{ utils_monitor_btop_enabled }}

# System monitor with historical data (bottom)
