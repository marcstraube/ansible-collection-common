---
#
# Role Control
#

# Enable the utils role
utils_enabled: true

#
# System Monitors
#

# Interactive process viewer (htop)
utils_monitor_htop_enabled: true

# Modern resource monitor with TUI (btop++)
utils_monitor_btop_enabled: false

# System monitor with historical data (bottom)
utils_monitor_bottom_enabled: false

# Advanced system & process monitor with logging (atop)
utils_monitor_atop_enabled: false

#
# Terminal Multiplexers
#

# Terminal multiplexer (tmux)
utils_mux_tmux_enabled: true

# Modern terminal multiplexer written in Rust (zellij)
# Not available on Debian or Rocky
utils_mux_zellij_enabled: false

# GNU Screen terminal multiplexer
utils_mux_screen_enabled: false

#
# File Transfer
#

# Fast file copying tool (rsync)
utils_transfer_rsync_enabled: true

#
# File Managers
#

# Midnight Commander (Norton Commander clone)
utils_filemgr_mc_enabled: true

# Vi-like file manager (vifm)
utils_filemgr_vifm_enabled: false

# Vi-like file manager with previews (ranger)
# Not available on Rocky 10
utils_filemgr_ranger_enabled: false

# Fast terminal file manager (nnn)
# Not available on Rocky 10
utils_filemgr_nnn_enabled: false

# Terminal file manager inspired by ranger (lf)
# Not available on Rocky
utils_filemgr_lf_enabled: false

#
# Search Tools
#

# Install ripgrep (fast grep replacement)
utils_search_ripgrep_enabled: false

# Install fd (fast find replacement)
utils_search_fd_enabled: true

#
# System Info (Fetch Tools)
#

# Fast system information tool written in C (fastfetch)
utils_fetch_fastfetch_enabled: true

# Maintained neofetch fork with pride flag support (hyfetch)
# Available on Arch and Debian only
utils_fetch_hyfetch_enabled: false

# Customizable system info script (archey4)
# Arch: AUR only
utils_fetch_archey4_enabled: false

# CPU architecture fetching tool (cpufetch)
# Arch only
utils_fetch_cpufetch_enabled: false

#
# Fun Tools (ASCII Art & Terminal Entertainment)
#

# Configurable talking cow (cowsay)
utils_fun_cowsay_enabled: false

# Random fortune cookies (fortune-mod)
utils_fun_fortune_enabled: false

# Rainbow text colorizer (lolcat)
# Not available on Rocky
utils_fun_lolcat_enabled: false

# Pony version of cowsay (ponysay)
# Not available on Rocky
utils_fun_ponysay_enabled: false

# Display large text banners (figlet)
utils_fun_figlet_enabled: false

# Display large colored text (toilet)
utils_fun_toilet_enabled: false

# Steam locomotive animation (sl)
utils_fun_sl_enabled: false

# Terminal Matrix screensaver (cmatrix)
# Not available on Rocky 10
utils_fun_cmatrix_enabled: false

# Bonsai tree generator (cbonsai)
# Arch: AUR only. Not available on Rocky 10
utils_fun_cbonsai_enabled: false

# ASCII aquarium animation (asciiquarium)
# Not available on Rocky 10
utils_fun_asciiquarium_enabled: false

# Terminal Nyan Cat animation (nyancat)
# Not available on Rocky 10
utils_fun_nyancat_enabled: false

# Recreate the "decrypting text" effect from Sneakers (no-more-secrets)
# Arch: AUR only. Not available on Rocky 10
utils_fun_no_more_secrets_enabled: false

# Digital clock for the terminal (tty-clock)
# Arch: AUR only. Not available on Rocky 10
utils_fun_tty_clock_enabled: false

# Animated pipes screensaver (pipes.sh)
# Arch: AUR only. Not available on Debian or Rocky
utils_fun_pipes_enabled: false

# Pokemon color scripts for the terminal (pokemon-colorscripts)
# Arch: AUR only. Not available on Debian or Rocky
utils_fun_pokemon_colorscripts_enabled: false

# Pokemon version of cowsay (pokemonsay)
# Arch: AUR only. Not available on Debian or Rocky
utils_fun_pokemonsay_enabled: false

# Fake Hollywood hacker terminal (hollywood)
# Not available on Rocky
utils_fun_hollywood_enabled: false
