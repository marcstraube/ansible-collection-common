---
# =============================================================================
# PAM Hardening — Configuration
# =============================================================================

# =============================================================================
# PASSWORD QUALITY
# =============================================================================

- name: Configure | Deploy pwquality configuration
  ansible.builtin.template:
    src: 'pwquality.conf.j2'
    dest: '/etc/security/pwquality.conf'
    owner: root
    group: root
    mode: '0644'
  when: pam_pwquality_enabled | bool

# Arch: pambase does NOT include pam_pwquality — add to system-auth password stack
- name: Configure | Add pam_pwquality to password stack (Arch)
  ansible.builtin.lineinfile:
    path: '/etc/pam.d/system-auth'
    regexp: '^password\s+(requisite|required)\s+pam_pwquality\.so'
    line: 'password   requisite                   pam_pwquality.so     retry={{ pam_pwquality_retry }}'
    insertbefore: '^password\s+required\s+pam_unix\.so'
    state: present
  when:
    - ansible_facts['os_family'] == 'Archlinux'
    - pam_pwquality_enabled | bool

- name: Configure | Remove pam_pwquality from password stack (Arch)
  ansible.builtin.lineinfile:
    path: '/etc/pam.d/system-auth'
    regexp: '^password\s+(requisite|required)\s+pam_pwquality\.so'
    state: absent
  when:
    - ansible_facts['os_family'] == 'Archlinux'
    - not (pam_pwquality_enabled | bool)

# Debian: installing libpam-pwquality auto-registers a pam-auth-update profile.
# Run pam-auth-update to ensure it is wired into common-password.
- name: Configure | Ensure pwquality is active in PAM stack (Debian)
  ansible.builtin.command: pam-auth-update --package
  changed_when: false
  when:
    - ansible_facts['os_family'] == 'Debian'
    - pam_pwquality_enabled | bool

# RedHat: pwquality.conf is read automatically when pam_pwquality.so is in the
# authselect profile — no additional stack changes needed.

# =============================================================================
# ACCOUNT LOCKOUT
# =============================================================================

- name: Configure | Deploy faillock configuration
  ansible.builtin.template:
    src: 'faillock.conf.j2'
    dest: '/etc/security/faillock.conf'
    owner: root
    group: root
    mode: '0644'
  when: pam_faillock_enabled | bool

- name: Configure | Ensure faillock directory exists
  ansible.builtin.file:
    path: '{{ pam_faillock_dir }}'
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: pam_faillock_enabled | bool

# Arch: pambase 20230918+ already includes pam_faillock in system-auth.
# faillock.conf is read automatically — no PAM stack changes needed.

# Debian: pam_faillock is NOT in the default stack. Add before/after pam_unix.
- name: Configure | Add faillock preauth to common-auth (Debian)
  ansible.builtin.lineinfile:
    path: '/etc/pam.d/common-auth'
    regexp: '^auth\s+required\s+pam_faillock\.so\s+preauth'
    line: 'auth    required                        pam_faillock.so preauth'
    insertbefore: '^auth\s+\[success='
    state: present
  when:
    - ansible_facts['os_family'] == 'Debian'
    - pam_faillock_enabled | bool

- name: Configure | Add faillock authfail to common-auth (Debian)
  ansible.builtin.lineinfile:
    path: '/etc/pam.d/common-auth'
    regexp: '^auth\s+\[default=die\]\s+pam_faillock\.so\s+authfail'
    line: 'auth    [default=die]                   pam_faillock.so authfail'
    insertafter: '^auth\s+\[success=.*pam_unix\.so'
    state: present
  when:
    - ansible_facts['os_family'] == 'Debian'
    - pam_faillock_enabled | bool

- name: Configure | Add faillock to common-account (Debian)
  ansible.builtin.lineinfile:
    path: '/etc/pam.d/common-account'
    regexp: '^account\s+required\s+pam_faillock\.so'
    line: 'account required                        pam_faillock.so'
    insertafter: '^account\s+required\s+pam_unix\.so'
    state: present
  when:
    - ansible_facts['os_family'] == 'Debian'
    - pam_faillock_enabled | bool

- name: Configure | Remove faillock from common-auth (Debian)
  ansible.builtin.lineinfile:
    path: '/etc/pam.d/common-auth'
    regexp: '{{ item }}'
    state: absent
  loop:
    - '^auth\s+required\s+pam_faillock\.so\s+preauth'
    - '^auth\s+\[default=die\]\s+pam_faillock\.so\s+authfail'
  when:
    - ansible_facts['os_family'] == 'Debian'
    - not (pam_faillock_enabled | bool)

- name: Configure | Remove faillock from common-account (Debian)
  ansible.builtin.lineinfile:
    path: '/etc/pam.d/common-account'
    regexp: '^account\s+required\s+pam_faillock\.so'
    state: absent
  when:
    - ansible_facts['os_family'] == 'Debian'
    - not (pam_faillock_enabled | bool)

# RedHat: use authselect feature
- name: Configure | Check authselect current features (RedHat)
  ansible.builtin.command: authselect current --raw
  register: __pam_authselect_current
  changed_when: false
  failed_when: false
  when: ansible_facts['os_family'] == 'RedHat'

- name: Configure | Select authselect sssd profile if none active (RedHat)
  ansible.builtin.command: authselect select sssd --force
  changed_when: true
  when:
    - ansible_facts['os_family'] == 'RedHat'
    - __pam_authselect_current.rc != 0

- name: Configure | Enable faillock via authselect (RedHat)
  ansible.builtin.command: authselect enable-feature with-faillock
  changed_when: true
  when:
    - ansible_facts['os_family'] == 'RedHat'
    - pam_faillock_enabled | bool
    - "'with-faillock' not in (__pam_authselect_current.stdout | default(''))"

# =============================================================================
# PASSWORD HISTORY
# =============================================================================

# Arch: add pam_pwhistory to system-auth password stack
- name: Configure | Add pam_pwhistory to password stack (Arch)
  ansible.builtin.lineinfile:
    path: '/etc/pam.d/system-auth'
    regexp: '^password\s+required\s+pam_pwhistory\.so'
    line: 'password   required                    pam_pwhistory.so     use_authtok remember={{ pam_password_remember }}'
    insertbefore: '^password\s+required\s+pam_unix\.so'
    state: "{{ 'present' if pam_password_remember | int > 0 else 'absent' }}"
  when: ansible_facts['os_family'] == 'Archlinux'

# Debian: add remember= to pam_unix.so password line
- name: Configure | Password history in pam_unix (Debian)
  ansible.builtin.lineinfile:
    path: '/etc/pam.d/common-password'
    regexp: '^password\s+\[success=\d+\s+default=ignore\]\s+pam_unix\.so'
    line: >-
      password [success=1 default=ignore] pam_unix.so obscure use_authtok
      {{ pam_password_hash }} remember={{ pam_password_remember }}
    state: present
  when:
    - ansible_facts['os_family'] == 'Debian'
    - pam_password_remember | int > 0

# RedHat: use authselect pwhistory feature + pwhistory.conf
- name: Configure | Enable pwhistory via authselect (RedHat)
  ansible.builtin.command: authselect enable-feature with-pwhistory
  changed_when: true
  when:
    - ansible_facts['os_family'] == 'RedHat'
    - pam_password_remember | int > 0
    - "'with-pwhistory' not in (__pam_authselect_current.stdout | default(''))"

- name: Configure | pwhistory remember value (RedHat)
  ansible.builtin.lineinfile:
    path: '/etc/security/pwhistory.conf'
    regexp: '^remember\s*='
    line: 'remember = {{ pam_password_remember }}'
    state: present
    create: true
    owner: root
    group: root
    mode: '0644'
  when:
    - ansible_facts['os_family'] == 'RedHat'
    - pam_password_remember | int > 0

# =============================================================================
# PASSWORD HASHING & AGING (login.defs)
# =============================================================================

- name: Configure | Password hashing algorithm in login.defs
  ansible.builtin.lineinfile:
    path: '/etc/login.defs'
    regexp: '^ENCRYPT_METHOD\s+'
    line: 'ENCRYPT_METHOD {{ pam_password_hash | upper }}'
    state: present

- name: Configure | yescrypt cost factor in login.defs
  ansible.builtin.lineinfile:
    path: '/etc/login.defs'
    regexp: '^YESCRYPT_COST_FACTOR\s+'
    line: 'YESCRYPT_COST_FACTOR {{ pam_password_rounds }}'
    insertafter: '^ENCRYPT_METHOD'
    state: "{{ 'present' if pam_password_hash == 'yescrypt' else 'absent' }}"

- name: Configure | SHA512 rounds in login.defs
  ansible.builtin.lineinfile:
    path: '/etc/login.defs'
    regexp: '^{{ item }}\s+'
    line: '{{ item }} {{ pam_password_rounds }}'
    insertafter: '^ENCRYPT_METHOD'
    state: "{{ 'present' if pam_password_hash == 'sha512' else 'absent' }}"
  loop:
    - SHA_CRYPT_MIN_ROUNDS
    - SHA_CRYPT_MAX_ROUNDS

- name: Configure | Password aging in login.defs
  ansible.builtin.lineinfile:
    path: '/etc/login.defs'
    regexp: '^{{ item.key }}\s+'
    line: '{{ item.key }} {{ item.value }}'
    state: present
  loop:
    - { key: 'PASS_MAX_DAYS', value: '{{ pam_password_max_age }}' }
    - { key: 'PASS_MIN_DAYS', value: '{{ pam_password_min_age }}' }
    - { key: 'PASS_WARN_AGE', value: '{{ pam_password_warn_age }}' }
    - { key: 'INACTIVE', value: '{{ pam_password_inactive }}' }
  when: pam_password_aging_enabled | bool

# =============================================================================
# SESSION LIMITS
# =============================================================================

- name: Configure | Ensure limits.d directory exists
  ansible.builtin.file:
    path: '/etc/security/limits.d'
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: pam_limits_enabled | bool

- name: Configure | Deploy limits configuration
  ansible.builtin.template:
    src: 'limits.conf.j2'
    dest: '/etc/security/limits.d/99-hardening.conf'
    owner: root
    group: root
    mode: '0644'
  when: pam_limits_enabled | bool

# Arch: pam_limits.so already in pambase system-auth session stack — no changes needed.

# Debian: pam_limits in login/su/sudo but NOT in common-session. Add it.
- name: Configure | Add pam_limits to common-session (Debian)
  ansible.builtin.lineinfile:
    path: '/etc/pam.d/common-session'
    regexp: '^session\s+required\s+pam_limits\.so'
    line: 'session required                        pam_limits.so'
    state: present
  when:
    - ansible_facts['os_family'] == 'Debian'
    - pam_limits_enabled | bool

# RedHat: pam_limits.so is unconditionally included in authselect profiles.

# =============================================================================
# ACCESS CONTROL
# =============================================================================

- name: Configure | Deploy access control configuration
  ansible.builtin.template:
    src: 'access.conf.j2'
    dest: '/etc/security/access.conf'
    owner: root
    group: root
    mode: '0644'
  when: pam_access_enabled | bool

# Arch: pam_access.so already in pambase system-login account stack — no changes needed.

# Debian: pam_access not in default stack. Add to common-account.
- name: Configure | Add pam_access to common-account (Debian)
  ansible.builtin.lineinfile:
    path: '/etc/pam.d/common-account'
    regexp: '^account\s+required\s+pam_access\.so'
    line: 'account required                        pam_access.so'
    state: present
  when:
    - ansible_facts['os_family'] == 'Debian'
    - pam_access_enabled | bool

- name: Configure | Remove pam_access from common-account (Debian)
  ansible.builtin.lineinfile:
    path: '/etc/pam.d/common-account'
    regexp: '^account\s+required\s+pam_access\.so'
    state: absent
  when:
    - ansible_facts['os_family'] == 'Debian'
    - not (pam_access_enabled | bool)

# RedHat: use authselect feature
- name: Configure | Enable pam_access via authselect (RedHat)
  ansible.builtin.command: authselect enable-feature with-pamaccess
  changed_when: true
  when:
    - ansible_facts['os_family'] == 'RedHat'
    - pam_access_enabled | bool
    - "'with-pamaccess' not in (__pam_authselect_current.stdout | default(''))"

# =============================================================================
# UMASK
# =============================================================================

# All platforms: configure UMASK in login.defs (read by pam_umask and login)
- name: Configure | Umask in login.defs
  ansible.builtin.lineinfile:
    path: '/etc/login.defs'
    regexp: '^UMASK\s+'
    line: 'UMASK {{ pam_umask }}'
    state: present

# Arch: pam_umask.so already in pambase system-login — reads UMASK from login.defs.
# Debian: pam_umask.so already in common-session — reads UMASK from login.defs.
# RedHat: pam_umask.so in authselect profile — reads UMASK from login.defs.

- name: Configure | Usergroups in login.defs
  ansible.builtin.lineinfile:
    path: '/etc/login.defs'
    regexp: '^USERGROUPS_ENAB\s+'
    line: 'USERGROUPS_ENAB {{ "yes" if pam_umask_usergroups else "no" }}'
    state: present

# =============================================================================
# NULL PASSWORDS
# =============================================================================

# Arch: remove nullok from all pam_unix.so lines in system-auth
# (auth line and password line both have nullok by default)
- name: Configure | Disable null password authentication (Arch)
  ansible.builtin.replace:
    path: '/etc/pam.d/system-auth'
    regexp: '(pam_unix\.so.*?) nullok'
    replace: '\1'
  when:
    - ansible_facts['os_family'] == 'Archlinux'
    - not (pam_permit_empty_passwords | bool)

# Debian: remove nullok from pam_unix.so lines in common-auth and common-password
- name: Configure | Disable null password authentication in common-auth (Debian)
  ansible.builtin.replace:
    path: '/etc/pam.d/common-auth'
    regexp: '(pam_unix\.so.*?) nullok'
    replace: '\1'
  when:
    - ansible_facts['os_family'] == 'Debian'
    - not (pam_permit_empty_passwords | bool)

- name: Configure | Disable null password authentication in common-password (Debian)
  ansible.builtin.replace:
    path: '/etc/pam.d/common-password'
    regexp: '(pam_unix\.so.*?) nullok'
    replace: '\1'
  when:
    - ansible_facts['os_family'] == 'Debian'
    - not (pam_permit_empty_passwords | bool)

# RedHat: use authselect without-nullok feature
- name: Configure | Disable null passwords via authselect (RedHat)
  ansible.builtin.command: authselect enable-feature without-nullok
  changed_when: true
  when:
    - ansible_facts['os_family'] == 'RedHat'
    - not (pam_permit_empty_passwords | bool)
    - "'without-nullok' not in (__pam_authselect_current.stdout | default(''))"

# =============================================================================
# LOGIN DELAY
# =============================================================================

# Arch: add pam_faildelay to system-login auth stack
- name: Configure | Login delay (Arch)
  ansible.builtin.lineinfile:
    path: '/etc/pam.d/system-login'
    regexp: '^auth\s+optional\s+pam_faildelay\.so'
    line: 'auth       optional                    pam_faildelay.so     delay={{ pam_delay }}'
    insertafter: '^auth\s+include\s+system-auth'
    state: present
  when: ansible_facts['os_family'] == 'Archlinux'

# Debian: pam_faildelay already in /etc/pam.d/login, update delay value
- name: Configure | Login delay (Debian)
  ansible.builtin.lineinfile:
    path: '/etc/pam.d/login'
    regexp: '^auth\s+optional\s+pam_faildelay\.so'
    line: 'auth    optional                        pam_faildelay.so delay={{ pam_delay }}'
    insertbefore: '^auth\s+required'
    state: present
  failed_when: false
  when: ansible_facts['os_family'] == 'Debian'

# RedHat: FAIL_DELAY in login.defs is respected by login(1)
- name: Configure | Login delay in login.defs (RedHat)
  ansible.builtin.lineinfile:
    path: '/etc/login.defs'
    regexp: '^FAIL_DELAY\s+'
    line: 'FAIL_DELAY {{ (pam_delay / 1000000) | int }}'
    state: present
  when: ansible_facts['os_family'] == 'RedHat'

# =============================================================================
# SECURE TTY
# =============================================================================

- name: Configure | Deploy securetty configuration
  ansible.builtin.template:
    src: 'securetty.j2'
    dest: '/etc/securetty'
    owner: root
    group: root
    mode: '0600'
  when: pam_securetty_enabled | bool

# =============================================================================
# TWO-FACTOR AUTHENTICATION
# =============================================================================

# Arch: add to system-auth or service-specific PAM files
- name: Configure | 2FA for PAM services (Arch)
  ansible.builtin.lineinfile:
    path: '/etc/pam.d/{{ item }}'
    regexp: '^auth\s+(required|sufficient)\s+pam_google_authenticator\.so'
    line: >-
      auth {{ "required" if not pam_2fa_optional else "sufficient" }}
      pam_google_authenticator.so{{ " nullok" if pam_2fa_optional else "" }}
    insertafter: '^auth\s+include\s+system'
    state: present
  loop: '{{ pam_2fa_services }}'
  when:
    - ansible_facts['os_family'] == 'Archlinux'
    - pam_2fa_enabled | bool

# Debian: add to service-specific PAM files
- name: Configure | 2FA for PAM services (Debian)
  ansible.builtin.lineinfile:
    path: '/etc/pam.d/{{ item }}'
    regexp: '^auth\s+(required|sufficient)\s+pam_google_authenticator\.so'
    line: >-
      auth {{ "required" if not pam_2fa_optional else "sufficient" }}
      pam_google_authenticator.so{{ " nullok" if pam_2fa_optional else "" }}
    insertafter: '^@include common-auth'
    state: present
  loop: '{{ pam_2fa_services }}'
  when:
    - ansible_facts['os_family'] == 'Debian'
    - pam_2fa_enabled | bool

# RedHat: add to service-specific PAM files (authselect manages system-auth)
- name: Configure | 2FA for PAM services (RedHat)
  ansible.builtin.lineinfile:
    path: '/etc/pam.d/{{ item }}'
    regexp: '^auth\s+(required|sufficient)\s+pam_google_authenticator\.so'
    line: >-
      auth {{ "required" if not pam_2fa_optional else "sufficient" }}
      pam_google_authenticator.so{{ " nullok" if pam_2fa_optional else "" }}
    insertafter: '^auth\s+(substack|include)\s+(system-auth|password-auth)'
    state: present
  loop: '{{ pam_2fa_services }}'
  when:
    - ansible_facts['os_family'] == 'RedHat'
    - pam_2fa_enabled | bool

- name: Configure | Deploy 2FA setup script
  ansible.builtin.template:
    src: '2fa-setup.sh.j2'
    dest: '/usr/local/bin/2fa-setup.sh'
    owner: root
    group: root
    mode: '0755'
  when: pam_2fa_enabled | bool

- name: Configure | Remove 2FA setup script when disabled
  ansible.builtin.file:
    path: '/usr/local/bin/2fa-setup.sh'
    state: absent
  when: not (pam_2fa_enabled | bool)
