---
- name: Configure | Create jail.d directory
  ansible.builtin.file:
    path: '{{ __fail2ban_jail_d_dir }}'
    state: directory
    owner: root
    group: root
    mode: '0755'

#
# Main Configuration
#

- name: Configure | Deploy jail.local
  ansible.builtin.template:
    src: 'jail.local.j2'
    dest: '{{ __fail2ban_config_dir }}/jail.local'
    owner: root
    group: root
    mode: '0644'
  notify: Restart fail2ban

- name: Configure | Ensure logtarget file exists
  ansible.builtin.copy:
    content: ''
    dest: '{{ fail2ban_logtarget }}'
    owner: root
    group: root
    mode: '0640'
    force: false
  when: fail2ban_logtarget is not search('SYSLOG|SYSTEMD|STDOUT|STDERR')

#
# SSH Jail
#

- name: Configure | Deploy SSH jail
  ansible.builtin.template:
    src: 'jail.d/sshd.local.j2'
    dest: '{{ __fail2ban_jail_d_dir }}/sshd.local'
    owner: root
    group: root
    mode: '0644'
  notify: Reload fail2ban

#
# Mail Server Jails
#

- name: Configure | Deploy mail server jails
  ansible.builtin.template:
    src: 'jail.d/mail.local.j2'
    dest: '{{ __fail2ban_jail_d_dir }}/mail.local'
    owner: root
    group: root
    mode: '0644'
  when: >-
    fail2ban_postfix_enabled | bool or fail2ban_dovecot_enabled | bool or
    fail2ban_postfix_sasl_enabled | bool or fail2ban_postfix_rbl_enabled | bool or
    fail2ban_sogo_enabled | bool or fail2ban_roundcube_enabled | bool
  notify: Reload fail2ban

- name: Configure | Remove mail jail if disabled
  ansible.builtin.file:
    path: '{{ __fail2ban_jail_d_dir }}/mail.local'
    state: absent
  when: >-
    not (fail2ban_postfix_enabled | bool or fail2ban_dovecot_enabled | bool or
    fail2ban_postfix_sasl_enabled | bool or fail2ban_postfix_rbl_enabled | bool or
    fail2ban_sogo_enabled | bool or fail2ban_roundcube_enabled | bool)
  notify: Reload fail2ban

#
# Recidive Jail
#

- name: Configure | Deploy recidive jail
  ansible.builtin.template:
    src: 'jail.d/recidive.local.j2'
    dest: '{{ __fail2ban_jail_d_dir }}/recidive.local'
    owner: root
    group: root
    mode: '0644'
  when: fail2ban_recidive_enabled | bool
  notify: Reload fail2ban

- name: Configure | Remove recidive jail if disabled
  ansible.builtin.file:
    path: '{{ __fail2ban_jail_d_dir }}/recidive.local'
    state: absent
  when: not (fail2ban_recidive_enabled | bool)
  notify: Reload fail2ban

#
# Apache Jails
#

- name: Configure | Deploy Apache jails
  ansible.builtin.template:
    src: 'jail.d/apache.local.j2'
    dest: '{{ __fail2ban_jail_d_dir }}/apache.local'
    owner: root
    group: root
    mode: '0644'
  when: >-
    fail2ban_apache_auth_enabled | bool or fail2ban_apache_badbots_enabled | bool or
    fail2ban_apache_noscript_enabled | bool or fail2ban_apache_overflows_enabled | bool or
    fail2ban_apache_nohome_enabled | bool or fail2ban_apache_botsearch_enabled | bool or
    fail2ban_apache_fakegooglebot_enabled | bool or fail2ban_apache_modsecurity_enabled | bool or
    fail2ban_apache_shellshock_enabled | bool
  notify: Reload fail2ban

- name: Configure | Remove Apache jails if disabled
  ansible.builtin.file:
    path: '{{ __fail2ban_jail_d_dir }}/apache.local'
    state: absent
  when: >-
    not (fail2ban_apache_auth_enabled | bool or fail2ban_apache_badbots_enabled | bool or
    fail2ban_apache_noscript_enabled | bool or fail2ban_apache_overflows_enabled | bool or
    fail2ban_apache_nohome_enabled | bool or fail2ban_apache_botsearch_enabled | bool or
    fail2ban_apache_fakegooglebot_enabled | bool or fail2ban_apache_modsecurity_enabled | bool or
    fail2ban_apache_shellshock_enabled | bool)
  notify: Reload fail2ban

#
# Nginx Jails
#

- name: Configure | Deploy Nginx jails
  ansible.builtin.template:
    src: 'jail.d/nginx.local.j2'
    dest: '{{ __fail2ban_jail_d_dir }}/nginx.local'
    owner: root
    group: root
    mode: '0644'
  when: >-
    fail2ban_nginx_http_auth_enabled | bool or fail2ban_nginx_limit_req_enabled | bool or
    fail2ban_nginx_botsearch_enabled | bool or fail2ban_nginx_forbidden_enabled | bool or
    fail2ban_nginx_bad_request_enabled | bool
  notify: Reload fail2ban

- name: Configure | Remove Nginx jails if disabled
  ansible.builtin.file:
    path: '{{ __fail2ban_jail_d_dir }}/nginx.local'
    state: absent
  when: >-
    not (fail2ban_nginx_http_auth_enabled | bool or fail2ban_nginx_limit_req_enabled | bool or
    fail2ban_nginx_botsearch_enabled | bool or fail2ban_nginx_forbidden_enabled | bool or
    fail2ban_nginx_bad_request_enabled | bool)
  notify: Reload fail2ban

#
# Database Jails
#

- name: Configure | Deploy database jails
  ansible.builtin.template:
    src: 'jail.d/database.local.j2'
    dest: '{{ __fail2ban_jail_d_dir }}/database.local'
    owner: root
    group: root
    mode: '0644'
  when: (fail2ban_mysqld_enabled | bool) or (fail2ban_postgresql_enabled | bool)
  notify: Reload fail2ban

- name: Configure | Remove database jails if disabled
  ansible.builtin.file:
    path: '{{ __fail2ban_jail_d_dir }}/database.local'
    state: absent
  when: not ((fail2ban_mysqld_enabled | bool) or (fail2ban_postgresql_enabled | bool))
  notify: Reload fail2ban

#
# Grafana Jail
#

- name: Configure | Deploy Grafana jail
  ansible.builtin.template:
    src: 'jail.d/grafana.local.j2'
    dest: '{{ __fail2ban_jail_d_dir }}/grafana.local'
    owner: root
    group: root
    mode: '0644'
  when: fail2ban_grafana_enabled | bool
  notify: Reload fail2ban

- name: Configure | Remove Grafana jail if disabled
  ansible.builtin.file:
    path: '{{ __fail2ban_jail_d_dir }}/grafana.local'
    state: absent
  when: not (fail2ban_grafana_enabled | bool)
  notify: Reload fail2ban

#
# Custom Jails, Filters, and Actions
#

- name: Configure | Deploy custom jails
  ansible.builtin.template:
    src: 'jail.d/custom.local.j2'
    dest: '{{ __fail2ban_jail_d_dir }}/custom.local'
    owner: root
    group: root
    mode: '0644'
  when: fail2ban_custom_jails | length > 0
  notify: Reload fail2ban

- name: Configure | Remove custom jails if empty
  ansible.builtin.file:
    path: '{{ __fail2ban_jail_d_dir }}/custom.local'
    state: absent
  when: fail2ban_custom_jails | length == 0
  notify: Reload fail2ban

- name: Configure | Deploy custom filters
  ansible.builtin.copy:
    content: '{{ item.definition }}'
    dest: '{{ __fail2ban_filter_d_dir }}/{{ item.name }}.local'
    owner: root
    group: root
    mode: '0644'
  loop: '{{ fail2ban_custom_filters }}'
  notify: Reload fail2ban

- name: Configure | Deploy custom actions
  ansible.builtin.copy:
    content: '{{ item.definition }}'
    dest: '{{ __fail2ban_action_d_dir }}/{{ item.name }}.local'
    owner: root
    group: root
    mode: '0644'
  loop: '{{ fail2ban_custom_actions }}'
  notify: Reload fail2ban
