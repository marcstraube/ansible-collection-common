---
__fail2ban_packages:
  - 'fail2ban'
  - 'fail2ban-firewalld'
  - 'ipset'
__fail2ban_service_name: 'fail2ban'
__fail2ban_config_dir: '/etc/fail2ban'
__fail2ban_jail_d_dir: '/etc/fail2ban/jail.d'
__fail2ban_filter_d_dir: '/etc/fail2ban/filter.d'
__fail2ban_action_d_dir: '/etc/fail2ban/action.d'
__fail2ban_banaction: 'firewallcmd-ipset'
__fail2ban_banaction_allports: 'firewallcmd-ipset'
