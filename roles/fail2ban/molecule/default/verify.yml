---
- name: Verify
  hosts: all
  gather_facts: true

  tasks:
    #
    # Package Verification
    #

    - name: Verify | Check Fail2ban package is installed
      ansible.builtin.package:
        name: fail2ban
        state: present
      check_mode: true
      register: pkg_check
      failed_when: pkg_check.changed

    #
    # Configuration Files
    #

    - name: Verify | Check jail.local exists
      ansible.builtin.stat:
        path: /etc/fail2ban/jail.local
      register: jail_local

    - name: Verify | Assert jail.local exists
      ansible.builtin.assert:
        that:
          - jail_local.stat.exists
        fail_msg: 'jail.local does not exist'

    - name: Verify | Check sshd jail exists
      ansible.builtin.stat:
        path: /etc/fail2ban/jail.d/sshd.local
      register: sshd_jail

    - name: Verify | Assert sshd jail exists
      ansible.builtin.assert:
        that:
          - sshd_jail.stat.exists
        fail_msg: 'sshd.local jail does not exist'

    - name: Verify | Check recidive jail exists
      ansible.builtin.stat:
        path: /etc/fail2ban/jail.d/recidive.local
      register: recidive_jail

    - name: Verify | Assert recidive jail exists
      ansible.builtin.assert:
        that:
          - recidive_jail.stat.exists
        fail_msg: 'recidive.local jail does not exist'

    - name: Verify | Check custom jail exists
      ansible.builtin.stat:
        path: /etc/fail2ban/jail.d/custom.local
      register: custom_jail

    - name: Verify | Assert custom jail exists
      ansible.builtin.assert:
        that:
          - custom_jail.stat.exists
        fail_msg: 'custom.local jail does not exist'

    - name: Verify | Check custom filter exists
      ansible.builtin.stat:
        path: /etc/fail2ban/filter.d/test-filter.local
      register: custom_filter

    - name: Verify | Assert custom filter exists
      ansible.builtin.assert:
        that:
          - custom_filter.stat.exists
        fail_msg: 'test-filter.local does not exist'

    - name: Verify | Check custom action exists
      ansible.builtin.stat:
        path: /etc/fail2ban/action.d/test-action.local
      register: custom_action

    - name: Verify | Assert custom action exists
      ansible.builtin.assert:
        that:
          - custom_action.stat.exists
        fail_msg: 'test-action.local does not exist'

    #
    # Configuration Content - jail.local
    #

    - name: Verify | Read jail.local content
      ansible.builtin.slurp:
        src: /etc/fail2ban/jail.local
      register: jail_local_content

    - name: Verify | Set jail.local decoded content
      ansible.builtin.set_fact:
        jail_local_text: "{{ jail_local_content.content | b64decode }}"

    - name: Verify | Assert jail.local contains expected settings
      ansible.builtin.assert:
        that:
          - "'Ansible managed' in jail_local_text"
          - "'bantime = 2h' in jail_local_text"
          - "'findtime = 15m' in jail_local_text"
          - "'maxretry = 3' in jail_local_text"
          - "'10.0.0.0/8' in jail_local_text"
          - "'bantime.increment = true' in jail_local_text"
          - "'bantime.factor = 2' in jail_local_text"
          - "'bantime.maxtime = 4w' in jail_local_text"
          - "'dbpurgeage = 2d' in jail_local_text"
          - "'dbmaxmatches = 15' in jail_local_text"
          - "'sendername = Fail2Ban' in jail_local_text"
          - "'usedns = warn' in jail_local_text"
        fail_msg: 'jail.local does not contain expected settings'

    #
    # Configuration Content - sshd.local
    #

    - name: Verify | Read sshd.local content
      ansible.builtin.slurp:
        src: /etc/fail2ban/jail.d/sshd.local
      register: sshd_content

    - name: Verify | Set sshd decoded content
      ansible.builtin.set_fact:
        sshd_text: "{{ sshd_content.content | b64decode }}"

    - name: Verify | Assert sshd jail contains expected settings
      ansible.builtin.assert:
        that:
          - "'Ansible managed' in sshd_text"
          - "'enabled = true' in sshd_text"
          - "'maxretry = 3' in sshd_text"
          - "'bantime = 30m' in sshd_text"
          - "'mode = aggressive' in sshd_text"
          - "'[sshd-ddos]' in sshd_text"
        fail_msg: 'sshd.local does not contain expected settings'

    #
    # Configuration Content - recidive.local
    #

    - name: Verify | Read recidive.local content
      ansible.builtin.slurp:
        src: /etc/fail2ban/jail.d/recidive.local
      register: recidive_content

    - name: Verify | Assert recidive jail contains expected settings
      ansible.builtin.assert:
        that:
          - "'Ansible managed' in (recidive_content.content | b64decode)"
          - "'enabled = true' in (recidive_content.content | b64decode)"
          - "'bantime = 2w' in (recidive_content.content | b64decode)"
        fail_msg: 'recidive.local does not contain expected settings'

    #
    # Configuration Content - Custom
    #

    - name: Verify | Read custom filter content
      ansible.builtin.slurp:
        src: /etc/fail2ban/filter.d/test-filter.local
      register: filter_content

    - name: Verify | Assert custom filter contains expected regex
      ansible.builtin.assert:
        that:
          - "'Test failed from <HOST>' in (filter_content.content | b64decode)"
        fail_msg: 'Custom filter does not contain expected regex'

    - name: Verify | Read custom action content
      ansible.builtin.slurp:
        src: /etc/fail2ban/action.d/test-action.local
      register: action_content

    - name: Verify | Assert custom action contains expected commands
      ansible.builtin.assert:
        that:
          - "'actionban = /bin/true' in (action_content.content | b64decode)"
        fail_msg: 'Custom action does not contain expected commands'

    #
    # Service Verification
    #

    - name: Verify | Check Fail2ban service is enabled
      ansible.builtin.systemd_service:
        name: fail2ban
        enabled: true
      check_mode: true
      register: service_enabled
      failed_when: service_enabled.changed

    - name: Verify | Check Fail2ban service is running
      ansible.builtin.systemd_service:
        name: fail2ban
        state: started
      check_mode: true
      register: service_check
      failed_when: service_check.changed

    #
    # Functional Tests
    #

    - name: Verify | Test fail2ban-client status
      ansible.builtin.command: fail2ban-client status
      register: f2b_status
      changed_when: false
      failed_when: f2b_status.rc != 0

    - name: Verify | Assert fail2ban-client output
      ansible.builtin.assert:
        that:
          - "'Number of jail' in f2b_status.stdout"
          - "'sshd' in f2b_status.stdout"
        fail_msg: 'fail2ban-client status output unexpected'

    - name: Verify | Test fail2ban-client ping
      ansible.builtin.command: fail2ban-client ping
      register: f2b_ping
      changed_when: false
      failed_when: f2b_ping.rc != 0

    - name: Verify | Assert ping response
      ansible.builtin.assert:
        that:
          - "'pong' in f2b_ping.stdout.lower()"
        fail_msg: 'fail2ban-client ping did not return pong'

    - name: Verify | Get sshd jail status
      ansible.builtin.command: fail2ban-client status sshd
      register: sshd_status
      changed_when: false
      failed_when: sshd_status.rc != 0

    - name: Verify | Assert sshd jail is active
      ansible.builtin.assert:
        that:
          - "'Currently banned' in sshd_status.stdout"
          - "'Total banned' in sshd_status.stdout"
        fail_msg: 'sshd jail status output unexpected'

    #
    # Database Verification
    #

    - name: Verify | Check fail2ban database exists
      ansible.builtin.stat:
        path: /var/lib/fail2ban/fail2ban.sqlite3
      register: f2b_db

    - name: Verify | Assert database exists
      ansible.builtin.assert:
        that:
          - f2b_db.stat.exists
        fail_msg: 'Fail2ban database does not exist'

    #
    # File Permissions
    #

    - name: Verify | Check jail.local permissions
      ansible.builtin.assert:
        that:
          - jail_local.stat.mode == '0644'
        fail_msg: 'jail.local has incorrect permissions'
