---
- name: Converge
  hosts: all
  gather_facts: true

  vars:
    multiplexer_enabled: true
    multiplexer_tmux_enabled: true
    multiplexer_zellij_enabled: "{{ ansible_facts['os_family'] == 'Archlinux' }}"
    multiplexer_users:
      - username: 'testuser'
        mode: 'managed'
        config_merge: true
        tpm_enabled: false
        tmux_config:
          prefix: 'C-b'
          mouse: false
        zellij_config:
          theme: 'catppuccin'
      - username: 'disableduser'
        mode: 'disabled'

  pre_tasks:
    - name: Converge | Create test user for per-user config
      ansible.builtin.user:
        name: testuser
        state: present
        create_home: true

    - name: Converge | Create disabled test user
      ansible.builtin.user:
        name: disableduser
        state: present
        create_home: true

    - name: Converge | Simulate newly created user fact
      ansible.builtin.set_fact:
        __users_newly_created:
          - 'testuser'
          - 'disableduser'

  tasks:
    - name: Converge | Include multiplexer role  # noqa: role-name[path]
      ansible.builtin.include_role:
        name: '{{ playbook_dir }}/../..'
