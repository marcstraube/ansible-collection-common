---
# Loops over multiplexer_users entries.
# Respects mode: managed | initial | disabled

- name: Users | Deploy per-user multiplexer config
  ansible.builtin.include_tasks:
    file: user_config.yml
    apply:
      tags:
        - multiplexer
        - multiplexer:users
  loop: '{{ multiplexer_users }}'
  loop_control:
    loop_var: __multiplexer_user
    label: '{{ __multiplexer_user.username }}'
  when:
    - (__multiplexer_user.mode | default(multiplexer_user_config_mode)) != 'disabled'
    - >-
      (__multiplexer_user.mode | default(multiplexer_user_config_mode)) == 'managed'
      or ((__multiplexer_user.mode | default(multiplexer_user_config_mode)) == 'initial'
          and __multiplexer_user.username in (__users_newly_created | default([])))
