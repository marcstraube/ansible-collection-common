---
# =============================================================================
# Users Tasks
# =============================================================================

# =============================================================================
# Determine Default User (for become_password)
# =============================================================================

- name: Users | Find users with default flag
  ansible.builtin.set_fact:
    users_with_default_flag: >-
      {{ users_list | selectattr('default', 'defined')
         | selectattr('default', 'equalto', true) | list }}
    users_non_root: >-
      {{ users_list | rejectattr('name', 'equalto', 'root') | list }}

- name: Users | Warn if multiple users have default flag
  ansible.builtin.debug:
    msg: "WARNING: Multiple users have 'default: true'. Using first one: {{ users_with_default_flag[0].name }}"
  when: users_with_default_flag | length > 1

- name: Users | Set default user fact
  ansible.builtin.set_fact:
    users_default_user: >-
      {%- if users_with_default_flag | length > 0 -%}
        {{ users_with_default_flag[0] }}
      {%- elif users_non_root | length > 0 -%}
        {{ users_non_root[0] }}
      {%- else -%}
        {{ {} }}
      {%- endif -%}

- name: Users | Display default user
  ansible.builtin.debug:
    msg: "Default user: {{ users_default_user.name | default('none') }} (used for become_password)"
  when: users_default_user.name is defined

# =============================================================================
# Root User (Special Handling - password/shell only)
# =============================================================================

- name: Users | Update root password
  ansible.builtin.user:
    name: root
    password: >-
      {%- set pwd = item.password | default('!') -%}
      {%- if pwd == '!' or pwd == '*' or pwd == '' -%}
        {{ pwd if pwd else '!' }}
      {%- elif pwd.startswith('$') -%}
        {{ pwd }}
      {%- elif users_password_salt | default('') | length > 0 -%}
        {{ pwd | password_hash(users_password_hash_algo, salt=users_password_salt) }}
      {%- else -%}
        {{ pwd | password_hash(users_password_hash_algo) }}
      {%- endif -%}
    update_password: '{{ item.update_password | default("always") }}'
  loop: "{{ users_list | selectattr('name', 'equalto', 'root') | list }}"
  loop_control:
    label: 'root'
  no_log: true
  when: item.password is defined

- name: Users | Update root shell
  ansible.builtin.user:
    name: root
    shell: >-
      {%- set wanted = item.shell -%}
      {%- if wanted in ['/bin/bash', '/usr/bin/bash', '/bin/sh', '/usr/bin/sh'] -%}
        {{ wanted }}
      {%- else -%}
        /bin/bash
      {%- endif -%}
  loop: "{{ users_list | selectattr('name', 'equalto', 'root') | list }}"
  loop_control:
    label: 'root'
  when: item.shell is defined

# =============================================================================
# Regular Users (excluding root)
# =============================================================================

# =============================================================================
# Random Password Generation
# =============================================================================

- name: Users | Generate random passwords for users without one
  ansible.builtin.set_fact:
    __users_generated_passwords: >-
      {% set result = {} -%}
      {% for user in users_list | rejectattr('name', 'equalto', 'root') | list -%}
        {% if user.password is not defined and user.state | default('present') == 'present' -%}
          {% set pw = lookup('ansible.builtin.password',
             '/dev/null length=' ~ users_random_password_length
             ~ ' chars=ascii_letters,digits,punctuation') -%}
          {% set _ = result.update({user.name: pw}) -%}
        {%- endif %}
      {%- endfor -%}
      {{ result }}
  when: users_generate_random_password | default(false) | bool
  no_log: true

- name: Users | Store generated passwords to file
  ansible.builtin.lineinfile:
    path: '{{ users_password_store_file }}'
    line: '{{ item.key }}: {{ item.value }}'
    regexp: '^{{ item.key }}:'
    create: true
    owner: root
    group: root
    mode: '0600'
  loop: '{{ __users_generated_passwords | default({}) | dict2items }}'
  loop_control:
    label: '{{ item.key }}'
  when:
    - users_generate_random_password | default(false) | bool
    - users_password_store_file | default('') | length > 0
    - __users_generated_passwords | default({}) | length > 0
  no_log: true
  delegate_to: localhost
  become: false

# =============================================================================
# Shell Binary Validation (fallback to /bin/bash if missing)
# =============================================================================

- name: Users | Check if configured shell exists for each user
  ansible.builtin.stat:
    path: '{{ item.shell | default(users_default_shell) }}'
  register: users_shell_check
  loop: '{{ users_list | rejectattr("name", "equalto", "root") | list }}'
  loop_control:
    label: '{{ item.name }}'

- name: Users | Warn about missing shell binaries (falling back to /bin/bash)
  ansible.builtin.debug:
    msg: >-
      WARNING: Shell '{{ item.item.shell }}' for user '{{ item.item.name }}'
      does not exist. Falling back to /bin/bash.
  loop: '{{ users_shell_check.results }}'
  loop_control:
    label: '{{ item.item.name }}'
  when:
    - item.item.shell is defined
    - not (item.stat.exists | default(false))

- name: Users | Create users
  ansible.builtin.user:
    name: '{{ item.name }}'
    comment: '{{ item.comment | default(omit) }}'
    uid: '{{ item.uid | default(omit) }}'
    group: '{{ item.group | default(item.name) }}'
    groups: '{{ item.groups | default(users_default_groups) }}'
    append: '{{ item.append_groups | default(users_default_append_groups) }}'
    shell: >-
      {%- set wanted = item.shell | default(users_default_shell) -%}
      {%- set check = users_shell_check.results
            | selectattr('item.name', 'equalto', item.name)
            | first -%}
      {%- if check.stat.exists | default(false) -%}
        {{ wanted }}
      {%- else -%}
        /bin/bash
      {%- endif -%}
    home: '{{ item.home | default(users_default_home_base + "/" + item.name) }}'
    create_home: '{{ item.create_home | default(users_default_create_home) }}'
    move_home: '{{ item.move_home | default(false) }}'
    skeleton: '{{ item.skeleton | default(users_default_skeleton) }}'
    # Auto-hash plaintext passwords (if not already hashed starting with $)
    # Supports: plaintext, pre-hashed ($6$...), or locked (!)
    # If users_password_salt is set, uses fixed salt for idempotent hashing
    # Falls back to generated password if users_generate_random_password is true
    password: >-
      {%- set generated = __users_generated_passwords | default({}) -%}
      {%- set pwd = item.password | default(generated.get(item.name, '!')) -%}
      {%- if pwd == '!' or pwd == '*' or pwd == '' -%}
        {{ pwd if pwd else '!' }}
      {%- elif pwd.startswith('$') -%}
        {{ pwd }}
      {%- elif users_password_salt | default('') | length > 0 -%}
        {{ pwd | password_hash(users_password_hash_algo, salt=users_password_salt) }}
      {%- else -%}
        {{ pwd | password_hash(users_password_hash_algo) }}
      {%- endif -%}
    password_lock: '{{ item.password_lock | default(omit) }}'
    update_password: '{{ item.update_password | default(users_default_update_password) }}'
    expires: '{{ item.expires | default(omit) }}'
    system: '{{ item.system | default(false) }}'
    generate_ssh_key: '{{ item.generate_ssh_key | default(false) }}'
    ssh_key_type: '{{ item.ssh_key_type | default(users_default_ssh_key_type) }}'
    ssh_key_bits: '{{ item.ssh_key_bits | default(omit) }}'
    ssh_key_comment: '{{ item.ssh_key_comment | default(omit) }}'
    ssh_key_passphrase: '{{ item.ssh_key_passphrase | default(omit) }}'
    state: '{{ item.state | default("present") }}'
    remove: '{{ users_remove_home }}'
    force: '{{ users_force_remove }}'
  loop: '{{ users_list | rejectattr("name", "equalto", "root") | list }}'
  loop_control:
    label: '{{ item.name }}'
  no_log: true
  register: __users_create_result

- name: Users | Set list of newly created users
  ansible.builtin.set_fact:
    __users_newly_created: >-
      {{ __users_create_result.results
         | default([])
         | selectattr('changed', 'equalto', true)
         | map(attribute='item')
         | map(attribute='name')
         | list }}

- name: Users | Set home directory permissions
  ansible.builtin.file:
    path: '{{ item.home | default(users_default_home_base + "/" + item.name) }}'
    state: directory
    owner: '{{ item.name }}'
    group: '{{ item.group | default(item.name) }}'
    mode: '{{ item.home_mode | default(users_home_mode) }}'
  loop: '{{ users_list | rejectattr("name", "equalto", "root") | list }}'
  loop_control:
    label: '{{ item.name }}'
  when:
    - item.state | default('present') == 'present'
    - item.create_home | default(users_default_create_home)

- name: Users | Create SSH directory
  ansible.builtin.file:
    path: '{{ item.home | default(users_default_home_base + "/" + item.name) }}/{{ users_ssh_authorized_keys_dir }}'
    state: directory
    owner: '{{ item.name }}'
    group: '{{ item.group | default(item.name) }}'
    mode: '{{ users_ssh_dir_mode }}'
  loop: '{{ users_list | rejectattr("name", "equalto", "root") | list }}'
  loop_control:
    label: '{{ item.name }}'
  when:
    - item.state | default('present') == 'present'
    - item.create_home | default(users_default_create_home) | bool
    - users_create_ssh_dir | bool

# =============================================================================
# Exclusive Mode — remove unlisted users
# =============================================================================

- name: Users | Get existing regular users from passwd
  ansible.builtin.getent:
    database: passwd
  when: users_exclusive | default(false) | bool

- name: Users | Build list of managed usernames
  ansible.builtin.set_fact:
    __users_managed_names: >-
      {{ users_list | map(attribute='name') | list + users_keep }}
  when: users_exclusive | default(false) | bool

- name: Users | Identify users to remove (exclusive mode)
  ansible.builtin.set_fact:
    __users_to_remove: >-
      {% set result = [] -%}
      {% for user, info in ansible_facts['getent_passwd'].items() -%}
        {% if info[1] | int >= 1000 and info[1] | int < 60000
           and user not in __users_managed_names -%}
          {% set _ = result.append(user) -%}
        {%- endif %}
      {%- endfor -%}
      {{ result }}
  when: users_exclusive | default(false) | bool

- name: Users | Remove unlisted users (exclusive mode)
  ansible.builtin.user:
    name: '{{ item }}'
    state: absent
    remove: '{{ users_remove_home }}'
    force: '{{ users_force_remove }}'
  loop: '{{ __users_to_remove | default([]) }}'
  loop_control:
    label: '{{ item }}'
  when: users_exclusive | default(false) | bool
