---
# =============================================================================
# Users Role Metadata
# =============================================================================

galaxy_info:
  author: 'Marc Straube'
  description: 'Manage system users, groups, and SSH keys'
  license: 'MIT'
  min_ansible_version: '2.17'

  platforms:
    - name: 'ArchLinux'
      versions:
        - 'all'
    - name: 'Debian'
      versions:
        - 'trixie'
    - name: 'EL'
      versions:
        - '9'
        - '10'

  galaxy_tags:
    - 'users'
    - 'groups'
    - 'ssh'
    - 'security'
    - 'system'
    - 'linux'

dependencies: []

collections:
  - 'ansible.posix'
