---
- name: AppArmor | Check if AppArmor is available
  ansible.builtin.stat:
    path: /sys/kernel/security/apparmor
  register: __snmp_apparmor_active

- name: AppArmor | Get current profile status
  ansible.builtin.command:
    cmd: aa-status --json
  register: __snmp_aa_status
  changed_when: false
  failed_when: false
  when: __snmp_apparmor_active.stat.exists

- name: AppArmor | Build enforce set
  ansible.builtin.set_fact:
    __snmp_apparmor_enforce_set: >-
      {{ (__snmp_aa_status.stdout | default('{}') | from_json).get('profiles', {})
         | dict2items | selectattr('value', 'eq', 'enforce')
         | map(attribute='key') | list }}
  when:
    - __snmp_apparmor_active.stat.exists
    - __snmp_aa_status.rc == 0

- name: AppArmor | Enforce snmpd profile
  ansible.builtin.command:
    cmd: 'aa-enforce {{ __snmp_apparmor_profile }}'
  when:
    - __snmp_apparmor_active.stat.exists
    - >-
      __snmp_apparmor_profile not in __snmp_apparmor_enforce_set | default([])
      and (__snmp_apparmor_profile | basename) not in __snmp_apparmor_enforce_set | default([])
  changed_when: true
