---
- name: Prepare
  hosts: all
  gather_facts: true

  tasks:
    - name: Update package cache (Arch)
      community.general.pacman:
        update_cache: true
        upgrade: true
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Update package cache (Debian)
      ansible.builtin.apt:
        update_cache: true
      when: ansible_facts['os_family'] == 'Debian'

    - name: Update package cache (RedHat)
      ansible.builtin.dnf:
        update_cache: true
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Install cryptography library (Arch)
      community.general.pacman:
        name:
          - python-cryptography
        state: present
        update_cache: true
      when: ansible_facts['os_family'] == 'Archlinux'

    - name: Install cryptography library (Debian)
      ansible.builtin.apt:
        name:
          - python3-cryptography
        state: present
        update_cache: true
      when: ansible_facts['os_family'] == 'Debian'

    - name: Install cryptography library (RedHat)
      ansible.builtin.dnf:
        name:
          - python3-cryptography
        state: present
      when: ansible_facts['os_family'] == 'RedHat'
