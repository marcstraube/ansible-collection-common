---
- name: Converge
  hosts: all
  gather_facts: true

  vars:
    pki_enabled: true
    pki_configure_system: true
    pki_min_protocol: 'TLSv1.2'
    pki_disable_legacy: true
    pki_create_dirs: true
    pki_crypto_policy: 'DEFAULT'

    # Test CA creation
    pki_ca_enabled: true
    pki_ca_dir: '/etc/ssl/ca'
    pki_ca_key_type: 'ec'
    pki_ca_key_curve: 'secp256r1'
    pki_ca_validity_days: 3650
    pki_ca_country: 'DE'
    pki_ca_organization: 'Test CA'
    pki_ca_common_name: 'Test Root CA'
    pki_ca_passphrase: ''

    # Test Intermediate CA
    pki_intermediate_ca_enabled: true
    pki_intermediate_ca_dir: '/etc/ssl/intermediate'
    pki_intermediate_ca_key_type: 'ec'
    pki_intermediate_ca_key_curve: 'secp256r1'
    pki_intermediate_ca_validity_days: 1825
    pki_intermediate_ca_common_name: 'Test Intermediate CA'
    pki_intermediate_ca_passphrase: ''

    # Test server certificates
    pki_server_certs:
      - name: 'webserver'
        common_name: 'test.example.com'
        san:
          - 'DNS:test.example.com'
          - 'DNS:www.test.example.com'
          - 'IP:192.168.1.100'
        key_type: 'ec'
        key_curve: 'secp256r1'
        validity_days: 365
        dest_cert: '/etc/ssl/certs/webserver.crt'
        dest_key: '/etc/ssl/private/webserver.key'
        dest_chain: '/etc/ssl/certs/webserver-chain.crt'
        owner: 'root'
        group: 'root'
        key_mode: '0600'
        sign_with_ca: true

    # Test client certificates
    pki_client_certs:
      - name: 'testclient'
        common_name: 'testclient@example.com'
        email: 'testclient@example.com'
        validity_days: 365

    # Test CSR generation
    pki_csrs:
      - name: 'external'
        common_name: 'external.example.com'
        san:
          - 'DNS:external.example.com'
        dest_csr: '/etc/ssl/csr/external.csr'
        dest_key: '/etc/ssl/private/external.key'

    # Test DH parameters (2048 for speed in tests)
    pki_dhparam_enabled: true
    pki_dhparam_size: 2048
    pki_dhparam_path: '/etc/ssl/dhparam.pem'

    # Test CRL
    pki_crl_enabled: true
    pki_crl_validity_days: 30
    pki_revoked_certs: []

    # Test OCSP
    pki_ocsp_enabled: true
    pki_ocsp_port: 2560

    # Test renewal monitoring
    pki_renewal_enabled: true
    pki_renewal_warning_days: 30
    pki_renewal_timer_oncalendar: 'weekly'
    pki_renewal_report_email: 'root'

  tasks:
    - name: Include pki role  # noqa: role-name[path]
      ansible.builtin.include_role:
        name: '{{ playbook_dir }}/../..'
