---
- name: Renewal | Deploy certificate check script
  ansible.builtin.template:
    src: 'pki-cert-check.sh.j2'
    dest: '/usr/local/bin/pki-cert-check'
    owner: root
    group: root
    mode: '0755'

- name: Renewal | Deploy certificate check systemd service
  ansible.builtin.template:
    src: 'pki-cert-check.service.j2'
    dest: '/etc/systemd/system/pki-cert-check.service'
    owner: root
    group: root
    mode: '0644'

- name: Renewal | Deploy certificate check systemd timer
  ansible.builtin.template:
    src: 'pki-cert-check.timer.j2'
    dest: '/etc/systemd/system/pki-cert-check.timer'
    owner: root
    group: root
    mode: '0644'
  notify:
    - Reload PKI systemd units
    - Restart PKI cert check timer

- name: Renewal | Manage certificate check timer
  ansible.builtin.systemd_service:
    name: pki-cert-check.timer
    enabled: "{{ pki_renewal_enabled | bool }}"
    state: "{{ pki_renewal_enabled | bool | ternary('started', 'stopped') }}"
    daemon_reload: true
