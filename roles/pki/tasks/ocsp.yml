---
- name: OCSP | Determine effective CA paths
  ansible.builtin.set_fact:
    __pki_ocsp_ca_cert: >-
      {{ pki_intermediate_ca_dir + '/certs/intermediate.crt'
         if (pki_intermediate_ca_enabled | bool)
         else pki_ca_dir + '/certs/ca.crt' }}
    __pki_ocsp_ca_key: >-
      {{ pki_intermediate_ca_dir + '/private/intermediate.key'
         if (pki_intermediate_ca_enabled | bool)
         else pki_ca_dir + '/private/ca.key' }}
    __pki_ocsp_ca_passphrase: >-
      {{ pki_intermediate_ca_passphrase
         if (pki_intermediate_ca_enabled | bool)
         else pki_ca_passphrase }}
    __pki_ocsp_ca_dir: >-
      {{ pki_intermediate_ca_dir
         if (pki_intermediate_ca_enabled | bool)
         else pki_ca_dir }}
    __pki_ocsp_key_curve: >-
      {{ pki_intermediate_ca_key_curve
         if (pki_intermediate_ca_enabled | bool)
         else pki_ca_key_curve }}
  no_log: true

- name: OCSP | Generate OCSP signing private key
  community.crypto.openssl_privatekey:
    path: '{{ __pki_ocsp_ca_dir }}/private/ocsp.key'
    type: 'ECC'
    curve: '{{ __pki_ocsp_key_curve }}'
    owner: root
    group: root
    mode: '0400'

- name: OCSP | Generate OCSP signing CSR
  community.crypto.openssl_csr:
    path: '{{ __pki_ocsp_ca_dir }}/csr/ocsp.csr'
    privatekey_path: '{{ __pki_ocsp_ca_dir }}/private/ocsp.key'
    common_name: 'OCSP Responder'
    key_usage:
      - 'digitalSignature'
    key_usage_critical: true
    extended_key_usage:
      - 'OCSPSigning'
    extended_key_usage_critical: true
    owner: root
    group: root
    mode: '0644'

- name: OCSP | Sign OCSP certificate with CA
  community.crypto.x509_certificate:
    path: '{{ __pki_ocsp_ca_dir }}/certs/ocsp.crt'
    csr_path: '{{ __pki_ocsp_ca_dir }}/csr/ocsp.csr'
    ownca_path: '{{ __pki_ocsp_ca_cert }}'
    ownca_privatekey_path: '{{ __pki_ocsp_ca_key }}'
    ownca_privatekey_passphrase: '{{ __pki_ocsp_ca_passphrase | default(omit, true) }}'
    ownca_not_after: '+365d'
    provider: ownca
    owner: root
    group: root
    mode: '0644'

- name: OCSP | Deploy OCSP responder systemd service
  ansible.builtin.template:
    src: 'pki-ocsp.service.j2'
    dest: '/etc/systemd/system/pki-ocsp.service'
    owner: root
    group: root
    mode: '0644'
  notify:
    - Reload PKI systemd units
    - Restart PKI OCSP responder

- name: OCSP | Manage OCSP responder service
  ansible.builtin.systemd_service:
    name: pki-ocsp.service
    enabled: "{{ pki_ocsp_enabled | bool }}"
    state: "{{ pki_ocsp_enabled | bool | ternary('started', 'stopped') }}"
    daemon_reload: true
