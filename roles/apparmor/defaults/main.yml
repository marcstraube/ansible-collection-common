---
#
# Role Control
#

# Enable the apparmor role
apparmor_enabled: true

# Enable and start the apparmor service
apparmor_service_enabled: true

#
# Boot Configuration
#

# Enable AppArmor at boot via GRUB kernel parameters
apparmor_boot_enabled: true

# Security filesystem path (used to detect kernel support)
apparmor_securityfs: '/sys/kernel/security'

#
# Profile Management
#

# Profiles to put in enforce mode (list of binary paths)
apparmor_enforce_profiles:
  - '/usr/sbin/tcpdump'
  - '/usr/bin/man'

# Profiles to put in complain mode
apparmor_complain_profiles: []

# Profiles to disable
apparmor_disable_profiles: []

#
# Custom Profiles
#

# Custom profile definitions (deployed to /etc/apparmor.d/)
# Use AppArmor ABI 4.0 syntax (include instead of #include)
# Example:
#   apparmor_custom_profiles:
#     - name: 'myapp'
#       enforce: true
#       content: |
#         abi <abi/4.0>,
#         include <tunables/global>
#         /usr/bin/myapp {
#           include <abstractions/base>
#           /etc/myapp/** r,
#           /var/log/myapp/** w,
#         }
apparmor_custom_profiles: []

#
# Profile Tunables
#

# Custom tunables deployed to /etc/apparmor.d/tunables/custom
# These override default AppArmor path variables used in profiles.
# Example:
#   apparmor_tunables:
#     HOME: '/home/*'
#     HOMEDIRS: '/home'
apparmor_tunables: {}

#
# Utilities
#

# Install apparmor-utils (aa-status, aa-enforce, etc.)
apparmor_utils_enabled: true

# Install apparmor-profiles-extra (broader profile coverage)
apparmor_extra_profiles_enabled: true

# DEPRECATED: Use apparmor_extra_profiles_enabled instead (removed in v2.0.0)
# apparmor_extra_profiles: {{ apparmor_extra_profiles_enabled }}

# Install apparmor-notify (desktop denial notifications)
apparmor_notify_enabled: true

# DEPRECATED: Use apparmor_notify_enabled instead (removed in v2.0.0)
# apparmor_notify_package: {{ apparmor_notify_enabled }}
