# marcstraube.common.apparmor/molecule/default/ansible.cfg

[defaults]
# Use modern fact injection (removes INJECT_FACTS_AS_VARS warning)
inject_facts_as_vars = False

# Improved output
stdout_callback = yaml
callbacks_enabled = profile_tasks, timer

[inventory]
# Enable INI parsing
enable_plugins = host_list, script, auto, yaml, ini, toml
