---
- name: Main | Load OS-specific variables
  ansible.builtin.include_vars: '{{ item }}'
  with_first_found:
    - files:
        - '{{ ansible_facts["distribution"] }}-{{ ansible_facts["distribution_major_version"] }}.yml'
        - '{{ ansible_facts["os_family"] }}-{{ ansible_facts["distribution_major_version"] }}.yml'
        - '{{ ansible_facts["distribution"] }}.yml'
        - '{{ ansible_facts["os_family"] }}.yml'
      paths:
        - 'vars'
      skip: true
  tags:
    - apparmor

- name: Main | Import install tasks
  ansible.builtin.import_tasks: install.yml
  when: apparmor_enabled | bool
  tags:
    - apparmor
    - apparmor:install

- name: Main | Import kernel tasks
  ansible.builtin.import_tasks: kernel.yml
  when: apparmor_enabled | bool
  tags:
    - apparmor
    - apparmor:kernel

# Profile, tunables, and service management require AppArmor to be active
# in the kernel. On first run (before reboot) these are skipped gracefully.

- name: Main | Include tunables tasks
  ansible.builtin.include_tasks:
    file: tunables.yml
    apply:
      tags:
        - apparmor
        - apparmor:tunables
  when:
    - apparmor_enabled | bool
    - apparmor_kernel_active | default(false)
  tags:
    - apparmor
    - apparmor:tunables

- name: Main | Include profiles tasks
  ansible.builtin.include_tasks:
    file: profiles.yml
    apply:
      tags:
        - apparmor
        - apparmor:profiles
  when:
    - apparmor_enabled | bool
    - apparmor_kernel_active | default(false)
  tags:
    - apparmor
    - apparmor:profiles

- name: Main | Include service tasks
  ansible.builtin.include_tasks:
    file: service.yml
    apply:
      tags:
        - apparmor
        - apparmor:service
  when:
    - apparmor_enabled | bool
    - apparmor_kernel_active | default(false)
  tags:
    - apparmor
    - apparmor:service
