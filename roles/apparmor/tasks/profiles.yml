---
# =============================================================================
# AppArmor Profile Management Tasks
# =============================================================================
# Application-specific profiles (nginx, postfix, etc.) are NOT managed here.
# Each service role manages its own AppArmor profile via <role>_apparmor_enabled.
# This file handles the generic enforce/complain/disable lists and custom profiles.
# =============================================================================

# Get current profile modes so we only change what's actually different.
# aa-status --json returns {"profiles": {"/path": "enforce"|"complain", ...}}
# Keys are inconsistent: sometimes full path (/usr/bin/man), sometimes
# basename only (tcpdump). We check both forms for reliable matching.
- name: Profiles | Get current AppArmor profile status
  ansible.builtin.command:
    cmd: aa-status --json
  register: __apparmor_status_json
  changed_when: false
  failed_when: false

- name: Profiles | Build profile mode lookup sets
  ansible.builtin.set_fact:
    __apparmor_enforce_set: >-
      {{ (__apparmor_status_json.stdout | default('{}') | from_json).get('profiles', {})
         | dict2items | selectattr('value', 'eq', 'enforce')
         | map(attribute='key') | list }}
    __apparmor_complain_set: >-
      {{ (__apparmor_status_json.stdout | default('{}') | from_json).get('profiles', {})
         | dict2items | selectattr('value', 'eq', 'complain')
         | map(attribute='key') | list }}
  when: __apparmor_status_json.rc == 0

# =============================================================================
# ENFORCE PROFILES
# =============================================================================

- name: Profiles | Set profiles to enforce mode
  ansible.builtin.command:
    cmd: 'aa-enforce {{ item }}'
  loop: '{{ apparmor_enforce_profiles }}'
  when: >-
    item not in __apparmor_enforce_set | default([])
    and (item | basename) not in __apparmor_enforce_set | default([])
  changed_when: true
  failed_when: false

# =============================================================================
# COMPLAIN PROFILES
# =============================================================================

- name: Profiles | Set profiles to complain mode
  ansible.builtin.command:
    cmd: 'aa-complain {{ item }}'
  loop: '{{ apparmor_complain_profiles }}'
  when: >-
    item not in __apparmor_complain_set | default([])
    and (item | basename) not in __apparmor_complain_set | default([])
  changed_when: true
  failed_when: false

# =============================================================================
# DISABLE PROFILES
# =============================================================================

- name: Profiles | Disable profiles
  ansible.builtin.command:
    cmd: 'aa-disable {{ item }}'
  loop: '{{ apparmor_disable_profiles }}'
  when: >-
    item in __apparmor_enforce_set | default([])
    or (item | basename) in __apparmor_enforce_set | default([])
    or item in __apparmor_complain_set | default([])
    or (item | basename) in __apparmor_complain_set | default([])
  changed_when: true
  failed_when: false

# =============================================================================
# CUSTOM PROFILES
# =============================================================================

- name: Profiles | Deploy custom AppArmor profiles
  ansible.builtin.copy:
    content: '{{ item.content }}'
    dest: '/etc/apparmor.d/{{ item.name }}'
    owner: root
    group: root
    mode: '0644'
  loop: '{{ apparmor_custom_profiles }}'
  register: __apparmor_custom_deployed
  notify: Reload AppArmor
  when: apparmor_custom_profiles | length > 0

# Only enforce custom profiles when the file was actually changed.
# The profile name inside the file differs from the filename, making
# aa-status lookup unreliable for custom profiles.
- name: Profiles | Enforce custom profiles
  ansible.builtin.command:
    cmd: 'aa-enforce /etc/apparmor.d/{{ item.item.name }}'
  loop: '{{ __apparmor_custom_deployed.results | default([]) }}'
  when:
    - item is changed
    - item.item.enforce | default(true)
  changed_when: true
  failed_when: false
