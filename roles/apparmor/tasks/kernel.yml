---
- name: Kernel | Check if AppArmor is supported by kernel
  ansible.builtin.stat:
    path: '{{ apparmor_securityfs }}/apparmor'
  register: __apparmor_kernel_check

- name: Kernel | Set AppArmor kernel status fact
  ansible.builtin.set_fact:
    apparmor_kernel_active: "{{ __apparmor_kernel_check.stat.exists }}"

- name: Kernel | Display AppArmor kernel status
  ansible.builtin.debug:
    msg: >-
      AppArmor kernel support: {{ 'active' if apparmor_kernel_active else
      'not active — configure GRUB and reboot' }}

# =============================================================================
# GRUB CONFIGURATION — Arch Linux (lsm= kernel parameter)
# =============================================================================

- name: Kernel | Check if AppArmor LSM is configured in GRUB (Arch Linux)
  ansible.builtin.command:
    cmd: grep -cP 'lsm=\S*apparmor' /etc/default/grub
  register: __apparmor_grub_lsm_check
  check_mode: false
  changed_when: false
  failed_when: false
  when:
    - apparmor_boot_enabled | bool
    - ansible_facts['os_family'] == 'Archlinux'

- name: Kernel | Add AppArmor LSM to GRUB config (Arch Linux)
  ansible.builtin.replace:
    path: /etc/default/grub
    regexp: '^(GRUB_CMDLINE_LINUX_DEFAULT="[^"]*)'
    replace: '\1 lsm=landlock,lockdown,yama,integrity,apparmor,bpf'
    backup: true
  register: __apparmor_grub_changed
  when:
    - apparmor_boot_enabled | bool
    - ansible_facts['os_family'] == 'Archlinux'
    - __apparmor_grub_lsm_check is defined
    - __apparmor_grub_lsm_check.stdout | default('0') | int == 0

# =============================================================================
# GRUB CONFIGURATION — Debian (apparmor=1 security=apparmor)
# =============================================================================

- name: Kernel | Check if AppArmor is configured in GRUB (Debian)
  ansible.builtin.command:
    cmd: grep -c 'security=apparmor' /etc/default/grub
  register: __apparmor_grub_debian_check
  check_mode: false
  changed_when: false
  failed_when: false
  when:
    - apparmor_boot_enabled | bool
    - ansible_facts['os_family'] == 'Debian'

- name: Kernel | Add AppArmor to GRUB config (Debian)
  ansible.builtin.replace:
    path: /etc/default/grub
    regexp: '^(GRUB_CMDLINE_LINUX="[^"]*)'
    replace: '\1 apparmor=1 security=apparmor'
    backup: true
  register: __apparmor_grub_changed_deb
  when:
    - apparmor_boot_enabled | bool
    - ansible_facts['os_family'] == 'Debian'
    - __apparmor_grub_debian_check is defined
    - __apparmor_grub_debian_check.stdout | default('0') | int == 0

# =============================================================================
# GRUB UPDATE CHAIN (runs immediately, not as handler)
# =============================================================================
# On systems with Secure Boot + TPM, GRUB changes require:
#   1. grub-mkconfig   — regenerate config
#   2. sbctl sign-all  — re-sign boot files (Secure Boot)
#   3. pause           — warn about TPM re-seal after reboot
# This MUST run immediately — handlers would be skipped on play failure.
# =============================================================================

- name: Kernel | Regenerate GRUB config (Arch Linux)
  ansible.builtin.command:
    cmd: grub-mkconfig -o /boot/grub/grub.cfg
  changed_when: true
  when:
    - ansible_facts['os_family'] == 'Archlinux'
    - __apparmor_grub_changed is defined
    - __apparmor_grub_changed is changed

- name: Kernel | Regenerate GRUB config (Debian)
  ansible.builtin.command:
    cmd: update-grub
  changed_when: true
  when:
    - ansible_facts['os_family'] == 'Debian'
    - __apparmor_grub_changed_deb is defined
    - __apparmor_grub_changed_deb is changed

- name: Kernel | Re-sign boot files (sbctl)
  ansible.builtin.command:
    cmd: sbctl sign-all
  changed_when: true
  when:
    - ansible_facts['os_family'] == 'Archlinux'
    - __apparmor_grub_changed is defined
    - __apparmor_grub_changed is changed
    - archlinux_secureboot is defined
    - archlinux_secureboot.enabled | default(false) | bool
    - archlinux_secureboot.method | default('sbctl') != 'hsm'

- name: Kernel | Re-sign boot files (HSM)
  ansible.builtin.command:
    cmd: /usr/local/bin/secureboot-hsm-sign.sh
  changed_when: true
  when:
    - ansible_facts['os_family'] == 'Archlinux'
    - __apparmor_grub_changed is defined
    - __apparmor_grub_changed is changed
    - archlinux_secureboot is defined
    - archlinux_secureboot.enabled | default(false) | bool
    - archlinux_secureboot.method | default('sbctl') == 'hsm'

- name: Kernel | TPM re-seal required after reboot (PCR 4 bound)
  ansible.builtin.pause:
    prompt: |

      ================================================================
        WARNING: GRUB configuration has changed.

        This system binds TPM to PCR 4 (boot manager).
        grub.cfg changes invalidate PCR 4 measurements.

        After reboot, TPM auto-unlock will fail.
        Boot with passphrase/recovery key, then run:
          {{ (archlinux_luks_tpm.mode | default('separate') == 'seal_gpg')
          | ternary('sudo tpm-reseal.sh', 'sudo tpm-reenroll.sh') }}

        Press ENTER to continue.
      ================================================================

  when:
    - ansible_facts['os_family'] == 'Archlinux'
    - __apparmor_grub_changed is defined
    - __apparmor_grub_changed is changed
    - archlinux_luks_tpm is defined
    - archlinux_luks_tpm.enabled | default(false) | bool
    - 4 in (archlinux_luks_tpm.pcrs | default([0, 7]))

# =============================================================================
# STATUS CHECK (only when kernel module is active)
# =============================================================================

- name: Kernel | Check AppArmor module status
  ansible.builtin.command:
    cmd: aa-status
  register: __apparmor_status_check
  changed_when: false
  failed_when: false
  when: apparmor_kernel_active
