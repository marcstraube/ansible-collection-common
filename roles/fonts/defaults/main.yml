---
#
# Role Control
#

fonts_enabled: true

#
# Base Fonts
#

# Install base font set (DejaVu, Liberation, Noto)
fonts_base: true

# Install DejaVu fonts (Bitstream Vera with extended Unicode)
fonts_dejavu: true

# Install Liberation fonts (metric-compatible with MS fonts)
fonts_liberation: true

# Install Noto fonts (Google's Unicode coverage fonts)
fonts_noto: true

# Install Noto Emoji fonts
fonts_noto_emoji: true

# Install Noto CJK fonts (Chinese, Japanese, Korean)
# Warning: Large download (~1.5GB)
fonts_noto_cjk: false

#
# Coding Fonts
#

# Install coding/monospace fonts
fonts_coding: false

# Specific coding fonts to install (when fonts_coding is true)
# Available: firacode, jetbrains, cascadia, iosevka, hack, source-code-pro
fonts_coding_families:
  - 'firacode'
  - 'jetbrains'

#
# Nerd Fonts
#

# Install Nerd Fonts (patched fonts with icons)
fonts_nerd: false

# Nerd Font families to install
# Available: firacode, hack, jetbrains, meslo, source-code-pro, ubuntu,
#            dejavu, liberation, noto, roboto, droid, terminus, symbols-only
fonts_nerd_families:
  - 'symbols-only'

#
# Legacy/Compatibility Fonts (Removed)
#

# Microsoft fonts are no longer needed - Liberation fonts are metrically
# compatible. If you really need MS fonts, add to fonts_extra_packages:
#   ArchLinux (AUR): fonts_extra_packages: ['ttf-ms-fonts']
#   Debian/Ubuntu:   fonts_extra_packages: ['ttf-mscorefonts-installer']

#
# Additional Fonts
#

# Additional font packages to install (OS-specific package names)
fonts_extra_packages: []

#
# Fontconfig
#

# Enable fontconfig customization
fonts_fontconfig_enabled: true

# Prefer specific fonts for generic families
# Example: fonts_fontconfig_prefer_sans: 'Noto Sans'
fonts_fontconfig_prefer_sans: ''
fonts_fontconfig_prefer_serif: ''
fonts_fontconfig_prefer_mono: ''

# Enable font antialiasing
fonts_fontconfig_antialias: true

# Hinting style: hintnone, hintslight, hintmedium, hintfull
fonts_fontconfig_hinting: 'hintslight'

# Subpixel rendering: none, rgb, bgr, vrgb, vbgr
fonts_fontconfig_subpixel: 'rgb'

# LCD filter: none, default, light, legacy
fonts_fontconfig_lcdfilter: 'default'

#
# Cache
#

# Rebuild font cache after installation
fonts_rebuild_cache: true
