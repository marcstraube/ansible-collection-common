---
#
# Role Control
#

# Enable the fonts role
fonts_enabled: true

#
# Base Fonts
#

# Enable base font set (DejaVu, Liberation, Noto)
fonts_base_enabled: true

# DEPRECATED: Use fonts_base_enabled instead (removed in v2.0.0)
# fonts_base: {{ fonts_base_enabled }}

# Enable DejaVu fonts (Bitstream Vera with extended Unicode)
fonts_dejavu_enabled: true

# DEPRECATED: Use fonts_dejavu_enabled instead (removed in v2.0.0)
# fonts_dejavu: {{ fonts_dejavu_enabled }}

# Enable Liberation fonts (metric-compatible with MS fonts)
fonts_liberation_enabled: true

# DEPRECATED: Use fonts_liberation_enabled instead (removed in v2.0.0)
# fonts_liberation: {{ fonts_liberation_enabled }}

# Enable Noto fonts (Google's Unicode coverage fonts)
fonts_noto_enabled: true

# DEPRECATED: Use fonts_noto_enabled instead (removed in v2.0.0)
# fonts_noto: {{ fonts_noto_enabled }}

# Enable Noto Emoji fonts
fonts_noto_emoji_enabled: true

# DEPRECATED: Use fonts_noto_emoji_enabled instead (removed in v2.0.0)
# fonts_noto_emoji: {{ fonts_noto_emoji_enabled }}

# Enable Noto CJK fonts (Chinese, Japanese, Korean, ~1.5 GB)
fonts_noto_cjk_enabled: false

# DEPRECATED: Use fonts_noto_cjk_enabled instead (removed in v2.0.0)
# fonts_noto_cjk: {{ fonts_noto_cjk_enabled }}

#
# Coding Fonts
#

# Enable coding/monospace fonts
fonts_coding_enabled: false

# DEPRECATED: Use fonts_coding_enabled instead (removed in v2.0.0)
# fonts_coding: {{ fonts_coding_enabled }}

# Coding font families to install
# Available: firacode, jetbrains, cascadia, iosevka, hack, source-code-pro
fonts_coding_families:
  - 'firacode'
  - 'jetbrains'

#
# Nerd Fonts
#

# Enable Nerd Fonts (patched fonts with icons)
fonts_nerd_enabled: false

# DEPRECATED: Use fonts_nerd_enabled instead (removed in v2.0.0)
# fonts_nerd: {{ fonts_nerd_enabled }}

# Nerd Font families to install
# Available: firacode, hack, jetbrains, meslo, source-code-pro, ubuntu,
#            dejavu, liberation, noto, roboto, droid, terminus, symbols-only
fonts_nerd_families:
  - 'symbols-only'

#
# Additional Fonts
#

# Additional font packages to install (OS-specific package names)
fonts_extra_packages: []

#
# Fontconfig
#

# Enable fontconfig customization
fonts_fontconfig_enabled: true

# Prefer specific fonts for generic families
fonts_fontconfig_prefer_sans: ''
fonts_fontconfig_prefer_serif: ''
fonts_fontconfig_prefer_mono: ''

# Enable font antialiasing
fonts_fontconfig_antialias_enabled: true

# DEPRECATED: Use fonts_fontconfig_antialias_enabled instead (removed in v2.0.0)
# fonts_fontconfig_antialias: {{ fonts_fontconfig_antialias_enabled }}

# Hinting style: hintnone, hintslight, hintmedium, hintfull
fonts_fontconfig_hinting: 'hintslight'

# Subpixel rendering: none, rgb, bgr, vrgb, vbgr
fonts_fontconfig_subpixel: 'rgb'

# LCD filter: none, default, light, legacy
fonts_fontconfig_lcdfilter: 'default'

#
# Cache
#

# Enable font cache rebuild after installation
fonts_rebuild_cache_enabled: true

# DEPRECATED: Use fonts_rebuild_cache_enabled instead (removed in v2.0.0)
# fonts_rebuild_cache: {{ fonts_rebuild_cache_enabled }}
