---
- name: Service | Manage podman socket
  ansible.builtin.systemd_service:
    name: '{{ __podman_socket_service }}'
    enabled: "{{ podman_socket_enabled | bool }}"
    state: "{{ podman_socket_enabled | bool | ternary('started', 'stopped') }}"

- name: Service | Manage podman auto-update timer
  ansible.builtin.systemd_service:
    name: '{{ __podman_auto_update_timer }}'
    enabled: "{{ podman_auto_update_enabled | bool }}"
    state: "{{ podman_auto_update_enabled | bool | ternary('started', 'stopped') }}"

- name: Service | Deploy system prune timer
  ansible.builtin.template:
    src: podman-prune.timer.j2
    dest: '/etc/systemd/system/podman-prune.timer'
    owner: root
    group: root
    mode: '0644'
  notify: 'reload podman systemd units'

- name: Service | Deploy system prune service
  ansible.builtin.template:
    src: podman-prune.service.j2
    dest: '/etc/systemd/system/podman-prune.service'
    owner: root
    group: root
    mode: '0644'
  notify: 'reload podman systemd units'

- name: Service | Manage system prune timer
  ansible.builtin.systemd_service:
    name: 'podman-prune.timer'
    enabled: "{{ podman_prune_enabled | bool }}"
    state: "{{ podman_prune_enabled | bool | ternary('started', 'stopped') }}"
    daemon_reload: true
