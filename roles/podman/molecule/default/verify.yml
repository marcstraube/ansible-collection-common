---
- name: Verify
  hosts: all
  gather_facts: true

  tasks:
    #
    # Package Verification
    #

    - name: Verify | Load OS-specific variables
      ansible.builtin.include_vars: '{{ item }}'
      with_first_found:
        - files:
            - '{{ ansible_facts["distribution"] }}-{{ ansible_facts["distribution_major_version"] }}.yml'
            - '{{ ansible_facts["os_family"] }}-{{ ansible_facts["distribution_major_version"] }}.yml'
            - '{{ ansible_facts["distribution"] }}.yml'
            - '{{ ansible_facts["os_family"] }}.yml'
          paths:
            - '{{ playbook_dir }}/../../vars'

    - name: Verify | Check podman packages are installed
      ansible.builtin.package:
        name: '{{ __podman_packages }}'
        state: present
      check_mode: true
      register: __pkg_check
      failed_when: __pkg_check.changed

    - name: Verify | Check additional tools are installed
      ansible.builtin.package:
        name:
          - 'buildah'
          - 'skopeo'
        state: present
      check_mode: true
      register: __tools_check
      failed_when: __tools_check.changed

    #
    # Configuration Files - Existence and Permissions
    #

    - name: Verify | Check configuration files exist
      ansible.builtin.stat:
        path: '{{ item }}'
      register: __config_files
      loop:
        - '/etc/containers/registries.conf'
        - '/etc/containers/storage.conf'
        - '/etc/containers/containers.conf'
        - '/etc/profile.d/podman-docker.sh'

    - name: Verify | Assert configuration files exist with correct permissions
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.mode == '0644'
          - item.stat.pw_name == 'root'
          - item.stat.gr_name == 'root'
        fail_msg: '{{ item.item }} does not exist or has wrong permissions'
      loop: '{{ __config_files.results }}'
      loop_control:
        label: '{{ item.item }}'

    - name: Verify | Check config directories exist
      ansible.builtin.stat:
        path: '{{ item }}'
      register: __config_dirs
      loop:
        - '/etc/containers'
        - '/etc/containers/registries.conf.d'

    - name: Verify | Assert config directories exist
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.isdir
          - item.stat.mode == '0755'
        fail_msg: '{{ item.item }} does not exist or has wrong permissions'
      loop: '{{ __config_dirs.results }}'
      loop_control:
        label: '{{ item.item }}'

    #
    # registries.conf Content (V2 Format)
    #

    - name: Verify | Read registries.conf
      ansible.builtin.slurp:
        src: '/etc/containers/registries.conf'
      register: __registries_content

    - name: Verify | Set registries content fact
      ansible.builtin.set_fact:
        __registries_decoded: "{{ __registries_content.content | b64decode }}"

    - name: Verify | Assert registries V2 format
      ansible.builtin.assert:
        that:
          - "'unqualified-search-registries' in __registries_decoded"
          - "'docker.io' in __registries_decoded"
          - "'quay.io' in __registries_decoded"
          - "'short-name-mode' in __registries_decoded"
          - "'Ansible managed' in __registries_decoded"
        fail_msg: 'Registries not properly configured in V2 format'

    - name: Verify | Assert no deprecated V1 format
      ansible.builtin.assert:
        that:
          - "'[registries.search]' not in __registries_decoded"
          - "'[registries.insecure]' not in __registries_decoded"
          - "'[registries.block]' not in __registries_decoded"
        fail_msg: 'Registries still uses deprecated V1 format'

    #
    # storage.conf Content
    #

    - name: Verify | Read storage.conf
      ansible.builtin.slurp:
        src: '/etc/containers/storage.conf'
      register: __storage_content

    - name: Verify | Set storage content fact
      ansible.builtin.set_fact:
        __storage_decoded: "{{ __storage_content.content | b64decode }}"

    - name: Verify | Assert storage configuration
      ansible.builtin.assert:
        that:
          - "'driver = \"overlay\"' in __storage_decoded"
          - "'graphroot = \"/var/lib/containers/storage\"' in __storage_decoded"
          - "'rootless_storage_path' in __storage_decoded"
          - "'[storage]' in __storage_decoded"
          - "'Ansible managed' in __storage_decoded"
        fail_msg: 'Storage not properly configured'

    #
    # containers.conf Content
    #

    - name: Verify | Read containers.conf
      ansible.builtin.slurp:
        src: '/etc/containers/containers.conf'
      register: __containers_content

    - name: Verify | Set containers content fact
      ansible.builtin.set_fact:
        __containers_decoded: "{{ __containers_content.content | b64decode }}"

    - name: Verify | Assert containers configuration
      ansible.builtin.assert:
        that:
          - "'firewall_driver = \"firewalld\"' in __containers_decoded"
          - "'network_backend = \"netavark\"' in __containers_decoded"
          - "'runtime = \"crun\"' in __containers_decoded"
          - "'log_driver = \"journald\"' in __containers_decoded"
          - "'cgroup_manager = \"systemd\"' in __containers_decoded"
          - "'pids_limit = 2048' in __containers_decoded"
          - "'label = true' in __containers_decoded"
          - "'userns = \"auto\"' in __containers_decoded"
          - "'Ansible managed' in __containers_decoded"
        fail_msg: 'Containers configuration does not contain expected settings'

    - name: Verify | Assert no duplicate runtime in containers section
      ansible.builtin.assert:
        that:
          - "'default_runtime' not in __containers_decoded"
        fail_msg: 'containers.conf contains deprecated default_runtime directive'

    #
    # Docker Alias
    #

    - name: Verify | Read Docker alias script
      ansible.builtin.slurp:
        src: '/etc/profile.d/podman-docker.sh'
      register: __alias_content

    - name: Verify | Assert Docker alias content
      ansible.builtin.assert:
        that:
          - "'alias docker=podman' in __alias_content.content | b64decode"
          - "'alias docker-compose=podman-compose' in __alias_content.content | b64decode"
          - "'Ansible managed' in __alias_content.content | b64decode"
        fail_msg: 'Docker alias script does not contain expected aliases'

    #
    # Systemd Prune Units
    #

    - name: Verify | Check prune timer exists
      ansible.builtin.stat:
        path: '/etc/systemd/system/podman-prune.timer'
      register: __prune_timer

    - name: Verify | Assert prune timer exists
      ansible.builtin.assert:
        that:
          - __prune_timer.stat.exists
          - __prune_timer.stat.mode == '0644'
        fail_msg: 'Prune timer does not exist'

    - name: Verify | Read prune timer
      ansible.builtin.slurp:
        src: '/etc/systemd/system/podman-prune.timer'
      register: __prune_timer_content

    - name: Verify | Assert prune timer content
      ansible.builtin.assert:
        that:
          - "'OnCalendar=weekly' in __prune_timer_content.content | b64decode"
          - "'Ansible managed' in __prune_timer_content.content | b64decode"
        fail_msg: 'Prune timer content incorrect'

    - name: Verify | Check prune service exists
      ansible.builtin.stat:
        path: '/etc/systemd/system/podman-prune.service'
      register: __prune_service

    - name: Verify | Assert prune service exists
      ansible.builtin.assert:
        that:
          - __prune_service.stat.exists
        fail_msg: 'Prune service does not exist'

    - name: Verify | Read prune service
      ansible.builtin.slurp:
        src: '/etc/systemd/system/podman-prune.service'
      register: __prune_service_content

    - name: Verify | Assert prune service content
      ansible.builtin.assert:
        that:
          - "'podman system prune -af --volumes' in __prune_service_content.content | b64decode"
          - "'Ansible managed' in __prune_service_content.content | b64decode"
        fail_msg: 'Prune service content incorrect'

    #
    # Functional Tests
    #

    - name: Verify | Test podman version command
      ansible.builtin.command: podman --version
      register: __podman_version
      changed_when: false
      failed_when: __podman_version.rc != 0

    - name: Verify | Assert podman version output
      ansible.builtin.assert:
        that:
          - "'podman version' in __podman_version.stdout"
        fail_msg: 'Podman version output unexpected'

    - name: Verify | Test podman info command
      ansible.builtin.command: podman info
      register: __podman_info
      changed_when: false
      failed_when: __podman_info.rc != 0

    - name: Verify | Assert podman info output
      ansible.builtin.assert:
        that:
          - "'version:' in __podman_info.stdout"
          - "'host:' in __podman_info.stdout"
          - "'store:' in __podman_info.stdout"
        fail_msg: 'Podman info output missing expected sections'

    - name: Verify | Test buildah version command
      ansible.builtin.command: buildah --version
      register: __buildah_version
      changed_when: false
      failed_when: __buildah_version.rc != 0

    - name: Verify | Assert buildah is functional
      ansible.builtin.assert:
        that:
          - "'buildah version' in __buildah_version.stdout"
        fail_msg: 'Buildah is not functional'

    - name: Verify | Test skopeo version command
      ansible.builtin.command: skopeo --version
      register: __skopeo_version
      changed_when: false
      failed_when: __skopeo_version.rc != 0

    - name: Verify | Assert skopeo is functional
      ansible.builtin.assert:
        that:
          - "'skopeo version' in __skopeo_version.stdout"
        fail_msg: 'Skopeo is not functional'
