---
# EL 9 uses classic power-profiles-daemon (not tuned-ppd).
# Overrides RedHat.yml defaults for PPD packages and service.

#
# Power Profiles Daemon (classic PPD on EL 9)
#

__energy_management_ppd_packages:
  - 'power-profiles-daemon'
__energy_management_ppd_service: 'power-profiles-daemon.service'

#
# Battery (tp_smapi not available on RHEL — sysfs only)
#

__energy_management_tp_smapi_packages: []
