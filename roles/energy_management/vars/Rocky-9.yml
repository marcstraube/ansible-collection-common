---
# =============================================================================
# Energy Management - Rocky 9 Variables
# =============================================================================
# Rocky 9 uses classic power-profiles-daemon (not tuned-ppd).
# Overrides RedHat.yml defaults for PPD packages and service.

# Logind
__energy_management_logind_conf_dir: '/etc/systemd/logind.conf.d'
__energy_management_logind_conf_file: 'energy.conf'

# Sleep
__energy_management_sleep_conf_dir: '/etc/systemd/sleep.conf.d'
__energy_management_sleep_conf_file: 'energy.conf'

# Power Profiles Daemon (classic PPD on Rocky 9)
__energy_management_ppd_packages:
  - 'power-profiles-daemon'
__energy_management_ppd_service: 'power-profiles-daemon.service'

# TLP (EPEL)
__energy_management_tlp_packages:
  - 'tlp'
  - 'tlp-rdw'
__energy_management_tlp_service: 'tlp.service'
__energy_management_tlp_config_file: '/etc/tlp.conf'
__energy_management_tlp_mask_services:
  - 'systemd-rfkill.service'
  - 'systemd-rfkill.socket'

# Battery (tp_smapi not available on RHEL — sysfs only)
__energy_management_tp_smapi_packages: []
__energy_management_battery_sysfs_path: '/sys/class/power_supply/BAT0'
__energy_management_battery_start_file: 'charge_control_start_threshold'
__energy_management_battery_stop_file: 'charge_control_end_threshold'
__energy_management_tp_smapi_start_file: '/proc/acpi/ibm/battery/BAT0/start_charge_thresh'
__energy_management_tp_smapi_stop_file: '/proc/acpi/ibm/battery/BAT0/stop_charge_thresh'

# Backlight (EPEL)
__energy_management_backlight_packages:
  - 'brightnessctl'
__energy_management_backlight_udev_rules_dir: '/etc/udev/rules.d'
__energy_management_backlight_udev_rules_file: '90-backlight.rules'
