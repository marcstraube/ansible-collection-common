---
# RHEL 10+ replaced power-profiles-daemon with tuned + tuned-ppd.
# tuned-ppd implements the same D-Bus API, so DE integration is unchanged.
# For EL 9, see RedHat-9.yml override.

#
# Power Profiles Daemon (tuned-ppd on RHEL 10+)
#

__energy_management_ppd_packages:
  - 'tuned'
  - 'tuned-ppd'
__energy_management_ppd_service: 'tuned.service'

#
# Battery (tp_smapi not available on RHEL — sysfs only)
#

__energy_management_tp_smapi_packages: []
