---
- name: Main | Load OS-specific variables
  ansible.builtin.include_vars: '{{ item }}'
  with_first_found:
    - files:
        - '{{ ansible_facts["distribution"] }}-{{ ansible_facts["distribution_major_version"] }}.yml'
        - '{{ ansible_facts["distribution"] }}.yml'
        - '{{ ansible_facts["os_family"] }}.yml'
      paths:
        - 'vars'
  tags: [energy]

# ---------------------------------------------------------------------------
# Logind configuration (all systemd distros)
# ---------------------------------------------------------------------------
- name: Main | Include logind tasks
  ansible.builtin.include_tasks:
    file: logind.yml
    apply:
      tags: [energy, energy:logind]
  tags: [energy, energy:logind]
  when:
    - energy_management_enabled | bool
    - energy_management_logind_enabled | bool

# ---------------------------------------------------------------------------
# Sleep configuration (all systemd distros)
# ---------------------------------------------------------------------------
- name: Main | Include sleep tasks
  ansible.builtin.include_tasks:
    file: sleep.yml
    apply:
      tags: [energy, energy:sleep]
  tags: [energy, energy:sleep]
  when:
    - energy_management_enabled | bool
    - energy_management_sleep_enabled | bool

# ---------------------------------------------------------------------------
# Power manager: PPD or TLP (OS-specific)
# ---------------------------------------------------------------------------
- name: Main | Include power-profiles-daemon tasks
  ansible.builtin.include_tasks:
    file: ppd.yml
    apply:
      tags: [energy, energy:ppd]
  tags: [energy, energy:ppd]
  when:
    - energy_management_enabled | bool
    - energy_management_power_manager == 'ppd'

- name: Main | Include TLP tasks
  ansible.builtin.include_tasks:
    file: tlp.yml
    apply:
      tags: [energy, energy:tlp]
  tags: [energy, energy:tlp]
  when:
    - energy_management_enabled | bool
    - energy_management_power_manager == 'tlp'

# ---------------------------------------------------------------------------
# Battery threshold (laptop only, OS-specific)
# ---------------------------------------------------------------------------
- name: Main | Include battery tasks
  ansible.builtin.include_tasks:
    file: battery.yml
    apply:
      tags: [energy, energy:battery]
  tags: [energy, energy:battery]
  when:
    - energy_management_enabled | bool
    - energy_management_battery_enabled | bool
    - energy_management_system_type == 'laptop'

# ---------------------------------------------------------------------------
# Backlight (laptop only, OS-specific)
# ---------------------------------------------------------------------------
- name: Main | Include backlight tasks
  ansible.builtin.include_tasks:
    file: backlight.yml
    apply:
      tags: [energy, energy:backlight]
  tags: [energy, energy:backlight]
  when:
    - energy_management_enabled | bool
    - energy_management_backlight_enabled | bool
    - energy_management_system_type == 'laptop'
